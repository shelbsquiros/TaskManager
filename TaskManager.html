    + '<input id="pp-search-input" placeholder="Search people\u2026" value="' + (f.search||'').replace(/"/g,'&quot;') + '"'
    + ' oninput="STATE.peopleFilter.search=this.value;renderPeople()"'
    + ' style="border:none;background:transparent;color:var(--text);font-family:var(--font);font-size:13px;outline:none;width:100%">'
    + '</div>';

  // ── Cards ─────────────────────────────────────────────────────
  const timeframe = f.context === 'week' ? 'week' : 'today';
  const addCardHTML = '<div class="add-person-btn" onclick="openPersonModal(null)">'
    + '<span class="plus"><i class="ti ti-plus" style="font-size:28px"></i></span>'
    + '<span>Add Person</span>'
    + '</div>';

  const gridHTML = filtered.length > 0
    ? filtered.map(p => buildPersonCard(p, true, timeframe)).join('') + addCardHTML
    : '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)">'
      + '<i class="ti ti-search-off" style="font-size:40px;display:block;margin-bottom:12px;opacity:0.5"></i>'
      + '<div style="font-size:14px;color:var(--text2)">No people match that filter</div>'
      + '</div>' + addCardHTML;

  // ── Render ────────────────────────────────────────────────────
  el.innerHTML = ''
    + '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:16px;flex-shrink:0;flex-wrap:wrap">'
    + '<span style="font-size:26px;font-weight:800;letter-spacing:-0.03em;line-height:1.1;color:var(--text);font-family:var(--font-disp)">People</span>'
    + '<span style="font-size:26px;font-weight:400;color:var(--muted);font-family:var(--font-disp)"> &middot; ' + subtitle + '</span>'
    + '<button class="btn-primary" style="margin-left:auto" onclick="openPersonModal(null)"><i class="ti ti-plus" style="font-size:13px;margin-right:4px"></i>Add Person</button>'
    + '</div>'
    + '<div class="kb-pill-strip" style="margin-bottom:16px">' + pillsHTML + '</div>'
    + '<div class="person-grid">' + gridHTML + '</div>';

  _restoreSearchFocus('pp-search-input', _wasSearchFocused);
}

// Used by renderPeople (People tab)
function buildPersonCard(p, showActiveBadge, timeframe) {
  const todayStr   = fmtDate(TODAY);
  const weekEnd    = new Date(TODAY); weekEnd.setDate(weekEnd.getDate() + 6);
  const weekEndStr = fmtDate(weekEnd);
  const allPi      = personItems(p.name);
  const _tf        = timeframe || 'today';
  const showWeek   = _tf === 'week';

  // ── Active state ──────────────────────────────────────────────
  const activeToday = isPersonActiveToday(p);
  const activeWeek  = isPersonActiveThisWeek(p);

  // ── TODAY counts ─────────────────────────────────────────────
  const tToday = allPi.filter(i => i.type === 'task'
    && parseStatus(i.status).state !== 'Completed'
    && (i.dueDate === todayStr || i.startDate === todayStr
      || parseStatus(i.status).state === 'In Progress'
      || parseStatus(i.status).state === 'Review'
      || parseStatus(i.status).state === 'Open')).length;
  const eToday = allPi.filter(i => i.type === 'event'  && i.date === todayStr).length;
  const nToday = allPi.filter(i => i.type === 'entry'  && i.date === todayStr).length;
  const overdue = allPi.filter(i => i.type === 'task'
    && i.dueDate && daysUntil(i.dueDate) < 0
    && parseStatus(i.status).state !== 'Completed').length;

  // ── THIS WEEK counts (strictly tomorrow → today+6) ───────────
  const tWeek = allPi.filter(i => i.type === 'task'
    && parseStatus(i.status).state !== 'Completed'
    && parseStatus(i.status).state !== 'In Progress'
    && parseStatus(i.status).state !== 'Review'
    && parseStatus(i.status).state !== 'Open'
    && (i.dueDate || i.startDate || '') > todayStr
    && (i.dueDate || i.startDate || '') <= weekEndStr).length;
  const eWeek = allPi.filter(i => i.type === 'event'  && i.date > todayStr && i.date <= weekEndStr).length;
  const nWeek = allPi.filter(i => i.type === 'entry'  && i.date > todayStr && i.date <= weekEndStr).length;

  // ── Stats HTML ────────────────────────────────────────────────
  // Chip helper: icon + count + label text
  const _tChip = (icon, count, label, bg, color) =>
    '<span class="stat-pill" style="background:' + bg + ';color:' + color + '">'
    + '<i class="ti ' + icon + '" style="font-size:11px;margin-right:3px"></i>'
    + count + ' ' + label + '</span>';

  // Label helper
  const _lbl = txt =>
    '<span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);white-space:nowrap;flex-shrink:0;margin-right:6px">' + txt + '</span>';

  const _todayHasItems = tToday > 0 || eToday > 0 || nToday > 0 || overdue > 0;

  // Today chips — icon + count + label
  const todayChips = ''
    + (tToday  > 0 ? _tChip('ti-checkbox',    tToday,  tToday===1?'Task':'Tasks',   'rgba(40,92,112,0.15)',   'var(--accent2)') : '')
    + (eToday  > 0 ? _tChip('ti-calendar',    eToday,  eToday===1?'Event':'Events', 'rgba(40,92,112,0.15)',   'var(--accent2)') : '')
    + (nToday  > 0 ? _tChip('ti-notes',       nToday,  nToday===1?'Entry':'Entries','rgba(40,92,112,0.15)',   'var(--accent2)') : '')
    + (overdue > 0 ? _tChip('ti-alert-circle',overdue, overdue===1?'Overdue':'Overdue','rgba(248,113,113,0.12)','var(--red)')    : '')
    + (!_todayHasItems ? '<span class="stat-pill" style="background:var(--glass);color:var(--muted)">Nothing today</span>' : '');

  const _weekHasItems = tWeek > 0 || eWeek > 0 || nWeek > 0;

  // Week chips — same pattern, amber color
  const weekChips = ''
    + (tWeek > 0 ? _tChip('ti-checkbox', tWeek, tWeek===1?'Task':'Tasks',    'rgba(251,191,36,0.10)', '#FBBF24') : '')
    + (eWeek > 0 ? _tChip('ti-calendar', eWeek, eWeek===1?'Event':'Events',  'rgba(251,191,36,0.10)', '#FBBF24') : '')
    + (nWeek > 0 ? _tChip('ti-notes',    nWeek, nWeek===1?'Entry':'Entries', 'rgba(251,191,36,0.10)', '#FBBF24') : '')
    + (!_weekHasItems ? '<span class="stat-pill" style="background:var(--glass);color:var(--muted);opacity:0.8">Nothing upcoming</span>' : '');

  // Assemble stats section — each period is its own full-width flex row
  let statsHTML = '<div class="person-stats">'
    + '<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap' + (showWeek ? ';margin-bottom:8px' : '') + '">'
    + _lbl('Today')
    + todayChips
    + '</div>';

  if (showWeek) {
    statsHTML += '<div style="height:1px;background:var(--border);margin-bottom:8px"></div>'
      + '<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;opacity:0.85">'
      + _lbl('This Week')
      + weekChips
      + '</div>';
  }

  statsHTML += '</div>';

  // ── Badge ─────────────────────────────────────────────────────
  let badgeHTML = '';
  if (showActiveBadge) {
    if (activeToday)
      badgeHTML = '<span class="person-active-badge" style="margin-top:3px;display:inline-flex">Active Today</span>';
    else if (activeWeek)
      badgeHTML = '<span class="person-active-week-badge" style="margin-top:3px;display:inline-flex">Active This Week</span>';
    else
      badgeHTML = '<span class="person-idle-badge" style="margin-top:3px;display:inline-flex">Idle</span>';
  }

  // ── Avatar ────────────────────────────────────────────────────
  const avatarHTML = p.photo
    ? '<img src="' + p.photo + '" class="person-avatar" style="background:' + p.color + ';box-shadow:0 4px 14px ' + p.color + '55;object-fit:cover" onerror="this.style.display=\'none\'" alt="' + initials(p.name) + '">'
    : '<div class="person-avatar" style="background:' + p.color + ';box-shadow:0 4px 14px ' + p.color + '55">' + initials(p.name) + '</div>';

  // ── View details button ───────────────────────────────────────
  const viewBtn = '<button class="person-viewall" onclick="openPersonDetailModal(\'' + p.id + '\')">View details \u2192</button>';

  return '<div class="person-card' + (activeToday?' person-card-active':'') + '">'
    + '<div class="person-header">'
    + '<div style="position:relative;flex-shrink:0">'
    + avatarHTML
    + (activeToday ? '<div class="person-active-dot" title="Active today"></div>' : '')
    + '</div>'
    + '<div style="flex:1;min-width:0">'
    + '<div class="person-name" style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis">' + p.name + '</div>'
    + '<div class="person-role">' + (p.role||'\u2014') + '</div>'
    + badgeHTML
    + '</div>'
    + '<div class="person-actions">'
    + '<button class="dir-action-btn" onclick="openPersonModal(\'' + p.id + '\')" title="Edit"><i class="ti ti-pencil" style="font-size:13px"></i></button>'
    + '<button class="dir-action-btn" onclick="removePerson(\'' + p.id + '\')" title="Remove"><i class="ti ti-trash" style="font-size:13px"></i></button>'
    + '</div>'
    + '</div>'
    + statsHTML
    + '<div style="margin-top:8px">' + viewBtn + '</div>'
    + '</div>';
}

function renderOverview() {
  const todayStr = fmtDate(TODAY);

  // ── Data sets ──
  const allTasks    = getTasks();
  const allEvents   = getEvents();
  const allEntries  = getEntries();

  // ── TODAY data ──────────────────────────────────────────────────────────
  // Tasks dated today: include active ones + those completed TODAY only
  // Tasks completed on previous days are excluded (they're done, not today's work)
  const dueTasks    = allTasks.filter(t =>
    t.dueDate === todayStr &&
    (parseStatus(t.status).state !== 'Completed' || isCompletedToday(t, todayStr))
  );
  const startTasks  = allTasks.filter(t =>
    t.startDate === todayStr && t.dueDate !== todayStr &&
    (parseStatus(t.status).state !== 'Completed' || isCompletedToday(t, todayStr))
  );
  const todayEvents = allEvents.filter(e => e.date === todayStr);
  const todayEntries= allEntries.filter(e => e.date === todayStr);

  // ── ALL TASKS data ───────────────────────────────────────────────────────
  const incompleteTasks = allTasks.filter(t => parseStatus(t.status).state !== 'Completed');

  // ── UPCOMING data (rolling 14 days from tomorrow) ─────────────────────────
  const upcomingDays = [];
  for (let i = 1; i <= 14; i++) {
    const d = new Date(TODAY);
    d.setDate(d.getDate() + i);
    upcomingDays.push(fmtDate(d));
  }

  // ── FILTER STATE ─────────────────────────────────────────────────────────
  // Primary group: 'today' | 'alltasks' | 'upcoming'
  // Sub-filters: Set of active sub-filter keys
  if (!window._gtGroup)   window._gtGroup   = 'today';
  if (!window._gtSubs)    window._gtSubs    = new Set();
  if (!window._gtCooldown) window._gtCooldown = false;

  const group = window._gtGroup;
  const subs  = window._gtSubs;

  // ── PILL COUNTS ───────────────────────────────────────────────────────────
  // Today counts — split active vs done
  const todayAllItems   = [...dueTasks, ...startTasks, ...todayEvents, ...todayEntries];
  // todayDone: tasks completed TODAY + events/entries marked Done today
  // Tasks completed on previous days are excluded (wrong date in doneAt)
  const todayDone       = todayAllItems.filter(i => isCompletedToday(i, todayStr));
  const todayActive     = todayAllItems.filter(i => !isCompletedToday(i, todayStr));
  const cTodayAll       = todayAllItems.length;   // primary pill: total
  const cTodayTasks     = todayActive.filter(i => i.type==='task').length;
  const cTodayEvents    = todayActive.filter(i => i.type==='event').length;
  const cTodayEntries   = todayActive.filter(i => i.type==='entry').length;
  const cTodayDone      = todayDone.length;       // Done sub-pill

  // All Tasks counts
  const cAllTasks   = incompleteTasks.length;
  const cHiPri      = incompleteTasks.filter(t => t.priority==='Critical'||t.priority==='High').length;
  const cInProg     = incompleteTasks.filter(t => parseStatus(t.status).state==='In Progress'||parseStatus(t.status).state==='Review').length;
  const cOverdue    = incompleteTasks.filter(t => t.dueDate && daysUntil(t.dueDate)<0).length;

  // Upcoming counts
  const cUpcoming   = upcomingDays.reduce((sum,d) => {
    return sum +
      incompleteTasks.filter(t => t.dueDate===d || t.startDate===d).length +
      allEvents.filter(e => e.date===d).length +
      allEntries.filter(e => e.date===d).length;
  }, 0);
  const cUpTasks    = upcomingDays.reduce((sum,d) => sum + incompleteTasks.filter(t => t.dueDate===d||t.startDate===d).length, 0);
  const cUpEvents   = upcomingDays.reduce((sum,d) => sum + allEvents.filter(e => e.date===d).length, 0);
  const cUpEntries  = upcomingDays.reduce((sum,d) => sum + allEntries.filter(e => e.date===d).length, 0);

  // ── GROUP/SUB CHANGE HANDLERS ────────────────────────────────────────────
  window._setGtGroup = (newGroup, direction) => {
    if (window._gtCooldown) return;
    if (window._gtGroup === newGroup) return;
    window._gtGroup = newGroup;
    window._gtSubs  = new Set(); // clear sub-filters on group change

    // Animate card list
    const col = document.getElementById('gt-main-col');
    if (col && direction) {
      const outClass = direction === 'up' ? 'sliding-up' : 'sliding-down';
      const inClass  = direction === 'up' ? 'sliding-in-down' : 'sliding-in-up';
      col.classList.add(outClass);
      window._gtCooldown = true;
      setTimeout(() => {
        col.classList.remove(outClass);
        renderOverview();
        // Apply slide-in after render
        const col2 = document.getElementById('gt-main-col');
        if (col2) {
          col2.classList.add(inClass);
          setTimeout(() => col2.classList.remove(inClass), 160);
        }
        setTimeout(() => { window._gtCooldown = false; }, 800);
      }, 150);
    } else {
      renderOverview();
    }
  };

  window._toggleGtSub = (subKey) => {
    if (window._gtSubs.has(subKey)) {
      window._gtSubs.delete(subKey);
    } else {
      window._gtSubs.add(subKey);
    }
    renderOverview();
  };

  // ── OVERSCROLL CAROUSEL HANDLER ──────────────────────────────────────────
  // Carousel order: today (middle) ↔ alltasks (above) ↔ upcoming (below)
  // Scrolling up past top → go to alltasks; scrolling down past bottom → go to upcoming
  // Wraps: alltasks ↔ upcoming when at boundaries of those groups
  const carouselOrder = ['alltasks', 'today', 'upcoming'];
  window._gtOverscroll = (direction) => {
    if (window._gtCooldown) return;
    const idx = carouselOrder.indexOf(window._gtGroup);
    if (direction === 'up' && idx > 0) {
      window._setGtGroup(carouselOrder[idx - 1], 'up');
    } else if (direction === 'up' && idx === 0) {
      // Wrap: alltasks → upcoming (going up from alltasks wraps to upcoming)
      window._setGtGroup('upcoming', 'up');
    } else if (direction === 'down' && idx < carouselOrder.length - 1) {
      window._setGtGroup(carouselOrder[idx + 1], 'down');
    } else if (direction === 'down' && idx === carouselOrder.length - 1) {
      // Wrap: upcoming → alltasks
      window._setGtGroup('alltasks', 'down');
    }
  };

  // ── Helper: navigate to planner tab ─────────────────────────────────────────
  window._goPlanner = () => {
    const btn = document.querySelector('.sidebar-btn[data-page="page-planner"]');
    if (btn) btn.click();
  };

  // ── PRIMARY PILL BUILDER ──────────────────────────────────────────────────
  const _isLightTheme = !isDarkTheme();
  const mkPrimaryPill = (key, count, label, hex) => {
    const active = group === key;
    const bgAlpha = _isLightTheme ? '20' : '18';
    return `<button class="gt-primary-pill${active ? ' active' : ''}"
      style="${active ? `border-color:${hex};color:${hex};background:${hex}${bgAlpha};` : ''}"
      onclick="window._setGtGroup('${key}', null)">
      <span class="gt-primary-pill-num" style="color:${active ? hex : 'var(--text2)'}">${count}</span>
      <span>${label}</span>
    </button>`;
  };

  // ── SUB-FILTER PILL BUILDER ───────────────────────────────────────────────
  const mkSubPill = (key, count, label, hex) => {
    if (count === 0) return ''; // hide if no items
    const active = subs.has(key);
    const bgAlpha = _isLightTheme ? '20' : '18';
    return `<button class="gt-sub-pill${active ? ' active' : ''}"
      style="${active ? `border-color:${hex};color:${hex};background:${hex}${bgAlpha};` : ''}"
      onclick="window._toggleGtSub('${key}')">
      <span class="gt-sub-pill-num" style="color:${active ? hex : 'var(--text2)'}">${count}</span>
      <span>${label}</span>
    </button>`;
  };

  // ── PILL STRIP HTML ───────────────────────────────────────────────────────
  const _pillHex = {
    today:    _isLightTheme ? '#0F766E' : '#4F9AB5',
    done:     _isLightTheme ? '#166534' : '#34D399',
    alltasks: _isLightTheme ? '#0E7490' : '#38BDF8',
    upcoming: _isLightTheme ? '#166534' : '#34D399',
    tasks:    _isLightTheme ? '#0F766E' : '#4F9AB5',
    events:   _isLightTheme ? '#0891B2' : '#22D3EE',
    entries:  _isLightTheme ? '#B45309' : '#FBBF24',
    hipri:    _isLightTheme ? '#DC2626' : '#F87171',
    inprog:   _isLightTheme ? '#7C3AED' : '#C084FC',
    overdue:  _isLightTheme ? '#DC2626' : '#F87171',
  };

  // Sub-filters per group
  let subPillsHTML = '';
  if (group === 'today') {
    const _doneDivider = cTodayDone > 0
      ? `<span style="width:1px;height:16px;background:var(--border);margin:0 2px;display:inline-block;vertical-align:middle;flex-shrink:0"></span>`
      : '';
    subPillsHTML =
      mkSubPill('tasks',   cTodayTasks,   'TASKS',   _pillHex.tasks)   +
      mkSubPill('events',  cTodayEvents,  'EVENTS',  _pillHex.events)  +
      mkSubPill('entries', cTodayEntries, 'ENTRIES', _pillHex.entries) +
      _doneDivider +
      mkSubPill('done', cTodayDone, 'DONE', _pillHex.done);
  } else if (group === 'alltasks') {
    subPillsHTML =
      mkSubPill('hipri',   cHiPri,  'HIGH PRIORITY', _pillHex.hipri)  +
      mkSubPill('inprog',  cInProg, 'IN PROGRESS',   _pillHex.inprog) +
      mkSubPill('overdue', cOverdue,'OVERDUE',        _pillHex.overdue);
  } else if (group === 'upcoming') {
    subPillsHTML =
      mkSubPill('tasks',   cUpTasks,   'TASKS',   _pillHex.tasks)   +
      mkSubPill('events',  cUpEvents,  'EVENTS',  _pillHex.events)  +
      mkSubPill('entries', cUpEntries, 'ENTRIES', _pillHex.entries);
  }
  // If all sub-pills returned empty string (all zeros), hide the sub strip
  const hasSubPills = subPillsHTML.trim().length > 0;

  const pillStripHTML = `
    <div class="gt-pill-strip">
      ${mkPrimaryPill('today',    cTodayAll,  'TODAY',    _pillHex.today)}
      ${mkPrimaryPill('alltasks', cAllTasks,  'OPEN TASKS',_pillHex.alltasks)}
      ${mkPrimaryPill('upcoming', cUpcoming,  'UPCOMING', _pillHex.upcoming)}
    </div>
    <div class="gt-subpill-strip visible">
      ${subPillsHTML}
      <button class="gt-new-btn" onclick="openTEEModal(null,'task','${todayStr}')">+ New Task</button>
    </div>`;

  // ── DAY DIVIDER BUILDER ───────────────────────────────────────────────────
  const buildDayDivider = (dateStr, count, isWeekBoundary) => {
    if (count === 0) return ''; // hide if no items
    const d = new Date(dateStr + 'T00:00:00');
    const label = d.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
    const countBadge = `<span class="${isWeekBoundary?'gt-week-boundary-count':'gt-day-hdr-count'}">${count} item${count!==1?'s':''}</span>`;
    return `<div class="${isWeekBoundary?'gt-week-boundary':'gt-day-hdr'}">
      <span>${isWeekBoundary ? '📅 ' : ''}${label}</span>
      ${countBadge}
    </div>`;
  };

  // ── SORT HELPERS ──────────────────────────────────────────────────────────
  const PRIORITY_ORDER = { Critical:0, High:1, Medium:2, Low:3 };
  const STATUS_ORDER   = { 'In Progress':0, Review:1, 'To Do':2, Backlog:3 };
  const sortByProximityThenPriority = (a, b) => {
    const da = a.dueDate || a.startDate || '9999-99-99';
    const db = b.dueDate || b.startDate || '9999-99-99';
    if (da !== db) return da < db ? -1 : 1;
    const pa = PRIORITY_ORDER[a.priority] ?? 99;
    const pb = PRIORITY_ORDER[b.priority] ?? 99;
    if (pa !== pb) return pa - pb;
    const sa = STATUS_ORDER[a.status] ?? 99;
    const sb = STATUS_ORDER[b.status] ?? 99;
    return sa - sb;
  };
  const sortForToday = (a, b) => {
    // Type order: task first, then event, then entry
    const typeOrd = {task:0, event:1, entry:2};
    const ta = typeOrd[a.type] ?? 3, tb = typeOrd[b.type] ?? 3;
    if (ta !== tb) return ta - tb;
    // Time within type
    const tma = a.time || '99:99', tmb = b.time || '99:99';
    if (tma !== tmb) return tma < tmb ? -1 : 1;
    // Priority last
    return (PRIORITY_ORDER[a.priority]??99) - (PRIORITY_ORDER[b.priority]??99);
  };

  // ── BUILD CARD ─────────────────────────────────────────────────────────────
  const buildGtCard = (item) => {
    // Unified chip/badge system
    const evBorder      = _buildAccentBorder(item.priority);
    const priorityBadge = _buildPriorityBadge(item);
    const statusBadge   = _buildStatusBadge(item);
    const typeBadge2    = _buildTypeBadge(item.type);
    const dueChip       = item.type === 'task' ? _buildCounterChip(item.dueDate) : '';
    const ctxChips      = item.type === 'task' ? _buildContextChips(item) : '';
    // Tags
    const allTags  = (item.tags||[]).slice(0,6);
    const tagsRow1 = allTags.slice(0,3);
    const tagsRow2 = allTags.slice(3);
    const mkTag    = tag => _buildTagChip(tag);
    // Subtask chip
    const subtaskChip = _subtaskChip(item);
    // Category badge (Today tab specific)

    // Meta right — done time or date/time
    const dateDisplay = item.type==='task' ? (item.dueDate||'') : (item.date||'');
    const timeDisplay = item.time ? fmtTime(item.time) : '';
    const { state: _mState, doneAt: _doneAt } = parseStatus(item.status);
    let metaRight;
    if ((_mState === 'Completed' || _mState === 'Done') && _doneAt) {
      const _dp = _doneAt.split(' ');
      metaRight = 'Done at ' + (_dp[1] ? fmtTime(_dp[1]) : _doneAt);
    } else {
      metaRight = [timeDisplay, dateDisplay].filter(Boolean).join(' · ');
    }
    return `<div class="gt-card" onclick="openTEEDetail('${item.id}')" style="${evBorder}">
      <div class="gt-card-row1">
        ${typeBadge2}${priorityBadge}${statusBadge}
        <span class="gt-card-row1-right" style="display:flex;align-items:center;gap:4px">
          ${ctxChips}${subtaskChip}
        </span>
      </div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin:4px 0 2px">
        <div class="gt-card-title" style="margin:0;flex:1;min-width:0">${item.title}</div>
        ${tagsRow1.length ? `<div style="display:flex;gap:3px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:50%">${tagsRow1.map(mkTag).join('')}</div>` : ''}
      </div>
      ${(!!item.desc||tagsRow2.length) ? `<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
        ${item.desc ? `<div class="gt-card-desc-sm" style="flex:1;min-width:0">${item.desc}</div>` : '<div></div>'}

  // ── MAIN CONTENT ──────────────────────────────────────────────────────────
  let mainHTML = '';
  const emptyToday    = `<div class="today-empty"><div style="font-size:40px;margin-bottom:10px">☀️</div><div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px">All Clear For Today!</div><div style="font-size:13px;color:var(--text2)">Enjoy the Day</div></div>`;
  const emptyOpenTasks = `<div class="today-empty"><div style="font-size:40px;margin-bottom:10px">👍</div><div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px">No Open Tasks!</div><div style="font-size:13px;color:var(--text2)">Jobs A Good'un</div></div>`;

  if (group === 'today') {
    // Sub-filter: if subs empty → show all; else show union of selected types
    let allTodayItems = [
      ...dueTasks.map(t =>    ({...t, _badge:'DUE Today', _badgeClass:'gt-badge-today'})),
      ...startTasks.map(t =>  ({...t, _badge:'Starting',  _badgeClass:'gt-badge-start'})),

    // Separate active and done
    const doneItems   = allTodayItems.filter(i => isCompletedToday(i, todayStr));

  } else if (group === 'alltasks') {
    // All incomplete tasks, sorted by proximity → priority → status
    let items = [...incompleteTasks];
    if (subs.size > 0) {
      items = items.filter(t => {

    items.sort(sortByProximityThenPriority);

    // Group by proximity bucket with day dividers
    const buckets = new Map(); // dateStr → items[]

    // Overdue bucket
    const overdueBucket = items.filter(t => t.dueDate && daysUntil(t.dueDate)<0);

    }
    restBuckets.forEach((dayItems, dateStr) => {
      if (!dayItems.length) return;
      const badge = dateStr === todayStr ? 'DUE Today' : dateStr === 'no-date' ? '' : 'Due';
      const badgeClass = dateStr === todayStr ? 'gt-badge-today' : 'gt-badge-start';
      blocks += buildDayDivider(dateStr === 'no-date' ? null : dateStr, dayItems.length, false);
      if (dateStr === 'no-date') {

      blocks += `<div class="gt-task-list" style="margin-bottom:12px">${dayItems.map(t=>buildGtCard(t)).join('')}</div>`;
    });
    mainHTML = blocks || (group === 'alltasks' ? emptyOpenTasks : emptyUpcoming);

  } else if (group === 'upcoming') {
    // Rolling 14 days, grouped by date with week boundary dividers
    let blocks = '';
    upcomingDays.forEach(dateStr => {
      let dayTasks   = incompleteTasks.filter(t => t.dueDate===dateStr || t.startDate===dateStr);
      let dayEvents  = allEvents.filter(e => e.date===dateStr);
      let dayEntries = allEntries.filter(e => e.date===dateStr);

      // Apply sub-filters
      if (subs.size > 0) {
        if (!subs.has('tasks'))   dayTasks   = [];
        if (!subs.has('events'))  dayEvents  = [];
        if (!subs.has('entries')) dayEntries = [];
      }

      const dayCount = dayTasks.length + dayEvents.length + dayEntries.length;
      if (dayCount === 0) return; // skip empty days

      // Check if this date is a Monday (week boundary — Sunday just passed)
      const d = new Date(dateStr + 'T00:00:00');
      const isMonday = d.getDay() === 1;

      blocks += buildDayDivider(dateStr, dayCount, isMonday);

      // Sort: tasks → events → entries, then time, then priority
      const items = [
        ...dayTasks.sort(sortByProximityThenPriority).map(t => ({...t, _badge: t.dueDate===dateStr?'Due':'Starting', _bc: 'gt-badge-start'})),
        ...dayEvents.sort((a,b) => (a.time||'99:99') < (b.time||'99:99') ? -1 : 1).map(e => ({...e, _badge:'Event', _bc:'gt-badge-event'})),
        ...dayEntries.map(e => ({...e, _badge:'Entry', _bc:'gt-badge-entry'})),

    mainHTML = blocks || (group === 'alltasks' ? emptyOpenTasks : emptyUpcoming);
  }

  // ── OVERSCROLL: re-attach listeners after every render ─────────────────
  // gt-main-col is recreated each render — use rAF to attach after DOM settles
  // Clone node to cleanly remove any stale listeners before re-attaching
  requestAnimationFrame(() => {
    const col = document.getElementById('gt-main-col');
    if (!col) return;
    // Replace node with clone to strip stale event listeners
    const fresh = col.cloneNode(true);
    col.parentNode.replaceChild(fresh, col);
    const c = document.getElementById('gt-main-col');
    if (!c) return;

    // Desktop — wheel boundary detection
    c.addEventListener('wheel', (e) => {
      if (window._gtCooldown) return;
      const atTop    = c.scrollTop <= 0;
      const atBottom = c.scrollTop + c.clientHeight >= c.scrollHeight - 2;
      if (atTop && e.deltaY < 0) {
        e.preventDefault(); window._gtOverscroll('up');
      } else if (atBottom && e.deltaY > 0) {
        e.preventDefault(); window._gtOverscroll('down');
      }
    }, { passive: false });

    // Mobile — touch boundary detection (60px threshold)
    let _ty = 0, _ts = 0;
    c.addEventListener('touchstart', (e) => {
      _ty = e.touches[0].clientY; _ts = c.scrollTop;
    }, { passive: true });
    c.addEventListener('touchend', (e) => {
      if (window._gtCooldown) return;
      const dy = _ty - e.changedTouches[0].clientY;
      if (_ts <= 0 && dy < -60)
        window._gtOverscroll('up');
      else if (_ts + c.clientHeight >= c.scrollHeight - 2 && dy > 60)
        window._gtOverscroll('down');
    }, { passive: true });
  });

     // ── Pinned notes panel ──
  const buildPinnedNotesPanel = () => {
    const pinnedNotes = [...STATE.stickies].filter(s=>s.pinned)
      .sort((a,b)=>(parseInt((b.id||'').replace(/\D/g,''),10)||0)-(parseInt((a.id||'').replace(/\D/g,''),10)||0));

    return `<div class="gt-panel-card gt-notes-card">

    </div>
    <div class="gt-notes-list">
    ${pinnedNotes.length===0
      ? `<div style="text-align:center;padding:16px 8px;color:var(--muted);font-size:12px">No pinned notes yet.<br><button class="btn-ghost" style="margin-top:8px;height:26px;padding:0 10px;font-size:11px" onclick="openPinnedNoteModal()">+ Add Note</button></div>`
      : pinnedNotes.map((s,idx)=>{

            <button class="gt-pin-unpin" onclick="toggleNotePin('${s.id}',false)">📌</button>
            <div id="${noteId}" style="font-size:11px;line-height:1.55;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden">${s.text}</div>
            ${s.text.length>120?`<button onclick="togglePinExpand('${noteId}',this)" style="background:none;border:none;font-size:10px;color:${c.text};opacity:0.65;cursor:pointer;padding:2px 0;font-family:var(--font);display:block;margin-top:3px">▼ more</button>`:''}
          </div>`;

    }

  };
  const pinnedPanelHTML = buildPinnedNotesPanel();

  // ── Mini calendar ──
  const buildMiniCalendar = () => {
    const yr = TODAY.getFullYear(), mo = TODAY.getMonth();
    const firstDay  = new Date(yr,mo,1).getDay();
    const daysInMo  = new Date(yr,mo+1,0).getDate();
    const prevDays  = new Date(yr,mo,0).getDate();
    const moLabel   = TODAY.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    const dayLabels = ['S','M','T','W','T','F','S'].map(d=>`<div class="gt-mc-dlbl">${d}</div>`).join('');
    // Build activity map — single blue dot only
    const actMap = {};
    STATE.items.forEach(item=>{
      const d = item.dueDate||item.startDate||item.date||'';
      if(!d||!d.startsWith(`${yr}-${String(mo+1).padStart(2,'0')}`)) return;
      const day = parseInt(d.split('-')[2],10);

    let cells = '';
    for(let i=firstDay-1;i>=0;i--) cells+=`<div class="gt-mc-cell other">${prevDays-i}</div>`;
    for(let d=1;d<=daysInMo;d++){
      const isToday=d===TODAY.getDate();

      const cls=['gt-mc-cell',isToday?'today-mc':'',has?'has-items':''].filter(Boolean).join(' ');
      const dateStr=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      cells+=`<div class="${cls}" onclick="openDayList('${dateStr}')" title="${dateStr}">${d}</div>`;
    }
    const total=Math.ceil((firstDay+daysInMo)/7)*7;
    for(let i=1;i<=total-firstDay-daysInMo;i++) cells+=`<div class="gt-mc-cell other">${i}</div>`;
    return `<div class="gt-panel-card gt-mini-cal">
      <div class="gt-panel-hdr">

        <button class="btn-ghost" style="height:22px;padding:0 8px;font-size:11px" onclick="window._goPlanner()">Full →</button>
      </div>

      <div class="gt-mc-legend"><span><i style="background:var(--accent2)"></i>Has items</span></div>
    </div>`;
  };
  const miniCalHTML = buildMiniCalendar();

  // ── Today header: bold title left, date right ──
  const todayDateStr = TODAY.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  document.getElementById('overviewSection').innerHTML = `
    <div class="gt-hero">
      <div style="display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap">

          group==="today"
            ? 'Today Overview'
            : group==="alltasks"
              ? '<span>Open Tasks</span><em> · Full List</em>'

        }</div>

      </div>

      <div class="gt-main-col" id="gt-main-col">

        <div class="gt-cal-section">${miniCalHTML}</div>

}

// ═══════════════════════════════════════════════════════════
// PLANNER — Weekly grid view + Monthly calendar view
// Supports sort (Default / Priority / By Time) and archive mode
// ═══════════════════════════════════════════════════════════
function getWeekStart(offset) {
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - ((now.getDay()+6)%7) + (offset * 7));
  weekStart.setHours(0,0,0,0);
  return weekStart;
}

// plannerView is now part of STATE directly

/* Sort items for planner display according to STATE.plannerSort:
   'default' → Due tasks first, then time-based (events+entries by time), then start-date tasks
   'priority' → All items by priority (Critical→Low), time-based still uses time within same priority
   'time'     → All items with a time sorted by time; due/start tasks at bottom */

function sortPlannerItems(dueTasks, startTasks, timedItems) {
  const sort = STATE.plannerSort || 'default';

  if (sort === 'default') {
    // Due → timed (events+entries by time) → start
    const timed = timedItems.slice().sort((a,b) => (a.time||'').localeCompare(b.time||''));
    return [...dueTasks, ...timed, ...startTasks];
  }
  if (sort === 'priority') {
    const all = [...dueTasks, ...timedItems, ...startTasks];
    return all.sort((a,b) => {
      const pd = (PRIORITY_ORDER[a.priority]??3) - (PRIORITY_ORDER[b.priority]??3);
      if (pd !== 0) return pd;
      return (a.time||'').localeCompare(b.time||'');
    });
  }
  if (sort === 'time') {
    // Time-based items first sorted by time, due/start at bottom
    const timed = timedItems.slice().sort((a,b) => (a.time||'').localeCompare(b.time||''));
    return [...timed, ...dueTasks, ...startTasks];
  }
  return [...dueTasks, ...timedItems, ...startTasks];
}

// ── Planner navigation helpers ──────────────────────────────────────
function _plannerPrev() {
  const v = STATE.plannerView;
  if (v === 'month') calNav(-1);
  else if (v === 'week') changeWeek(-1);
  else { STATE.plannerDayOffset -= 1; renderPlanner(); }
}

function _plannerNext() {
  const v = STATE.plannerView;
  if (v === 'month') calNav(1);
  else if (v === 'week') changeWeek(1);
  else { STATE.plannerDayOffset += 1; renderPlanner(); }
}

function _plannerToday() {
  // Always navigate to Day View of today regardless of current view
  STATE.plannerView      = 'day';
  STATE.plannerDayOffset = 0;
  renderPlanner();
}

function _plannerGoDay(dateStr) {
  // Navigate to Day view for a specific date string (YYYY-MM-DD)
  const today    = new Date(fmtDate(TODAY) + 'T00:00:00');
  const target   = new Date(dateStr + 'T00:00:00');
  const diffMs   = target - today;
  const diffDays = Math.round(diffMs / 86400000);
  STATE.plannerView      = 'day';
  STATE.plannerDayOffset = diffDays;
  renderPlanner();
}

function changePlannerDay(dir) {
  STATE.plannerDayOffset = (STATE.plannerDayOffset || 0) + dir;
  renderPlanner();
}


function _plannerOpenItem(id) {
  openTEEDetail(id);
}

function _plannerSetView(v) {
  STATE.plannerView = v;
  STATE._plannerCellH = null; // reset on view change so height is re-measured
  renderPlanner();
}


function renderPlanner() {
  const container = document.getElementById('plannerSection');
  if (!container) return;
  try {

  // ── State defaults ─────────────────────────────────────────────────
  if (!STATE.plannerView)    STATE.plannerView    = 'month';
  if (!STATE.plannerFilter)  STATE.plannerFilter  = { tasks:true, events:true, entries:true };
  if (STATE.plannerDayOffset  == null) STATE.plannerDayOffset  = 0;
  if (STATE.plannerWeekOffset == null) STATE.plannerWeekOffset = 0;

  const view = STATE.plannerView;
  const pf   = STATE.plannerFilter;

  // ── Priority CSS class helper ───────────────────────────────────────
  // ── Theme + shared values ────────────────────────────────────────
  const _isLT = !isDarkTheme();
  const _bgA  = _isLT ? '20' : '18';

  const ppClass = p =>
    p==='Critical' ? 'pp-crit' :
    p==='High'     ? 'pp-high' :
    p==='Medium'   ? 'pp-med'  : 'pp-low';

// Priority sort order: Critical=0, High=1, Medium=2, Low=3, other=4
  const priOrder = p =>
    p==='Critical' ? 0 : p==='High' ? 1 : p==='Medium' ? 2 : p==='Low' ? 3 : 4;
  const sortByPriority = arr =>
    arr.slice().sort((a,b) => priOrder(a.priority) - priOrder(b.priority));

  // ── Nav label (adapts per view) ────────────────────────────────────
  let navLabel = '';
  if (view === 'month') {
    navLabel = MONTHS[STATE.calMonth] + ' ' + STATE.calYear;
  } else if (view === 'week') {
    const ws = getWeekStart(STATE.plannerWeekOffset);
    const we = new Date(ws); we.setDate(ws.getDate() + 6);
    const fmt = d => d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    navLabel = fmt(ws) + ' — ' + fmt(we) + ', ' + ws.getFullYear();
  } else {
    const d = new Date(TODAY);
    d.setDate(d.getDate() + (STATE.plannerDayOffset || 0));
    navLabel = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  }

  // ── Filter pill counts (scoped to current view range) ──────────────
  let allInScope = [];
  if (view === 'month') {
    const y = STATE.calYear, m = STATE.calMonth;
    allInScope = STATE.items.filter(i => {
      const d = i.type === 'task' ? (i.dueDate || i.startDate) : i.date;
      if (!d) return false;
      const dt = new Date(d + 'T00:00:00');
      return dt.getFullYear() === y && dt.getMonth() === m;
    });
  } else if (view === 'week') {
    const ws    = getWeekStart(STATE.plannerWeekOffset);
    const we    = new Date(ws); we.setDate(ws.getDate() + 6);
    const wsStr = fmtDate(ws), weStr = fmtDate(we);
    allInScope = STATE.items.filter(i => {
      const d = i.type === 'task' ? (i.dueDate || i.startDate) : i.date;
      return d && d >= wsStr && d <= weStr;
    });
  } else {
    const d   = new Date(TODAY);
    d.setDate(d.getDate() + (STATE.plannerDayOffset || 0));
    const ds  = fmtDate(d);
    allInScope = STATE.items.filter(i => {
      const id = i.type === 'task' ? (i.dueDate || i.startDate) : i.date;
      return id === ds;
    });
  }
  const cntT  = allInScope.filter(i => i.type === 'task').length;
  const cntEv = allInScope.filter(i => i.type === 'event').length;
  const cntEn = allInScope.filter(i => i.type === 'entry').length;

  // ── Build shared header ─────────────────────────────────────────────
  const buildPlannerHeader = () => {
    const viewSubLabel = view === 'month' ? 'Month View'
                       : view === 'week'  ? 'Week View' : 'Day View';

    const _fHex = {
      tasks:   _isLT ? '#0F766E' : '#4F9AB5',
      events:  _isLT ? '#0891B2' : '#22D3EE',
      entries: _isLT ? '#B45309' : '#FBBF24',
    };
    const mkFP = (type, label, count) => {
      const active  = pf[type];
      const hex     = _fHex[type];
      const actSty  = active ? 'border-color:' + hex + ';color:' + hex + ';background:' + hex + _bgA + ';' : '';
      const cls     = active ? ' active ' + type : '';
      const oc      = 'STATE.plannerFilter[\''+type+'\']=!STATE.plannerFilter[\''+type+'\'];renderPlanner()';

    let hdr = '<div class="planner-hero">';

    hdr += '<button class="planner-vpill' + (view === 'month' ? ' active' : '') + '"'

    hdr += '<button class="planner-vpill' + (view === 'week'  ? ' active' : '') + '"'

    hdr += '</div>'; // end nav-row

    // Filter pills row
    // Open Tasks pill — Day view only, hidden when 0
    let openTasksPill = '';
    if (view === 'day') {
      const _dayOffset2 = STATE.plannerDayOffset || 0;
      const _dDay2 = new Date(TODAY); _dDay2.setDate(_dDay2.getDate() + _dayOffset2);
      const _dayDate2 = fmtDate(_dDay2);
      const _openStatuses2 = ['Backlog','To Do','In Progress','Review'];
      const _openCount = getTasks().filter(t => {
        const st = parseStatus(t.status).state;
        if (st === 'Completed') return false;
        if (t.dueDate === _dayDate2) return false;
        if (t.startDate === _dayDate2 && t.dueDate !== _dayDate2) return false;
        const isOverdue2 = t.dueDate && daysUntil(t.dueDate) < 0;
        return _openStatuses2.includes(st) || isOverdue2;

      if (_openCount > 0) {
        const _isOpen = STATE.plannerActiveTasksOpen;
        const _oc = 'STATE.plannerActiveTasksOpen=!STATE.plannerActiveTasksOpen;renderPlanner()';
        const _actSty = _isOpen

        openTasksPill = '<button class="planner-fpill" style="' + _actSty + '" onclick="' + _oc + '">'

    hdr += '<div class="planner-filter-row">';
    hdr += mkFP('tasks',   'Tasks',   cntT);

  };
  const hdr = buildPlannerHeader();

  // ── MONTH VIEW ────────────────────────────────────────────────────
  if (view === 'month') {
    const yr = STATE.calYear;
    const mo = STATE.calMonth;
    const firstDay    = new Date(yr, mo, 1).getDay();
    const daysInMonth = new Date(yr, mo + 1, 0).getDate();
    const daysInPrev  = new Date(yr, mo, 0).getDate();
    const archiveMode = isArchivePeriod(yr + '-' + String(mo + 1).padStart(2,'0') + '-01');
    const archKey     = yr + '-' + String(mo + 1).padStart(2,'0');

    // If archive month not yet loaded, fetch then re-render
    if (archiveMode && !STATE.archiveCache[archKey] && !STATE.archiveCache._fetched) {
      container.innerHTML = hdr
        + '<div style="padding:24px;color:var(--muted);font-size:13px;text-align:center">'

    }

    // Item source — archive cache or live STATE
    const itemsForDate = dateStr => {

        i.type === 'task' ? i.dueDate === dateStr : i.date === dateStr

    // Build a single cal-label chip — returns '' if filtered out
    const mkLabel = item => {
      if (!pf.tasks   && item.type === 'task')  return '';
      if (!pf.events  && item.type === 'event') return '';
      if (!pf.entries && item.type === 'entry') return '';
      const cls   = ppClass(item.priority);

    };

    // Build calendar cells
    let cellsHTML = '';
    let cellCount = 0;

    // Previous month overflow
    for (let i = firstDay - 1; i >= 0; i--) {
      cellsHTML += '<div class="planner-cal-cell other-month">'
        + '<div class="planner-cal-date-row">'
        + '<span class="planner-cal-date">' + (daysInPrev - i) + '</span>'
        + '</div></div>';
      cellCount++;
    }

    // Current month days
    for (let dd = 1; dd <= daysInMonth; dd++) {
      const dateStr  = yr + '-' + String(mo + 1).padStart(2,'0') + '-' + String(dd).padStart(2,'0');
      const isToday  = dateStr === fmtDate(TODAY);
      const dayItems = itemsForDate(dateStr);


      // Filter by active pills
      const _filtered = dayItems.filter(i =>
        (i.type === 'task'  && pf.tasks)   ||
        (i.type === 'event' && pf.events)  ||
        (i.type === 'entry' && pf.entries)
      );
      // Sort: priority first, then type (task→event→entry), then time
      const typeOrder = t => t.type === 'task' ? 0 : t.type === 'event' ? 1 : 2;
      const visItems = _filtered.slice().sort((a,b) => {
        const pd = priOrder(a.priority) - priOrder(b.priority);
        if (pd !== 0) return pd;
        const td = typeOrder(a) - typeOrder(b);
        if (td !== 0) return td;
        return (a.time||'').localeCompare(b.time||'');
      });

      // Dynamic item count — based on actual measured cell height
      const _storedH = STATE._plannerCellH || Math.max(72, window.innerHeight * 0.12);
      // Usable height = cell - date row (26px) - potential +more row (16px)
      // Each label chip is ~18px tall
      const _usableH  = Math.max(0, _storedH - 26 - 16);
      const maxItems  = Math.max(1, Math.floor(_usableH / 18));
      const shown     = visItems.slice(0, maxItems);
      const extra     = visItems.length - maxItems;

      let labelsHTML = shown.map(mkLabel).join('');
      if (extra > 0) {
        labelsHTML += '<span class="planner-cal-more">+' + extra + ' more</span>';
      }


      const todayCls  = isToday ? ' is-today' : '';
      const archiveCls = archiveMode ? ' archived-col' : '';

      cellsHTML += '<div class="planner-cal-cell' + todayCls + archiveCls + '"'
        + ' onclick="_plannerGoDay(\''+dateStr+'\');">'
        + '<div class="planner-cal-date-row">'
        + '<span class="planner-cal-date">' + dd + '</span>'
        + '</div>'
        + labelsHTML
        + '</div>';
      cellCount++;
    }

    // Fill to nearest complete row (5 rows = 35, 6 rows = 42)
    // Only add a 6th row if the month actually needs it
    const totalNeeded = cellCount <= 35 ? 35 : 42;
    for (let dd = 1; dd <= totalNeeded - cellCount; dd++) {
      cellsHTML += '<div class="planner-cal-cell other-month">'
        + '<div class="planner-cal-date-row">'
        + '<span class="planner-cal-date">' + dd + '</span>'
        + '</div></div>';
    }

    // Day-of-week header row
    const dowHTML = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
      .map(d => '<div class="planner-dow">' + d + '</div>')
      .join('');

    // Archive badge
    let archiveHTML = '';
    if (archiveMode) {
      archiveHTML = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
        + '<span class="planner-archive-badge">'
        + '<i class="ti ti-archive" style="font-size:11px"></i>'
        + 'Archived · read only'
        + '</span>'
        + '<button class="planner-archive-link"'
        + ' onclick="STATE.calYear=new Date().getFullYear();STATE.calMonth=new Date().getMonth();renderPlanner()">'
        + 'Back to current month ›'

    }

    container.innerHTML = hdr + archiveHTML
      + '<div class="planner-month-wrap">'
      + '<div class="planner-dow-row">' + dowHTML + '</div>'
      + '<div class="planner-cal-grid" id="plannerCalGrid">' + cellsHTML + '</div>'
      + '</div>';

    // Attach ResizeObserver to the grid — fires on any size change
    // (initial render, window resize, monitor change, sidebar collapse)
    requestAnimationFrame(() => {
      const grid = document.getElementById('plannerCalGrid');
      if (!grid) return;

      // Disconnect any previous observer
      if (STATE._plannerRO) { STATE._plannerRO.disconnect(); STATE._plannerRO = null; }

      STATE._plannerRO = new ResizeObserver(() => {
        const firstCell = grid.querySelector('.planner-cal-cell:not(.other-month)');
        if (!firstCell) return;
        const actualH = firstCell.offsetHeight;
        if (actualH < 10) return;
        const newMax = Math.max(3, Math.floor((actualH - 28) / 18));
        const oldMax = Math.max(3, Math.floor(((STATE._plannerCellH || 0) - 28) / 18));
        if (actualH !== STATE._plannerCellH) {
          const prevH  = STATE._plannerCellH || actualH;
          STATE._plannerCellH = actualH;

          if (newMax !== oldMax || Math.abs(actualH - prevH) > 4) {

        }
      });

    });

  }

  // ── WEEK VIEW ─────────────────────────────────────────────────────
  if (view === 'week') {
    const ws         = getWeekStart(STATE.plannerWeekOffset);
    const archiveMode = isArchivePeriod(fmtDate(ws));
    const archY      = ws.getFullYear();
    const archM      = ws.getMonth();
    const archKey    = archY + '-' + String(archM + 1).padStart(2,'0');

    if (archiveMode && !STATE.archiveCache[archKey] && !STATE.archiveCache._fetched) {
      container.innerHTML = hdr
        + '<div style="padding:24px;color:var(--muted);font-size:13px;text-align:center">'
        + '<i class="ti ti-loader" style="font-size:24px;opacity:0.4;display:block;margin-bottom:8px"></i>'

      return;
    }

    // Build a chip — returns '' if filtered out
    const mkChip = (item, fallbackLabel) => {
      if (item.type === 'task'  && !pf.tasks)   return '';
      if (item.type === 'event' && !pf.events)  return '';
      if (item.type === 'entry' && !pf.entries) return '';
      const cls      = ppClass(item.priority);
      const timeLabel = item.time ? fmtTime(item.time) : fallbackLabel;
      const title     = (item.title || '').replace(/"/g, '&quot;');
      return '<div class="planner-chip ' + cls + '"'
           + ' onclick="_plannerOpenItem(\''+item.id+'\');">'
           + '<span class="planner-chip-lbl">' + timeLabel + '</span>'
           + '<span class="planner-chip-title">' + title + '</span>'
           + '</div>';
    };

    let dayColsHTML = '';
    let hasAnyItems = false;

    // Sort: due tasks, start tasks, events by time, entries by time
    const sortByTime = arr => arr.slice().sort((a,b) => (a.time||'').localeCompare(b.time||''));

    for (let i = 0; i < 7; i++) {
      const d       = new Date(ws); d.setDate(ws.getDate() + i);
      const dayDate = fmtDate(d);
      const isToday = dayDate === fmtDate(TODAY);
      const dayName = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][i];

      let dueT, startT, evts, ents;
      if (archiveMode) {
        const src = STATE.archiveCache[archKey] || [];
        dueT   = src.filter(t => t.type === 'task'  && t.dueDate    === dayDate);
        startT = src.filter(t => t.type === 'task'  && t.startDate  === dayDate && t.dueDate !== dayDate);
        evts   = src.filter(e => e.type === 'event' && e.date       === dayDate);
        ents   = src.filter(e => e.type === 'entry' && e.date       === dayDate);
      } else {
        dueT   = getTasks().filter(t => t.dueDate   === dayDate && parseStatus(t.status).state !== 'Completed');
        startT = getTasks().filter(t => t.startDate === dayDate && t.dueDate !== dayDate && parseStatus(t.status).state !== 'Completed');
        evts   = getEvents().filter(e => e.date === dayDate);

      // Sort: due tasks by priority, start tasks by priority,

      const chips = sortByPriority(dueT).map(t => mkChip(t, 'DUE')).join('')
        + sortByPriority(startT).map(t => mkChip(t, 'START')).join('')
        + timedEvtsEnts.map(e => mkChip(e, '')).join('');

      const todayCls   = isToday ? ' is-today' : '';
      const archiveCls = archiveMode ? ' archived-col' : '';
      const todayDot   = isToday ? '<div class="planner-today-dot"></div>' : '';
      const addBtn     = !archiveMode
        ? '<div class="planner-day-add"><button onclick="openTEEModal(null,null,\''+dayDate+'\')">+ Add</button></div>'
        : '';

      dayColsHTML += '<div class="planner-day-col' + todayCls + archiveCls + '">'
        + '<div class="planner-day-hdr">'
        + '<span class="planner-day-name">' + dayName + '</span>'
        + '<span class="planner-day-num">' + d.getDate() + '</span>'

        + '</div>'
        + '<div class="planner-day-items">' + chips + '</div>'

        + '</div>';

    // Archive badge
    let archiveBadge = '';
    if (archiveMode) {
      archiveBadge = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'

        + '<i class="ti ti-archive" style="font-size:11px"></i>'
        + 'Archived · read only</span>'
        + '<button class="planner-archive-link" onclick="changeWeek(0)">'

    let emptyHTML = '';
    if (!hasAnyItems) {
      emptyHTML = '<div class="planner-empty-week">'

        + '<span>Nothing scheduled this week</span>'
        + '</div>';

      + '<div class="planner-week-grid">' + dayColsHTML + '</div>'
      + emptyHTML;
    return;
  }

  // ── DAY VIEW ─────────────────────────────────────────────────────
  if (view === 'day') {
    const dayOffset  = STATE.plannerDayOffset || 0;
    const dDay       = new Date(TODAY); dDay.setDate(dDay.getDate() + dayOffset);
    const dayDate    = fmtDate(dDay);
    const archiveMode = isArchivePeriod(dayDate);
    const archKey    = dayDate.substring(0, 7);

    if (archiveMode && !STATE.archiveCache[archKey] && !STATE.archiveCache._fetched) {
      container.innerHTML = hdr
        + '<div style="padding:24px;color:var(--muted);font-size:13px;text-align:center">'
        + 'Loading…</div>';
      fetchArchiveMonth(dDay.getFullYear(), dDay.getMonth()).then(() => renderPlanner());
      return;
    }

    let dueT, startT, evts, ents;
    if (archiveMode) {
      const src = STATE.archiveCache[archKey] || [];
      dueT   = src.filter(t => t.type === 'task'  && t.dueDate   === dayDate);
      startT = src.filter(t => t.type === 'task'  && t.startDate === dayDate && t.dueDate !== dayDate);
      evts   = src.filter(e => e.type === 'event' && e.date === dayDate);
      ents   = src.filter(e => e.type === 'entry' && e.date === dayDate);

      // On today: hide completed tasks (they show in Today tab Done section)

      const isViewingToday = dayDate === fmtDate(TODAY);
      dueT   = getTasks().filter(t => t.dueDate   === dayDate && (isViewingToday ? parseStatus(t.status).state !== 'Completed' : true));
      startT = getTasks().filter(t => t.startDate === dayDate && t.dueDate !== dayDate && (isViewingToday ? parseStatus(t.status).state !== 'Completed' : true));
      evts   = getEvents().filter(e => e.date === dayDate);
      ents   = getEntries().filter(e => e.date === dayDate);
    }

    // ── Shared day-card builder (unscheduled + open-tasks sections) ──
    const buildPlannerDayCard = (t, dayDate) => {

      const cm = {crit:'#F87171', high:'#FB923C', med:'#0891B2', low:'var(--border2)'};

        + '</div>'
