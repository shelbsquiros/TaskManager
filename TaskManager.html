        + '<div class="planner-day-card-row2">'
        + '<span class="planner-day-card-title">' + (t.title||'') + '</span>'
        + '<div class="planner-day-card-due">' + dueChipHTML + dateLabel + '</div>'
        + '</div>'
        + '</div>';
    };

    // ── Unscheduled tasks at top ──────────────────────────────────
    const unscheduled = pf.tasks ? sortByPriority([...dueT, ...startT]) : [];
    let unschHTML = '';
    if (unscheduled.length > 0) {
      unschHTML += '<div class="planner-day-cards">';
      unscheduled.forEach(t => {
        unschHTML += buildPlannerDayCard(t, dayDate);
      });
      unschHTML += '</div>';
    }

    // ── Time grid 7am – 9pm ───────────────────────────────────────
    // hours calculated after timedItems below
    const timedItems = [
      ...(pf.events  ? evts : []),
      ...(pf.entries ? ents : []),
    ].filter(i => i.time);

    // Hours: 7am to latest item hour + 1 (min 9pm) — no dead space
    // Default window: 8am–6pm. Extends if items fall outside.
    const earliestHour = timedItems.reduce((min, i) => {
      const h = parseInt((i.time||'').split(':')[0], 10);
      return isNaN(h) ? min : Math.min(min, h);
    }, 8);
    const latestHour = timedItems.reduce((max, i) => {
      const h = parseInt((i.time||'').split(':')[0], 10);
      return isNaN(h) ? max : Math.max(max, h);
    }, 16); // default 16 so endHour = 17 (5pm) when no late items
    const startHour = Math.min(8, earliestHour);
    const endHour   = Math.max(17, latestHour + 1);
    const hours     = Array.from({length: endHour - startHour + 1}, (_, i) => i + startHour);

    let timeHTML = '';
    hours.forEach(h => {
      const hLabel   = h === 12 ? '12 pm' : h < 12 ? (h + ' am') : ((h - 12) + ' pm');
      const atHour   = timedItems.filter(i => parseInt((i.time||'').split(':')[0], 10) === h);
      let rowContent = '';
      atHour.forEach(i => {
        const cls = ppClass(i.priority);
        rowContent += '<div class="planner-time-event ' + cls + '"'
          + ' onclick="_plannerOpenItem(\''+i.id+'\');">'
          + fmtTime(i.time) + ' · ' + (i.title||'')
          + '</div>';
      });
      timeHTML += '<div class="planner-time-row">'
        + '<div class="planner-time-label">' + hLabel + '</div>'
        + '<div class="planner-time-content">' + rowContent + '</div>'
        + '</div>';
    });

    // Schedule section header + scrollable time grid
    const schedHTML = '<div class="planner-day-schedule">'
      + (timedItems.length > 0
        ? '<div class="planner-time-grid">' + timeHTML + '</div>'
        : '<div class="planner-empty-week" style="padding:32px 16px">'
          + '<i class="ti ti-calendar" style="font-size:28px;opacity:0.3"></i>'
          + '<span>No scheduled items</span></div>')
      + '</div>';

    // Empty state (nothing at all)
    const isEmpty = unscheduled.length === 0 && timedItems.length === 0;
    const emptyHTML = isEmpty
      ? '<div class="planner-empty-week">'
        + '<i class="ti ti-calendar" style="font-size:32px;opacity:0.35"></i>'
        + '<span>Nothing scheduled for this day</span>'
        + '</div>'
      : '';

    // Archive badge
    let archiveBadge = '';
    if (archiveMode) {
      archiveBadge = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 24px">'
        + '<span class="planner-archive-badge">'
        + '<i class="ti ti-archive" style="font-size:11px"></i>'
        + 'Archived · read only</span>'
        + '<button class="planner-archive-link" onclick="_plannerToday()">'
        + 'Back to today ›</button>'
        + '</div>';
    }

    // ── Open Tasks section (collapsed by default) ────────────────
    let openTasksHTML = '';
    if (!archiveMode && pf.tasks) {
      const _openSt = ['Backlog','To Do','In Progress','Review'];
      const _openTasks = getTasks().filter(t => {
        if (parseStatus(t.status).state === 'Completed') return false;
        if (t.dueDate === dayDate) return false;
        if (t.startDate === dayDate && t.dueDate !== dayDate) return false;
        const isOverdue = t.dueDate && daysUntil(t.dueDate) < 0;
        return _openSt.includes(parseStatus(t.status).state) || isOverdue;
      });
      _openTasks.sort((a, b) => {
        const da = daysUntil(a.dueDate), db = daysUntil(b.dueDate);
        const aOver = da !== null && da < 0;
        const bOver = db !== null && db < 0;
        if (aOver && !bOver) return -1;
        if (!aOver && bOver) return 1;
        if (aOver && bOver) return da - db;
        if (a.dueDate && b.dueDate && a.dueDate !== b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        if (a.dueDate && !b.dueDate) return -1;
        if (!a.dueDate && b.dueDate) return 1;
        return priOrder(a.priority) - priOrder(b.priority);
      });
      if (_openTasks.length > 0) {
        const _isOpen = STATE.plannerActiveTasksOpen;
        const _oc2 = 'STATE.plannerActiveTasksOpen=!STATE.plannerActiveTasksOpen;renderPlanner()';
        openTasksHTML = '<div class="planner-open-hdr" onclick="' + _oc2 + '">'
          + '<i class="ti ti-layout-list" style="font-size:13px"></i>'
          + ' Open Tasks (' + _openTasks.length + ')'
          + '<span class="planner-open-hdr-chevron' + (_isOpen?' open':'') + '">›</span>'
          + '</div>';
        if (_isOpen) {
          openTasksHTML += '<div class="planner-open-cards">';
          _openTasks.forEach(t => {
            openTasksHTML += buildPlannerDayCard(t, dayDate);
          });
          openTasksHTML += '</div>';
        }
      }
    }

    // ── Assemble final Day View ───────────────────────────────────
    // Task List section — frozen header + scrollable cards
    const taskListHTML = (isEmpty && !openTasksHTML)
      ? emptyHTML
      : '<div class="planner-day-section planner-day-section-tasks">'
        + '<div class="planner-day-sec-hdr">'
        + '<i class="ti ti-clipboard-list" style="font-size:13px"></i> Task List</div>'
        + '<div class="planner-day-tasklist">' + unschHTML + openTasksHTML + '</div>'
        + '</div>';

    // Schedule section — frozen header + scrollable time grid
    const schedSectionHTML = '<div class="planner-day-section planner-day-section-sched">'
      + '<div class="planner-day-sec-hdr">'
      + '<i class="ti ti-clock" style="font-size:13px"></i> Schedule</div>'
      + schedHTML
      + '</div>';

    container.innerHTML = hdr + archiveBadge
      + '<div class="planner-day-view" style="margin:0 24px 28px;flex:1;min-height:0">'
      + taskListHTML + schedSectionHTML
      + '</div>';
    return;
  }

  } catch(e) {
    console.error('renderPlanner failed:', e);
    container.innerHTML = '<div style="padding:24px;color:var(--muted);font-size:13px">'
      + 'Planner failed to load. <button onclick="renderPlanner()" '
      + 'style="color:var(--accent2);background:none;border:none;cursor:pointer;'
      + 'font-size:13px;text-decoration:underline">Retry</button></div>';
  }
}


function changeWeek(dirOrReset) {
  if (dirOrReset === 0) STATE.plannerWeekOffset = 0;
  else STATE.plannerWeekOffset += dirOrReset;
  renderPlanner();
}

/* Show all items on a given date — primary click handler for all monthly calendar cells */
function openDayList(dateStr, archiveMode) {
  let items;
  if (archiveMode) {
    const key = dateStr.substring(0, 7);
    const src = STATE.archiveCache[key] || [];
    items = src.filter(i => i.type === 'task' ? i.dueDate === dateStr : i.date === dateStr);
  } else {
    items = itemsOnDate(dateStr);
  }
  const d = new Date(dateStr + 'T00:00:00');
  const label = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  const isToday = dateStr === fmtDate(TODAY);

  const dueTasks   = items.filter(i => i.type === 'task' && i._dateRole === 'due');
  const startTasks = items.filter(i => i.type === 'task' && i._dateRole === 'start');
  const timedItems = items.filter(i => i.type !== 'task');
  const sorted = sortPlannerItems(dueTasks, startTasks, timedItems);

  const listHTML = sorted.length === 0
    ? `<div style="text-align:center;padding:28px 0;color:var(--muted)">
         <div style="font-size:28px;margin-bottom:8px">📭</div>
         <div style="font-size:13px">Nothing scheduled for this day</div>
       </div>`
    : sorted.map(i => {
        const typeIcon  = { task:'📋', event:'📆', entry:'📝' }[i.type] || '📄';
        const pri       = getPri(i.priority);
        const timeStr   = i.time ? fmtTimeRange(i.time, i.endTime) : '';
        const statusBit = i.type === 'task'
          ? `<span style="font-size:10px;padding:1px 7px;border-radius:20px;background:var(--glass2);color:var(--text2);border:1px solid var(--border)">${parseStatus(i.status).state||i.status}</span>`
          : '';
        return `<div class="day-list-item" onclick="_navTo(()=>openDayList('${dateStr}',${archiveMode}),()=>openTEEDetail('${i.id}'))">
          <span style="font-size:18px;flex-shrink:0">${typeIcon}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:16px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--text)">${i.title}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap">
              ${timeStr ? `<span style="font-size:11px;font-family:var(--mono);color:var(--muted)">🕐 ${timeStr}</span>` : ''}
              ${i.category ? `<span style="font-size:10px;color:var(--text2)">${i.category}</span>` : ''}
              ${statusBit}
            </div>
          </div>
          <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <span style="font-size:10px;padding:2px 7px;border-radius:20px;background:${pri.bg};color:${pri.text};font-weight:600">${i.priority}</span>
          </div>
        </div>`;
      }).join('');

  openModal(`
    <div class="modal-title">
      <div>
        <div style="font-size:17px;font-weight:700">${label}</div>
        ${isToday ? '<div style="font-size:11px;color:var(--accent2);font-weight:600;margin-top:2px">Today</div>' : ''}
      </div>
      ${_modalCloseBtn()}
    </div>
    ${sorted.length > 0 ? `<div style="font-size:11px;color:var(--muted);margin-bottom:12px">${sorted.length} item${sorted.length>1?'s':''} — tap to view details</div>` : ''}
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px">${listHTML}</div>
    <div class="modal-actions">
      
      ${!archiveMode ? `<button class="btn-primary" onclick="clearNav();openTEEModal(null,'entry','${dateStr}')">+ Add Item</button>` : ''}
    </div>`);
}

// ═══════════════════════════════════════════════════════════
// REMINDERS TAB — Shows all notes, sorted pinned-first then newest
// Each note has independent Pin (📌) and Float (📍) toggles
// ═══════════════════════════════════════════════════════════
function renderReminders() {
  const el = document.getElementById('remindersSection');
  if (!el) return;
  const isSmallScreen = window.innerWidth < 600;
  const f  = STATE.reminderFilter;
  const todayStr = fmtDate(TODAY);

  // ── Filter stickies ──────────────────────────────────────────
  let filtered = STATE.stickies;

  // Context pill filter
  if (f.context === 'pinned') filtered = filtered.filter(s => s.pinned && !s.done);
  else if (f.context === 'open') filtered = filtered.filter(s => !s.done);
  else if (f.context === 'done') filtered = filtered.filter(s => s.done);

  // Date float filter
  if (f.date !== 'All') {
    if (f.date === 'overdue')  filtered = filtered.filter(s => s.date && s.date < todayStr && !s.done);
    else if (f.date === 'today')    filtered = filtered.filter(s => s.date === todayStr);
    else if (f.date === 'upcoming') filtered = filtered.filter(s => s.date && s.date > todayStr);
    else if (f.date === 'nodate')   filtered = filtered.filter(s => !s.date);
  }

  // Tag float filter
  if (f.tag !== 'All') {
    filtered = filtered.filter(s => (s.tags||[]).includes(f.tag));
  }

  // Search filter
  if (f.search.trim()) {
    const q = f.search.toLowerCase();
    filtered = filtered.filter(s =>
      s.text.toLowerCase().includes(q) ||
      (s.tags||[]).some(t => t.toLowerCase().includes(q))
    );
  }

  // ── Counts for pills (unfiltered base, only context-aware) ───
  const all    = STATE.stickies;
  const cAll    = all.length;
  const cPinned = all.filter(s => s.pinned && !s.done).length;
  const cOpen   = all.filter(s => !s.done).length;
  const cDone   = all.filter(s => s.done).length;

  // ── Date float counts (respect tag + search + context) ───────
  const _baseForDate = filtered;
  const dateCounts = {
    overdue:  _baseForDate.filter(s => s.date && s.date < todayStr && !s.done).length,
    today:    _baseForDate.filter(s => s.date === todayStr).length,
    upcoming: _baseForDate.filter(s => s.date && s.date > todayStr).length,
    nodate:   _baseForDate.filter(s => !s.date).length,
  };

  // ── Tag float counts (respect date + search + context) ───────
  const _baseForTag = filtered;
  const tagNames = new Set();
  _baseForTag.forEach(s => (s.tags||[]).forEach(t => tagNames.add(t)));
  const tagCounts = {};
  tagNames.forEach(t => { tagCounts[t] = _baseForTag.filter(s => (s.tags||[]).includes(t)).length; });

  // ── Date label + color ───────────────────────────────────────
  const dateActive = f.date !== 'All';
  const _dateLabels = { overdue:'Past', today:'Today', upcoming:'Upcoming', nodate:'No Date' };
  const dateLabel  = dateActive ? (_dateLabels[f.date] || f.date) : 'All Dates';
  const dateCount  = dateActive ? _baseForDate.filter(s => {
    if (f.date === 'overdue')  return s.date && s.date < todayStr && !s.done;
    if (f.date === 'today')    return s.date === todayStr;
    if (f.date === 'upcoming') return s.date && s.date > todayStr;
    if (f.date === 'nodate')   return !s.date;
    return true;
  }).length : 0;
  const dateFullLabel = dateActive ? `${dateLabel} (${dateCount})` : 'All Dates';

  // ── Tag label ────────────────────────────────────────────────
  const tagActive = f.tag !== 'All';
  const tagCount  = tagActive ? (_baseForTag.filter(s => (s.tags||[]).includes(f.tag)).length) : 0;
  const tagFullLabel = tagActive ? `#${f.tag} (${tagCount})` : 'All Tags';

  // ── Build float HTML ─────────────────────────────────────────
  const dateOptions = [
    { key:'overdue',  label:'Past',     count: dateCounts.overdue  },
    { key:'today',    label:'Today',    count: dateCounts.today    },
    { key:'upcoming', label:'Upcoming',  count: dateCounts.upcoming },
    { key:'nodate',   label:'No Date',   count: dateCounts.nodate   },
  ];
  const dateFloatHTML = `<div style="padding:4px 0">
    <div class="kb-float-item${f.date==='All'?' active':''}" onclick="_rmSetDate('All')">All Dates</div>
    ${dateOptions.map(o => `<div class="kb-float-item${f.date===o.key?' active':''}" onclick="_rmSetDate('${o.key}')">${o.label}<span class="kb-float-count">${o.count}</span></div>`).join('')}
  </div>`;
  STATE._rmDateFloatHTML = dateFloatHTML;

  const tagFloatHTML = `<div style="padding:4px 0">
    <div class="kb-float-item${f.tag==='All'?' active':''}" onclick="_rmSetTag('All')">All Tags</div>
    ${[...tagNames].sort().map(t => `<div class="kb-float-item${f.tag===t?' active':''}" onclick="_rmSetTag('${t}')">#${t}<span class="kb-float-count">${tagCounts[t]}</span></div>`).join('')}
  </div>`;
  STATE._rmTagFloatHTML = tagFloatHTML;

  // ── Sort filtered: pinned first then by newest ────────────────
  const byNewest = (a, b) => {
    const na = parseInt((a.id||'').replace(/\D/g,''), 10) || 0;
    const nb = parseInt((b.id||'').replace(/\D/g,''), 10) || 0;
    return nb - na;
  };
  const pinnedF = filtered.filter(s => s.pinned && !s.done).sort(byNewest);
  const activeF = filtered.filter(s => !s.pinned && !s.done).sort(byNewest);
  const doneF   = filtered.filter(s => s.done).sort(byNewest);
  if (STATE._remindersDoneExpanded === undefined) STATE._remindersDoneExpanded = false;

  // ── Build card ───────────────────────────────────────────────
  const buildReminderMeta = s => {
    // Parse date — handle ISO format from sheet
    const _rawDate   = s.date || '';
    const _cleanDate = _rawDate.includes('T') ? _rawDate.split('T')[0] : _rawDate;

    // Meta text
    let metaText = '';
    if (s.done && s.doneAt) {
      const _raw = s.doneAt.includes('T') ? s.doneAt.replace('T',' ').split('.')[0] : s.doneAt;
      const _dp  = _raw.split(' ');
      metaText = 'Done ' + [_dp[0], _dp[1] ? fmtTime(_dp[1]) : ''].filter(Boolean).join(' ');
    } else if (s.done) {
      metaText = 'Completed';
    } else if (_cleanDate) {
      metaText = _cleanDate + (s.time ? ' · ' + fmtTime(s.time) : '');
    }
    return metaText;
  };

  const buildReminderTags = s => {
    // Tag chips
    return (s.tags||[]).length
      ? `<div style="display:flex;flex-wrap:wrap;gap:4px">${(s.tags||[]).map(t => _buildTagChip(t)).join('')}</div>`
      : '';
  };

  const buildColorSwatches = s => {
    return STICKY_COLORS.map((col,i) => `<button onclick="changeStickyColor('${s.id}',${i})"
            style="width:14px;height:14px;border-radius:50%;background:${col.bg};border:${s.colorIdx===i?'2px solid rgba(255,255,255,0.85)':'1px solid rgba(0,0,0,0.2)'};cursor:pointer;outline:none;flex-shrink:0"></button>`).join('');
  };

  const buildCard = s => {
    const c          = getStickyColor(s.colorIdx);
    const isFloating = !!s.float && !isSmallScreen;
    const isPinned   = !!s.pinned;
    const isDone     = !!s.done;

    const metaText = buildReminderMeta(s);
    const tagsHTML = buildReminderTags(s);

    // Pin/Float active state colors from config (light/dark aware)
    const _pac       = getNoteActionColor('pin');
    const _fac       = getNoteActionColor('float');
    const pinStyle   = isPinned   ? `background:${_pac.bg};color:${_pac.color};border:1px solid ${_pac.border};border-radius:20px` : '';
    const floatStyle = isFloating ? `background:${_fac.bg};color:${_fac.color};border:1px solid ${_fac.border};border-radius:20px` : '';
    const pinTitle   = isPinned   ? 'Pinned — click to unpin' : 'Pin note';
    const floatTitle = isFloating ? 'Floating — click to stop' : 'Float note';

    return `<div class="reminder-card${isPinned?' reminder-pinned':''}${isDone?' reminder-done':''}"
        style="background:${c.bg};color:${c.text}${isDone?';opacity:0.65;':''}">

      <div class="reminder-card-top" style="margin-bottom:6px">
        <div style="flex:1;min-width:0">
          <div class="reminder-card-body" style="${isDone?'text-decoration:line-through;opacity:0.8':''}">
            ${s.text}
          </div>
        </div>
      </div>

      ${metaText ? `<div style="font-size:10px;opacity:0.7;margin-bottom:2px">${metaText}</div>` : ''}
      ${tagsHTML ? `<div style="margin-bottom:8px">${tagsHTML}</div>` : ''}

      <div class="reminder-card-footer" style="margin-top:auto">
        <div style="display:flex;gap:4px;align-items:center">
          ${buildColorSwatches(s)}
        </div>
        <div style="display:flex;align-items:center;gap:2px">
          ${!isDone ? `
            <button class="reminder-action-btn" style="${pinStyle}" onclick="toggleNotePin('${s.id}',${!isPinned})" title="${pinTitle}">
              <i class="ti ti-pin" style="font-size:15px"></i>
            </button>
            ${!isSmallScreen ? `<button class="reminder-action-btn" style="${floatStyle}" onclick="toggleNoteFloat('${s.id}',${!isFloating})" title="${floatTitle}"><i class="ti ti-layout-navbar" style="font-size:15px"></i></button>` : ''}
            <span style="width:1px;height:16px;background:var(--border);margin:0 3px;flex-shrink:0"></span>
          ` : ''}
          ${isDone ? `<button class="reminder-action-btn" onclick="archiveStickyItem('${s.id}')"
            title="Archive note">
            <i class="ti ti-archive" style="font-size:15px"></i>
          </button>` : ''}
          <button class="reminder-action-btn" onclick="toggleStickyDone('${s.id}',${!isDone})"
            title="${isDone?'Mark as not done':'Mark as done'}">
            <i class="ti ${isDone?'ti-checkbox':'ti-square'}" style="font-size:15px"></i>
          </button>
          <button class="reminder-action-btn" onclick="openStickyModal('${s.id}')"
            title="Edit">
            <i class="ti ti-pencil" style="font-size:15px"></i>
          </button>
          <button class="reminder-action-btn" onclick="removeStickyItem('${s.id}')"
            title="Delete">
            <i class="ti ti-trash" style="font-size:15px"></i>
          </button>
        </div>
      </div>
    </div>`;
  };

  // ── Hoisted "done" grid markup (used in both done-section branches) ──
  const doneGridHTML = `<div class="reminders-grid" style="margin-top:8px">${doneF.map(buildCard).join('')}</div>`;

  // ── Hero subtitle ────────────────────────────────────────────
  const ctxSubtitle = f.context === 'pinned' ? 'Pinned'
    : f.context === 'open' ? 'Open Notes'
    : f.context === 'done' ? 'Done Notes'
    : 'All Notes';

  // ── Render ───────────────────────────────────────────────────
  const _wasSearchFocused = _captureSearchFocus('rm-search-input');

  el.innerHTML = `
    <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:12px;flex-shrink:0">
      <span style="font-size:26px;font-weight:800;letter-spacing:-0.03em;line-height:1.1;color:var(--text);font-family:var(--font-disp)">Reminders &amp; Notes</span>
      <span style="font-size:26px;font-weight:400;color:var(--muted);font-family:var(--font-disp)"> · ${ctxSubtitle}</span>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn-ghost" onclick="openStickyArchiveDrawer()"><i class="ti ti-archive" style="font-size:13px;margin-right:4px"></i>View Archive</button>
        <button class="btn-primary" onclick="openStickyModal(null)">+ Add Note</button>
      </div>
    </div>

    <div class="kb-pill-strip" style="margin-bottom:8px">
      <button class="kb-pill${f.context==='all'?' active':''}" onclick="_rmSetContext('all')">
        <span class="kb-pill-num">${cAll}</span> ALL NOTES
      </button>
      ${cPinned > 0 ? `<button class="kb-pill${f.context==='pinned'?' active':''}" onclick="_rmSetContext('pinned')"><span class="kb-pill-num">${cPinned}</span> PINNED</button>` : ''}
      <button class="kb-pill${f.context==='open'?' active':''}" onclick="_rmSetContext('open')">
        <span class="kb-pill-num">${cOpen}</span> OPEN
      </button>
      ${cDone > 0 ? `<button class="kb-pill done${f.context==='done'?' active':''}" onclick="_rmSetContext('done')"><span class="kb-pill-num">${cDone}</span> DONE NOTES</button>` : ''}
    </div>

    <div class="kb-pill-strip" style="margin-bottom:16px">
      <div class="kb-search-wrap">
        <i class="ti ti-search" style="font-size:12px;color:var(--muted)"></i>
        <input id="rm-search-input" placeholder="Search notes…" value="${f.search}"
          oninput="STATE.reminderFilter.search=this.value;renderReminders();">
      </div>
      <button class="kb-dropdown-btn${dateActive?' active':''}" onclick="_rmOpenDateFloat(this)">
        ${dateFullLabel} &nbsp;&#9660;
      </button>
      <button class="kb-dropdown-btn${tagActive?' active':''}" onclick="_rmOpenTagFloat(this)">
        ${tagFullLabel} &nbsp;&#9660;
      </button>
    </div>

    ${filtered.length === 0 ? `
      <div style="text-align:center;padding:60px 20px;color:var(--muted)">
        <div style="font-size:13px">No notes match your filters</div>
      </div>` : `

      ${pinnedF.length > 0 ? `
        <div class="reminders-section-label">
          <i class="ti ti-pin" style="font-size:13px"></i> Pinned
          <span class="reminders-section-count">${pinnedF.length}</span>
        </div>
        <div class="reminders-grid reminders-grid-pinned">${pinnedF.map(buildCard).join('')}</div>
      ` : ''}

      ${(pinnedF.length > 0 && activeF.length > 0) ? `<div class="reminders-divider"></div>` : ''}

      ${activeF.length > 0 ? `
        <div class="reminders-grid">${activeF.map(buildCard).join('')}</div>
      ` : ''}

      ${doneF.length > 0 ? `
        <div class="reminders-divider"></div>
        ${f.context === 'done' ? `
          ${doneGridHTML}
        ` : `
          <div style="display:flex;align-items:center;gap:6px">
            <button class="reminders-done-toggle" style="flex:1" onclick="STATE._remindersDoneExpanded=!STATE._remindersDoneExpanded;renderReminders()">
              <span style="display:flex;align-items:center;gap:6px">
                <i class="ti ti-checkbox" style="font-size:13px"></i>
                Done
                <span class="reminders-section-count">${doneF.length}</span>
              </span>
              <i class="ti ${STATE._remindersDoneExpanded?'ti-chevron-up':'ti-chevron-down'}" style="font-size:13px"></i>
            </button>
            <button class="btn-ghost" style="font-size:11px;height:32px;padding:0 10px;white-space:nowrap"
              onclick="archiveAllDoneStickies()" title="Archive all done notes">
              <i class="ti ti-archive" style="font-size:12px;margin-right:3px"></i>Archive All
            </button>
          </div>
          ${STATE._remindersDoneExpanded ? `
            ${doneGridHTML}
          ` : ''}
        `}
      ` : ''}
    `}
  `;

  // Restore search focus
  _restoreSearchFocus('rm-search-input', _wasSearchFocused);

  // Apply pinned accent from config
  requestAnimationFrame(() => {
    const pa = getPinnedAccent();
    document.querySelectorAll('.reminder-card.reminder-pinned').forEach(el => {
      el.style.setProperty('--pinned-border', pa.border);
      el.style.setProperty('--pinned-shadow', pa.shadow);
    });
  });

  _updateRemindersBadge(STATE.stickies.length);
}

function unfloatSticky(id) {
  const s = STATE.stickies.find(x => x.id === id);
  if (!s) return;
  s.float = false;
  saveSticky(s).catch(()=>{});
  renderStickyLayer();
  renderReminders();
}

function toggleNoteFloat(id, enabled) {
  if (window.innerWidth < 600) return;
  const s = STATE.stickies.find(x => x.id === id);
  if (!s) return;
  s.float = enabled;
  saveSticky(s).catch(()=>{});
  renderStickyLayer();
  renderReminders();
}

function _updateRemindersBadge(count) {
  // Find the Reminders sidebar button and add/update badge
  const btn = document.querySelector('.sidebar-btn[data-page="page-reminders"]');
  if (!btn) return;
  let badge = btn.querySelector('.sidebar-badge');
  if (count === 0) { if (badge) badge.remove(); return; }
  if (!badge) {
    badge = document.createElement('span');
    badge.className = 'sidebar-badge';
    btn.appendChild(badge);
  }
  badge.textContent = count;
}

// ── FLOATING STICKY LAYER ────────────────────────────────────
// Renders notes with float:true as draggable overlays on screen
// Only shown on screens >= 600px wide
function renderStickyLayer() {
  const layer = document.getElementById('sticky-layer');
  if (!layer) return;
  const isSmall = window.innerWidth < 600;
  // Only show notes that have float:true, and never on small screens
  const floaters = isSmall ? [] : STATE.stickies.filter(s => s.float);
  if (floaters.length === 0) {
    layer.innerHTML = '';
    layer.style.display = 'none';
    return;
  }
  layer.style.display = 'block';
  layer.innerHTML = floaters.map(s => {
    const c = getStickyColor(s.colorIdx);
    const sidebarW = _sidebarWidth();
    const x = Math.min(Math.max(s.x || sidebarW + 20, sidebarW + 8), window.innerWidth  - 248);
    const y = Math.min(Math.max(s.y || 120, 62),                      window.innerHeight - 128);
    return `<div class="sticky-note" id="sticky-${s.id}"
          style="background:${c.bg};color:${c.text};left:${x}px;top:${y}px"
          data-id="${s.id}">
      <div class="sticky-label" onmousedown="startDragSticky(event,'${s.id}')">📌 Note <span style="opacity:0.4;font-size:8px">drag me</span></div>
      <div class="sticky-text">${s.text}</div>
      <button class="sticky-del" onclick="unfloatSticky('${s.id}')" style="color:${c.text}" title="Stop floating (returns to Reminders tab)">✕</button>
    </div>`;
  }).join('');
}

function focusSticky(id) {
  const el = document.getElementById(`sticky-${id}`);
  if (!el) return;
  el.style.zIndex = 950;
  el.style.boxShadow = '0 0 0 3px rgba(79,154,181,0.55), 6px 10px 28px rgba(0,0,0,0.5)';
  setTimeout(() => { el.style.boxShadow = ''; el.style.zIndex = ''; }, 2000);
}

function changeStickyColor(id, colorIdx) {
  const s = STATE.stickies.find(x=>x.id===id);
  if (!s) return;
  s.colorIdx = colorIdx;
  saveSticky(s).catch(()=>{});
  renderStickyLayer();
  renderReminders();
}

// ── STICKY DRAG LOGIC ────────────────────────────────────────
// Mouse + touch drag with sidebar-aware boundary clamping
let _drag = null;

function _sidebarWidth() {
  const sb = document.getElementById('sidebar');
  if (!sb) return 0;
  // On mobile sidebar slides off-canvas so doesn't eat space
  if (window.innerWidth <= 900) return 0;
  return sb.classList.contains('collapsed') ? 64 : 240;
}

function startDragSticky(e, id) {
  const el = document.getElementById(`sticky-${id}`);
  if (!el) return;
  e.preventDefault();
  const rect = el.getBoundingClientRect();
  _drag = { id, el, ox: e.clientX - rect.left, oy: e.clientY - rect.top };
  el.style.zIndex = 950;
  el.style.cursor = 'grabbing';
  document.addEventListener('mousemove', onDragSticky);
  document.addEventListener('mouseup', endDragSticky);
  document.addEventListener('touchmove', onDragStickyTouch, { passive: false });
  document.addEventListener('touchend', endDragStickyTouch);
}

function _clampSticky(nx, ny) {
  const sidebarW = _sidebarWidth();
  const noteW = 240, noteH = 140;
  const minX = sidebarW + 8;
  const maxX = window.innerWidth  - noteW - 8;
  const minY = 62;
  const maxY = window.innerHeight - noteH - 8;
  return {
    x: Math.min(Math.max(nx, minX), maxX),
    y: Math.min(Math.max(ny, minY), maxY),
  };
}

function onDragSticky(e) {
  if (!_drag) return;
  const { x, y } = _clampSticky(e.clientX - _drag.ox, e.clientY - _drag.oy);
  _drag.el.style.left = `${x}px`;
  _drag.el.style.top  = `${y}px`;
}
function onDragStickyTouch(e) {
  if (!_drag || !e.touches[0]) return;
  e.preventDefault();
  const t = e.touches[0];
  const { x, y } = _clampSticky(t.clientX - _drag.ox, t.clientY - _drag.oy);
  _drag.el.style.left = `${x}px`;
  _drag.el.style.top  = `${y}px`;
}
function endDragSticky() {
  if (!_drag) return;
  const x = parseFloat(_drag.el.style.left);
  const y = parseFloat(_drag.el.style.top);
  const s = STATE.stickies.find(s => s.id === _drag.id);
  if (s) { s.x = x; s.y = y; saveSticky(s).catch(()=>{}); }
  _drag.el.style.cursor = 'grab';
  _drag.el.style.zIndex = '';
  _drag = null;
  document.removeEventListener('mousemove', onDragSticky);
  document.removeEventListener('mouseup', endDragSticky);
}
function endDragStickyTouch() {
  endDragSticky();
  document.removeEventListener('touchmove', onDragStickyTouch);
  document.removeEventListener('touchend', endDragStickyTouch);
}

// Re-renders sticky layer but keeps current DOM positions for notes already on screen
function _renderStickyLayerPreservePositions() {
  // Capture current DOM positions before re-render
  STATE.stickies.forEach(s => {
    const el = document.getElementById(`sticky-${s.id}`);
    if (el) {
      s.x = parseFloat(el.style.left) || s.x;
      s.y = parseFloat(el.style.top)  || s.y;
    }
  });
  renderStickyLayer();
}


// ═══════════════════════════════════════════════════════════
// KANBAN BOARD — 5 status columns, KPI strip, filter bar
// ═══════════════════════════════════════════════════════════
function renderBoard() {
  try {
  const f = STATE.kanbanFilter;
  const today = fmtDate(TODAY);
  const in7   = fmtDate(new Date(TODAY.getTime() + 7*24*60*60*1000));
  const allTasks = getTasks();

  // ── Context pill filter ───────────────────────────────────────────
  let contextFiltered = allTasks.filter(t => {
    const st   = parseStatus(t.status).state;
    const days = daysUntil(t.dueDate);
    switch (f.context) {
      case 'all':        return true;
      case 'open':       return st !== 'Completed';
      case 'done':       return st === 'Completed';
      case 'overdue':    return st !== 'Completed' && days !== null && days < 0;
      case 'today':      return t.dueDate === today;
      case 'week':       return t.dueDate && t.dueDate >= today && t.dueDate <= in7;
      case 'noassignee': return !t.assignees || t.assignees.trim() === '';
      default:           return st !== 'Completed';
    }
  });

  // ── Search + priority + assignee refinements ──────────────────────
  let visible = contextFiltered.filter(t => {
    if (f.search && !t.title.toLowerCase().includes(f.search.toLowerCase())) return false;
    if (f.priority !== 'All' && t.priority !== f.priority) return false;
    if (f.assignee !== 'All') {
      const parts = (t.assignees||'').split('|').map(s=>s.trim());
      if (!parts.includes(f.assignee)) return false;
    }
    return true;
  });

  // ── Pill counts ───────────────────────────────────────────────────
  const cOpen      = allTasks.filter(t => parseStatus(t.status).state !== 'Completed').length;
  const cDone      = allTasks.filter(t => parseStatus(t.status).state === 'Completed').length;
  const cOverdue   = allTasks.filter(t => { const d=daysUntil(t.dueDate); return parseStatus(t.status).state!=='Completed'&&d!==null&&d<0; }).length;
  const cToday     = allTasks.filter(t => parseStatus(t.status).state !== 'Completed' && t.dueDate === today).length;
  const cWeek      = allTasks.filter(t => parseStatus(t.status).state !== 'Completed' && t.dueDate && t.dueDate >= today && t.dueDate <= in7).length;
  const cNoAssign  = allTasks.filter(t => parseStatus(t.status).state !== 'Completed' && (!t.assignees || t.assignees.trim() === '')).length;

  const _emptyMsgs = {
    'Backlog':'Nothing in the backlog',
    'To Do':'No tasks to do',
    'In Progress':'Nothing in progress',
    'Review':'Nothing to review',
    'Completed':'No completed tasks'
  };

  const _kbPriOrd = p => p==='Critical'?0:p==='High'?1:p==='Medium'?2:p==='Low'?3:4;

  const buildCardTags = (t) => {
    // Tags
    const allTags   = (t.tags||[]).slice(0,6);
    const tagsRow1  = allTags.slice(0,3);
    const tagsRow2  = allTags.slice(3);
    const mkTag     = tag => _buildTagChip(tag);
    const tags1HTML = tagsRow1.length ? `<div style="display:flex;gap:3px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:50%">${tagsRow1.map(mkTag).join('')}</div>` : '';
    const tags2HTML = tagsRow2.length ? `<div style="display:flex;gap:3px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:50%">${tagsRow2.map(mkTag).join('')}</div>` : '';
    return { tagsRow2, tags1HTML, tags2HTML };
  };

  const buildCardMetaRight = (t) => {
    const { state: _ms, doneAt: _da } = parseStatus(t.status);
    let metaRight = '';
    if (_ms==='Completed'||_ms==='Done') {
      if (_da) {
        const _dp = _da.split(' ');
        const _doneDate = _dp[0] || '';
        const _doneTime = _dp[1] ? fmtTime(_dp[1]) : '';
        metaRight = 'Done ' + [_doneDate, _doneTime].filter(Boolean).join(' ');
      } else {
        metaRight = 'Completed';
      }
    } else if (t.dueDate) {
      metaRight = t.dueDate;
    }
    return metaRight;
  };

  const buildBoardCard = (t, isCompleted) => {
    // Unified chip/badge system
    const evBorder      = _buildAccentBorder(t.priority);
    const priorityBadge = _buildPriorityBadge(t);
    const statusBadge   = _buildStatusBadge(t);
    const dueChip       = isCompleted ? '' : _buildCounterChip(t.dueDate);
    const ctxChips      = _buildContextChips(t);
    const { tagsRow2, tags1HTML, tags2HTML } = buildCardTags(t);
    // Subtask chip + meta
    const stChip = _subtaskChip(t);
    const metaRight = buildCardMetaRight(t);
    const titleStyle = isCompleted ? 'text-decoration:line-through;opacity:0.6;' : '';
    return `<div class="gt-card" style="${evBorder}" draggable="true" ondragstart="dragStart('${t.id}')" ondragend="dragEnd()" onclick="openTEEDetail('${t.id}')" title="Click to view/edit">
        <div class="gt-card-row1">
          ${priorityBadge}${statusBadge}
          <span style="display:flex;align-items:center;gap:4px;margin-left:auto">${ctxChips}${stChip}</span>
        </div>
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin:4px 0 2px">
          <div class="gt-card-title" style="margin:0;flex:1;min-width:0;${titleStyle}">${t.title}</div>
          ${tags1HTML}
        </div>
        ${(t.desc||tagsRow2.length) ? `<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
          ${t.desc ? `<div class="gt-card-desc-wrap" style="flex:1;min-width:0">${t.desc}</div>` : '<div></div>'}
          ${tags2HTML}
        </div>` : ''}
        <div class="gt-card-footer">
          <div class="gt-card-footer-left">${renderAssigneeStack(t.assignees||'', false, t.type)}</div>
          <div class="gt-card-footer-right">${dueChip}${metaRight ? `<span class="gt-card-meta">${metaRight}</span>` : ''}</div>
        </div>
        ${isCompleted ? `<button class="archive-card-btn" onclick="event.stopPropagation();archiveItem('${t.id}')">Archive</button>` : ''}
      </div>`;
  };

  const colsHTML = KANBAN_COLS.map(col => {
    const colTasks = visible.filter(t=>parseStatus(t.status).state===col.id)
      .sort((a,b) => {
        const pd = _kbPriOrd(a.priority) - _kbPriOrd(b.priority);
        if (pd !== 0) return pd;
        if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        if (a.dueDate) return -1;
        if (b.dueDate) return 1;
        return 0;
      });
    const isCompleted = col.id === 'Completed';
    // Completed column cap — dynamic based on screen height
    const cardsHTML = colTasks.map(t => buildBoardCard(t, isCompleted)).join('');

    return `<div class="kanban-col" ondragover="dragOver(event,'${col.id}')" ondrop="drop(event,'${col.id}')">
      <div class="kanban-col-header" style="border-top:2px solid ${getColColor(col)}">
        <div class="kanban-dot" style="background:${getColColor(col)};box-shadow:0 0 6px ${getColColor(col)}"></div>
        <span class="kanban-col-name" style="color:${getColColor(col)}">${col.label}</span>
        <span class="kanban-count" style="color:${getColColor(col)}">${colTasks.length}</span>
      </div>
      <div class="kanban-body">${cardsHTML || '<div class="kanban-empty-col">'+(_emptyMsgs[col.id]||'No tasks')+'</div>'}</div>
      <button class="kanban-add-btn" onclick="openTEEModal(null,'task',null,'${col.id}')">+ Add task</button>
    </div>`;
  }).join('');

  // ── Priority + assignee counts for dropdowns ─────────────────────
  // Base for priority counts — respects active assignee filter
  const _baseForPri = allTasks.filter(t =>
    parseStatus(t.status).state !== 'Completed' &&
    (f.assignee === 'All' || (t.assignees||'').split('|').map(s=>s.trim()).includes(f.assignee))
  );
  const priCounts = {};
  ['Critical','High','Medium','Low'].forEach(p => {
    priCounts[p] = _baseForPri.filter(t => t.priority === p).length;
  });
  // Base for assignee counts — respects active priority filter
  const _baseForAssignee = allTasks.filter(t =>
    parseStatus(t.status).state !== 'Completed' &&
    (f.priority === 'All' || t.priority === f.priority)
  );
  const assigneeNames = new Set();
  _baseForAssignee.forEach(t => splitAssigneeNames(t.assignees).forEach(n=>assigneeNames.add(n)));
  const assigneeCounts = {};
  assigneeNames.forEach(n => {
    assigneeCounts[n] = _baseForAssignee.filter(t => (t.assignees||'').split('|').map(s=>s.trim()).includes(n)).length;
  });

  // ── Priority dropdown HTML ────────────────────────────────────────
  const priColors = {Critical:'#F87171',High:'#FB923C',Medium:'#0891B2',Low:'#64748B'};
  const priFloatHTML = '<div class="kb-float-item' + (f.priority==='All'?' active':'') + '" onclick="_kbSetPriority(\'All\')">All Priorities</div>'
    + ['Critical','High','Medium','Low'].map(p =>
        '<div class="kb-float-item' + (f.priority===p?' active':'') + '" onclick="_kbSetPriority(\''+p+'\')"><span class="kb-float-dot" style="background:'+priColors[p]+'"></span>'+p+'<span class="kb-float-count">'+( priCounts[p]||0)+'</span></div>'
      ).join('');
  const priCount  = _baseForPri.filter(t => t.priority === f.priority).length;
  const priLabel  = f.priority === 'All' ? 'All Priority' : f.priority + ' (' + priCount + ')';
  const priColor  = priColors[f.priority] || null;
  const priActive = f.priority !== 'All';

  // ── Assignee dropdown HTML ────────────────────────────────────────
  const assigneeFloatHTML = '<div class="kb-float-item' + (f.assignee==='All'?' active':'') + '" onclick="_kbSetAssignee(\'All\')">All Assignees</div>'
    + [...assigneeNames].map(n =>
        '<div class="kb-float-item' + (f.assignee===n?' active':'') + '" onclick="_kbSetAssignee(\''+n+'\')">'+n+'<span class="kb-float-count">'+assigneeCounts[n]+'</span></div>'
      ).join('');
  const assigneeCount = f.assignee === 'All' ? 0 : _baseForAssignee.filter(t => (t.assignees||'').split('|').map(s=>s.trim()).includes(f.assignee)).length;
  const assigneeLabel = f.assignee === 'All' ? 'All Assignees' : f.assignee + ' (' + assigneeCount + ')';
  const assigneeActive = f.assignee !== 'All';

  // ── Context subtitle ──────────────────────────────────────────────
  const ctxLabels = {open:'Open Tasks',done:'Completed',overdue:'Overdue',today:'Due Today',week:'Next 7 Days',noassignee:'No Assignee'};
  const ctxSubtitle = f.context === 'all' ? 'All Tasks' : ctxLabels[f.context] || 'All Tasks';

  // Store float HTML in STATE for button onclick access
  STATE._kbPriFloatHTML      = priFloatHTML;
  STATE._kbAssigneeFloatHTML = assigneeFloatHTML;

  // Capture focus state BEFORE re-render destroys DOM
  const _wasSearchFocused = _captureSearchFocus('kanban-search-input');

  document.getElementById('boardSection').innerHTML = `
    <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:12px;flex-shrink:0">
      <span style="font-size:26px;font-weight:800;letter-spacing:-0.03em;line-height:1.1;color:var(--text);font-family:var(--font-disp)">Kanban Board</span>
      <span style="font-size:26px;font-weight:400;color:var(--muted);font-family:var(--font-disp)"> · ${ctxSubtitle}</span>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn-ghost" onclick="openArchiveDrawer()">View Archive</button>
        <button class="btn-primary" onclick="openTEEModal(null,'task',null,'Backlog')">+ New Task</button>
      </div>
    </div>
    <div class="kanban-board-wrap">

    <div class="kb-pill-strip" style="margin-bottom:8px">
      <button class="kb-pill${f.context==='open'?' active':''}" onclick="_kbSetContext('open')">
        <span class="kb-pill-num">${cOpen}</span> OPEN TASKS
      </button>
      ${cDone > 0 ? `<button class="kb-pill done${f.context==='done'?' active':''}" onclick="_kbSetContext('done')"><span class="kb-pill-num">${cDone}</span> COMPLETED</button>` : ''}
      ${cOverdue > 0 ? `<button class="kb-pill overdue${f.context==='overdue'?' active':''}" onclick="_kbSetContext('overdue')"><span class="kb-pill-num">${cOverdue}</span> OVERDUE</button>` : ''}
      ${cToday > 0 ? `<button class="kb-pill today${f.context==='today'?' active':''}" onclick="_kbSetContext('today')"><span class="kb-pill-num">${cToday}</span> TODAY</button>` : ''}
      ${cWeek > 0 ? `<button class="kb-pill week${f.context==='week'?' active':''}" onclick="_kbSetContext('week')"><span class="kb-pill-num">${cWeek}</span> NEXT 7 DAYS</button>` : ''}
      ${cNoAssign > 0 ? `<button class="kb-pill noassignee${f.context==='noassignee'?' active':''}" onclick="_kbSetContext('noassignee')"><span class="kb-pill-num">${cNoAssign}</span> NO ASSIGNEE</button>` : ''}
    </div>
    <div class="kb-pill-strip" style="margin-bottom:12px">
      <div class="kb-search-wrap">
        <i class="ti ti-search" style="font-size:12px;color:var(--muted)"></i>
        <input id="kanban-search-input" placeholder="Search tasks…" value="${f.search}"
          oninput="STATE.kanbanFilter.search=this.value;renderBoard();">
      </div>
      <button class="kb-dropdown-btn${priActive?' active':''}" onclick="_kbOpenPriFloat(this)"
        style="${priColor ? 'border-color:'+priColor+';color:'+priColor+';background:'+priColor+'22;' : ''}">
        ${priLabel} &nbsp;&#9660;
      </button>
      <button class="kb-dropdown-btn${assigneeActive?' active':''}" onclick="_kbOpenAssigneeFloat(this)">
        ${assigneeLabel} &nbsp;&#9660;
      </button>
    </div>

    <div class="kanban-wrap">${colsHTML}</div>
    </div>
  `;
  // Restore focus to search if it was active before re-render
  _restoreSearchFocus('kanban-search-input', _wasSearchFocused);
  } catch(e) {
    console.error('renderBoard error:', e);
    const _bs = document.getElementById('boardSection');
    if (_bs) _bs.innerHTML = '<div style="padding:24px;color:#F87171;font-size:13px">Kanban error: ' + e.message + '</div>';
  }
}
