/* ============================================================
   RESPONSIVE BREAKPOINTS
   ============================================================ */

/* ── Large desktop (1400px+) ── */
@media (min-width: 1400px) {
  
  
  .cal-wrap { height: calc(100vh - 200px); }
}

/* ── Standard desktop (1024px – 1399px): default styles apply ── */

/* ── Small desktop / landscape tablet (768px – 1023px) ── */
@media (max-width: 1023px) {
  /* Weekly: 4 cols Mon-Thu, then Fri-Sun wrap to second row */
  
  .cal-label { font-size: 8px; padding: 1px 4px; }
}

/* ── Flip point: labels → circles (below ~680px) ── */
@media (max-width: 900px) {
  .cal-label { font-size: 8px; padding: 1px 3px; }
  .cal-wrap { height: calc(100vh - 200px); }
}

@media (max-width: 679px) {
  .cal-labels       { display: none; }
  .cal-circle-badge {
    display: flex;
    width: clamp(16px, 5vw, 32px);
    height: clamp(16px, 5vw, 32px);
    font-size: clamp(8px, 2.5vw, 15px);
    margin: 2px auto 0;
    max-width: calc(100% - 4px);
    flex-shrink: 1;
  }
  .cal-count-badge  { display: none; }
  .cal-wrap { height: calc(100vh - 180px); min-height: 320px; }
  /* Flex column so badge sits centred below date number */
  .cal-cell {
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    overflow: hidden;
  }
}

/* ── Tablet portrait (600px – 767px) ── */
@media (max-width: 767px) {
  .main-content, .main-content.collapsed { margin-left: 0; padding: 0; width: 100%; }
  .mobile-header { display: flex; }
  .form-row { grid-template-columns: 1fr; }
  .section  { padding: 20px 14px; }
  /* Kanban: 2 columns on tablet — revert to page scroll */
  #page-board.active { overflow-y: auto; flex: none; height: auto; min-height: 100vh; }
  .kanban-board-wrap { flex: none; overflow: visible; }
  .kanban-wrap { grid-template-columns: repeat(2, 1fr); gap: 10px; overflow: visible; flex: none; }
  .kanban-col { min-height: 300px; height: auto; }
  .kanban-body { overflow-y: visible; }
}

/* ── Large phone landscape (480px – 599px) ── */
@media (max-width: 599px) {
  
  
  
  
  .cal-grid { grid-auto-rows: clamp(52px, 9vh, 76px); }
  .cal-cell { padding: 3px; }
  .cal-day-label { font-size: 8px; letter-spacing: 0; }
  .cal-title { font-size: 14px; }
  /* Kanban: 2 columns still — page scroll */
  .kanban-wrap { grid-template-columns: repeat(2, 1fr); gap: 8px; overflow: visible; }
  .section { padding: 16px 12px; }
  
  
}

/* ── Phone portrait (max 479px) ── */
@media (max-width: 479px) {
  
  
  
  
  
  /* Kanban: single column on phones */
  .kanban-wrap { grid-template-columns: 1fr; overflow: visible; }
  .kanban-col { min-height: 200px; height: auto; }
  .cal-grid { grid-auto-rows: 42px; }
  .cal-cell  { padding: 2px; }
  .cal-date  { font-size: 10px; }
  .modal { max-width: 100%; border-radius: 16px 16px 0 0; margin: auto 0 0; max-height: 92vh; }
  .modal-backdrop { align-items: flex-end; padding: 0; }
  .person-grid { grid-template-columns: 1fr; }
  .section { padding: 14px 10px; }
  .section-title { font-size: 22px; }
  
  
}

/* ============================================================
   OVERVIEW FILTER PILLS & CARD ANIMATIONS
   ============================================================ */

/* Primary group pills — larger, more prominent */
.gt-primary-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px; cursor: pointer;
  border: 1px solid var(--border); background: var(--glass);
  white-space: nowrap; transition: all 0.18s; flex-shrink: 0;
  font-family: var(--font-disp); font-size: 15px; font-weight: 600;
  color: var(--text2); line-height: 1;
  text-transform: uppercase; letter-spacing: 0.02em;
}
.gt-primary-pill.active {
  background: rgba(40,92,112,0.18); color: var(--accent2);
  border-color: var(--accent2); font-weight: 700;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.gt-primary-pill-num {
  font-size: 15px; font-weight: 800;
  letter-spacing: -0.04em; line-height: 1;
  display: inline-flex; align-items: center;
}

/* Sub-filter pill row — slides down under primary strip */
.gt-subpill-strip {
  display: flex; align-items: center; gap: 5px;
  flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; /* MED-003: was overflow-x:visible — risked horizontal page overflow on narrow screens */
  padding: 0; flex-shrink: 0;
  margin-bottom: 10px;
}

.gt-subpill-strip::-webkit-scrollbar { display: none; }

/* Sub-filter pills — smaller than primary */
.gt-sub-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px; cursor: pointer;
  border: 1px solid var(--border); background: transparent;
  white-space: nowrap; transition: all 0.15s; flex-shrink: 0;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  letter-spacing: 0.03em; color: var(--text2);
}
.gt-sub-pill.active {
  font-weight: 700;
}
.gt-sub-pill-num {
  font-size: 12px; font-weight: 800; letter-spacing: -0.03em;
}

/* Day divider — standard */
.gt-day-hdr {
  font-size: 11px; font-weight: 700; color: var(--text2);
  padding: 10px 4px 6px; margin-bottom: 8px; margin-top: 4px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.gt-day-hdr-count {
  font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 20px;
  background: var(--glass); border: 1px solid var(--border);
  color: var(--muted);
}

/* Week boundary divider — prominent */
.gt-week-boundary {
  font-size: 11px; font-weight: 700; color: var(--accent2);
  padding: 12px 4px 8px; margin-bottom: 8px; margin-top: 8px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 2px solid var(--accent);
}
.gt-week-boundary-count {
  font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 20px;
  background: rgba(40,92,112,0.15); border: 1px solid rgba(79,154,181,0.3);
  color: var(--accent2);
}

/* Card list transition on group change */
.gt-main-col.sliding-up {
  animation: slideUpFade 0.15s ease-out forwards;
}
.gt-main-col.sliding-down {
  animation: slideDownFade 0.15s ease-out forwards;
}
@keyframes slideUpFade {
  from { opacity:1; transform:translateY(0); }
  to   { opacity:0; transform:translateY(-12px); }
}
@keyframes slideDownFade {
  from { opacity:1; transform:translateY(0); }
  to   { opacity:0; transform:translateY(12px); }
}
.gt-main-col.sliding-in-up {
  animation: slideInFromDown 0.15s ease-out forwards;
}
.gt-main-col.sliding-in-down {
  animation: slideInFromUp 0.15s ease-out forwards;
}
@keyframes slideInFromDown {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes slideInFromUp {
  from { opacity:0; transform:translateY(-12px); }
  to   { opacity:1; transform:translateY(0); }
}

.sidebar.collapsed .sidebar-bottom {
  padding: 0 4px 8px;    /* keep consistent with expanded */

}

[data-theme="light"] .sidebar-controls {

/* Collapse icon — always centered in button */

/* Non-overview pages get their own padding since main-content has padding:0 */
#page-reminders.active,
#page-directories.active,
#page-people.active {
  padding: 24px;
  height: 100vh;
  overflow-y: auto;
  box-sizing: border-box;  scrollbar-gutter: stable;
}
/* LOW-001: reduce generous 24px padding on phones — placed AFTER base rule so cascade wins */
@media (max-width: 479px) {
  #page-people.active,
  #page-directories.active,
  #page-reminders.active { padding: 16px; }
}
/* P5-MOB-R001c CRIT-001: offset full-height pages below the fixed 62px mobile header.
   .page.active { padding-top: var(--nav-h) } (in the 900px block above) is overridden by
   the higher-specificity (1,1,0) ID rules above. These rules have the same specificity
   but come later in the stylesheet, so they win via cascade order.
   Board's existing top padding is 0 (padding: 24px 24px 0), so +24px makes it symmetrical.
   People/Dir/Reminders existing top padding is 24px, so calc adds the header height on top.
   On ≤479px: LOW-001 sets padding:16px (all sides); this rule then overrides only padding-top,
   leaving the reduced 16px side+bottom padding from LOW-001 intact. */
@media (max-width: 900px) {
  #page-board.active {
    padding-top: calc(var(--nav-h) + 24px);
  }
  #page-people.active,
  #page-directories.active,
  #page-reminders.active {
    padding-top: calc(var(--nav-h) + 24px);
  }
}

  letter-spacing: 0.03em; color: var(--text2);
}
.planner-fpill-num { font-size: 13px; font-weight: 800; letter-spacing: -0.03em; display: inline-flex; align-items: center; }
.planner-fpill.active {
  font-weight: 700;
}
.planner-fpill.active.tasks {

}

}
.planner-fpill.active.entries {

/* Month view */
.planner-month-wrap {
  background: var(--surface); border-radius: var(--radius-sm);

.planner-dow-row {

}
.planner-dow {

}
.planner-cal-grid {
  display: grid;
  grid-template-columns: repeat(7,1fr);

}
.planner-cal-cell {
  border-right: 0.5px solid var(--border);
  border-bottom: 0.5px solid var(--border);
  min-height: clamp(72px, 12vh, 120px); padding: 6px; cursor: pointer;

}
.planner-cal-cell:nth-child(7n) { border-right: none; }

}

.planner-cal-label {

  cursor: pointer; flex-shrink: 0; min-height: 16px;
}
.planner-cal-label:hover { filter: brightness(1.15); }
.planner-cal-more { font-size: 9px; color: var(--muted); padding: 0 2px; flex-shrink: 0; }

/* Week view */
.planner-week-grid {

  padding: 0 24px 16px;
}
.planner-day-col {

}
.planner-day-col.is-today {

}
.planner-day-hdr {

}
.planner-day-col.is-today .planner-day-hdr { border-bottom-color: var(--accent2); }

.planner-today-dot {

}
.planner-day-items {

}
.planner-chip {

.planner-day-add { padding: 4px; }

<script>
/* ============================================================
   1. CONFIG — Edit these to connect to Google Sheets
   ============================================================ */
const CONFIG = {
  SHEET_URL:    'https://script.google.com/macros/s/AKfycbzqa38hNdjrd9eXMIDSV-B1WJ5-to-spleOf5sZRNCCfECSv9A_j9gKKi1p-ymGegnz/exec',
  SYNC_MS:      30000,
  ARCHIVE_DAYS: 60,   // items older than this are auto-archived once per day

  SHEETS: {
    tee:       '📅 Unified TEE Entries',
    archive:   '📦 TEE Archive',
    stickies:       '📝 Stickies',
    stickyArchive:  '📦 Stickies Archive',
    folders:        '📁 Folders & Files',
    contacts:  '👤 Contacts',
    locations: '📍 Locations',
    people:    '👥 People',
  }
};


document.addEventListener('DOMContentLoaded', () => {
  const sidebarBtns = document.querySelectorAll('.sidebar-btn');
  const sidebar = document.getElementById('sidebar');
  const mainContent = document.getElementById('main-content');
  const collapseBtn = document.getElementById('collapse-btn');
  const mobileMenuBtn = document.getElementById('mobile-menu-btn');
  const themeBtn = document.getElementById('theme-toggle');

  // ── Sidebar collapse ──
  let isCollapsed = false;
  if (collapseBtn) {
    collapseBtn.addEventListener('click', () => {
      isCollapsed = !isCollapsed;
      sidebar.classList.toggle('collapsed', isCollapsed);
      if (mainContent) mainContent.classList.toggle('collapsed', isCollapsed);
      const icon = document.getElementById('collapse-icon');
      if (icon) icon.textContent = isCollapsed ? '>|' : '|<';
    });
  }

  // ── Page navigation ──
  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById(pageId);
    if (target) target.classList.add('active');
  }

  sidebarBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      sidebarBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const pageId = btn.dataset.page;
      if (pageId) showPage(pageId);
      if (pageId === 'page-people') renderPeople();
      window.dispatchEvent(new Event('resize'));
      if (window.innerWidth <= 900 && sidebar) {
        sidebar.classList.remove('open');
      }
    });
  });

  // ── Mobile menu ──
  if (mobileMenuBtn && sidebar) {
    mobileMenuBtn.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });
  }

  // ── Click outside sidebar to close on mobile ──
  document.addEventListener('click', e => {
    if (window.innerWidth > 900) return;                          // desktop — ignore
    if (!sidebar.classList.contains('open')) return;              // already closed
    if (sidebar.contains(e.target)) return;                       // click was inside sidebar
    if (mobileMenuBtn && mobileMenuBtn.contains(e.target)) return; // click was on the toggle btn
    sidebar.classList.remove('open');
  });

  // ── Theme toggle ──
  if (themeBtn) {
    themeBtn.addEventListener('click', () => { toggleTheme(); });
  }
});

const daysUntil = str => { if (!str) return null; const d = new Date(str); d.setHours(0,0,0,0); return Math.round((d-TODAY)/86400000); };
const daysBetween = (refStr, dueStr) => {
  if (!dueStr) return null;
  const ref = refStr ? (() => { const r = new Date(refStr); r.setHours(0,0,0,0); return r; })() : TODAY;
  const due = new Date(dueStr); due.setHours(0,0,0,0);
  return Math.round((due - ref) / 86400000);
};
const fmtDate   = d => { const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; };

// Standardised time display: "09:30" → "09:30 AM", "14:00" → "02:00 PM"
function fmtTime(t) {
  if (!t) return '';
  // Handle Google Sheets decimal time values (e.g. 0.875 = 21:00)
  if (typeof t === 'number' || (typeof t === 'string' && !t.includes(':'))) {
    const totalMins = Math.round(parseFloat(t) * 24 * 60);
    const hh = Math.floor(totalMins / 60) % 24;
    const mm = totalMins % 60;
    t = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  }
  const parts = t.split(':');
  const h = parseInt(parts[0], 10);
  const m = parts[1] ? parts[1].substring(0,2).padStart(2,'0') : '00';
  const period = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${m} ${period}`;
}
function fmtTimeRange(start, end) {
  if (!start) return '';
  return end ? `${fmtTime(start)} – ${fmtTime(end)}` : fmtTime(start);
}

// Items on a specific date — matches exactly what weekly planner shows:
// Tasks appear on their dueDate (if not Completed) AND on their startDate (if not Completed)
// Events and entries appear on their date
const itemsOnDate = dateStr => {
  const results = [];
  const seen = new Set();
  STATE.items.forEach(i => {
    if (i.type === 'task') {
      if (parseStatus(i.status).state === 'Completed') return; // excluded from calendar view
      if (i.dueDate === dateStr && !seen.has(i.id + '-due')) {
        seen.add(i.id + '-due');
        results.push({ ...i, _dateRole: 'due' });
      }
      if (i.startDate === dateStr && i.startDate !== i.dueDate && !seen.has(i.id + '-start')) {
        seen.add(i.id + '-start');
        results.push({ ...i, _dateRole: 'start' });
      }
    } else {
      if (i.date === dateStr && !seen.has(i.id)) {
        seen.add(i.id);
        results.push(i);
      }
    }
  });
  return results;
};

// Separated from openPersonDetailModal so tab clicks can swap only the list div
function _pdmList(personId, tab) {
  const p = STATE.people.find(x => x.id === personId);
  if (!p) return '';
  const todayStr = fmtDate(TODAY);
  const allItems = personItems(p.name);
  const filtered = tab === 'all' ? allItems : allItems.filter(i => i.type === tab);

  const classify = item => {
    const isDone = item.type === 'task'
      ? parseStatus(item.status).state === 'Completed'
      : (item.date && item.date < todayStr);
    // Events and entries have no lead — all are participants, treat as lead (no muting)
    if (item.type !== 'task') return { isDone, isLead: true };
    const { lead } = parseAssignees(item.assignees||'');
    return { isDone, isLead: lead === p.name };
  };

  const sorted = [...filtered].sort((a, b) => {
    const ca = classify(a), cb = classify(b);
    if (ca.isDone !== cb.isDone) return ca.isDone ? 1 : -1;
    if (ca.isLead !== cb.isLead) return ca.isLead ? -1 : 1;
    return 0;
  });

  const renderItem = item => {
    const pri = getPri(item.priority);
    const { isDone, isLead } = classify(item);
    const typeIcon = { task:'📋', event:'📆', entry:'📝' }[item.type];
    const doneClass = isDone ? 'is-done' : (isLead ? 'is-lead' : 'is-contrib');
    // "Contributor" styled tag — only in detail modal, not compact card
    const roleLabel = !isDone && !isLead
      ? `<span style="font-size:9px;padding:2px 7px;border-radius:20px;background:rgba(40,92,112,0.15);color:var(--accent2);border:1px solid rgba(79,154,181,0.28);font-weight:600">Contributor</span>`
      : '';
    const days = item.type === 'task' ? daysUntil(item.dueDate) : null;
    let dueChip = '';
    if (days !== null) {
      if (days < 0)      dueChip = `<span class="due-chip due-over">${Math.abs(days)}d Over</span>`;
      else if (days===0) dueChip = `<span class="due-chip due-today">Today</span>`;
      else if (days<=2)  dueChip = `<span class="due-chip due-warn">${days}d</span>`;
    }
    const metaStr = item.type === 'task'
      ? `${item.status}${item.dueDate ? ' · due '+item.dueDate : ''}`
      : item.type === 'event'
        ? `${item.date}${item.time ? ' · '+fmtTime(item.time) : ''}`
        : item.date || '';
    // Pass fromPerson so the task detail modal can show a ‹ Back button
    return `<div class="pdm-item ${doneClass}${isLead?' is-lead':''}"
      style="${isLead && !isDone ? `border-left-color:${pri.bar||pri.bg}` : ''}"
      onclick="_navTo(()=>openPersonDetailModal('${personId}','${tab}'),()=>openTEEDetail('${item.id}'))">
      ${isDone ? `<span class="pti-check">✓</span>` : `<span class="pdm-item-icon">${typeIcon}</span>`}
      <div class="pdm-item-body">
        <div class="pdm-item-title">${item.title}</div>
        <div class="pdm-item-meta">${metaStr}</div>
      </div>
      <div class="pdm-item-right">
        ${roleLabel}
        ${dueChip}
        ${item.priority && item.type==='task' ? '<span class="gt-tag" style="background:'+pri.bg+';color:'+pri.text+';border-color:'+pri.border+'">'+item.priority+'</span>' : ''}
      </div>
    </div>`;
  };

  if (tab === 'all') {
    const typeGroups = [
      { type:'task',  label:'Tasks',   icon:'📋', items: sorted.filter(i=>i.type==='task') },
      { type:'event', label:'Events',  icon:'📆', items: sorted.filter(i=>i.type==='event') },
      { type:'entry', label:'Entries', icon:'📝', items: sorted.filter(i=>i.type==='entry') },
    ].filter(g => g.items.length > 0);
    return typeGroups.length
      ? typeGroups.map(g => `<div class="pdm-group-divider">${g.icon} ${g.label} (${g.items.length})</div>${g.items.map(renderItem).join('')}`).join('')
      : `<div style="text-align:center;padding:24px;color:var(--muted)">No items found</div>`;
  }
  return sorted.length
    ? sorted.map(renderItem).join('')
    : `<div style="text-align:center;padding:24px;color:var(--muted)">No ${tab}s found</div>`;
}

const API = CONFIG.SHEET_URL;
const hasAPI = () => API && !API.includes('YOUR_');

async function sheetGetAll(sheetName) {
  const url = `${API}?action=getAll&sheet=${encodeURIComponent(sheetName)}`;
  const res  = await fetch(url);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'Fetch failed');
  return json.data || [];
}
async function sheetUpsert(sheetName, data) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action:'upsert', sheet:sheetName, data }),
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'Upsert failed');
  return json;
}
async function sheetDelete(sheetName, id) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action:'delete', sheet:sheetName, id }),
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'Delete failed');
  return json;
}

// Safely convert whatever Google Sheets returns for a date column into YYYY-MM-DD string
function parseSheetDate(val) {
  if (!val) return '';
  if (typeof val === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
  if (typeof val === 'string' && val.startsWith('Date(')) {
    const ms = parseInt(val.replace('Date(','').replace(')',''), 10);
    if (!isNaN(ms)) return fmtDate(new Date(ms));
  }
  if (val instanceof Date) return fmtDate(val);
  const d = new Date(val);
  if (!isNaN(d.getTime())) return fmtDate(d);
  return String(val);
}

// Safely convert whatever Google Sheets returns for a time column into HH:MM string
// Sheets stores times as decimal fractions of a day (e.g. 0.375 = 09:00)
// or returns them as Date objects anchored to 1899-12-30
function parseSheetTime(val) {
  if (!val && val !== 0) return '';
  // Apps Script now always sends plain "HH:MM" strings via getHours()/getMinutes()
  if (typeof val === 'string' && /^\d{1,2}:\d{2}/.test(val)) {
    return val.substring(0, 5);
  }
  // Safety net: numeric decimal fraction (e.g. 0.875 = 21:00)
  if (typeof val === 'number') {
    const totalMins = Math.round(val * 24 * 60);
    const h = Math.floor(totalMins / 60) % 24;
    const m = totalMins % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }
  // Safety net: Date object — use local hours (should not occur after Apps Script fix)
  if (val instanceof Date) {
    return `${String(val.getHours()).padStart(2,'0')}:${String(val.getMinutes()).padStart(2,'0')}`;
  }
  return '';
}

// ── ARCHIVE SHEET ───────────────────────────────────────────
function _teeRowToItem(r) {
  // Shared row→item parser used for both active and archive sheets
  const rawType = (r['Type'] || '').toString().trim().toLowerCase();
  const type = ['task','event','entry'].includes(rawType) ? rawType : 'entry';
  return {
    id:          (r['ID'] || '').toString().trim(),
    type,
    title:       r['Title']        || '',
    desc:        r['Description']  || '',
    date:        parseSheetDate(r['Date']),
    dueDate:     parseSheetDate(r['Due Date']),
    startDate:   parseSheetDate(r['Start Date']),
    time:        parseSheetTime(r['Time']),
    endTime:     parseSheetTime(r['End Time']),
    status:      r['Status'] || (type === 'task' ? 'Backlog' : ''),
    priority:    r['Priority']     || 'Medium',
    category:    r['Category']     || '',
    project:     r['Project']      || '',
    dept:        r['Department']   || '',
    assignees:   r['Assignees']    || '',
    progress:    type === 'task' ? (Number(r['Progress %']) || 0) : 0,
    tags:        typeof r['Tags']==='string' ? r['Tags'].split(',').map(s=>s.trim()).filter(Boolean) : [],
    notes:       r['Notes']        || '',
    color:       r['Color']        || '',
    recurrence:  r['Recurrence']   || 'none',
    subtasks:    (() => { try { const raw = r['Subtasks']||''; return raw ? JSON.parse(raw) : []; } catch { return []; } })(),
    archivedDate: r['Archived Date'] || '',
    archivedBy:   r['Archived By']   || '',
  };
}

async function fetchArchiveMonth(year, month) {
  // Returns array of items for the given month from cache or sheet
  const key = `${year}-${String(month+1).padStart(2,'0')}`;
  if (STATE.archiveCache[key]) return STATE.archiveCache[key]; // already cached
  if (!STATE.sheetConnected)   return [];

  // First time crossing boundary — fetch entire archive sheet once and cache all months
  if (!STATE.archiveCache._fetched) {
    try {
      const rows = await sheetGetAll(CONFIG.SHEETS.archive);
      const all  = rows.map(_teeRowToItem).filter(i => i.id && i.title);
      // Group by relevant month
      all.forEach(item => {
        const dateStr = item.type === 'task' ? item.dueDate : item.date;
        if (!dateStr) return;
        const k = dateStr.substring(0, 7); // 'YYYY-MM'
        if (!STATE.archiveCache[k]) STATE.archiveCache[k] = [];
        STATE.archiveCache[k].push(item);
      });
      STATE.archiveCache._fetched = true;
    } catch(e) {
      console.warn('Archive fetch failed:', e.message);
      return [];
    }
  }
  return STATE.archiveCache[key] || [];
}

async function fetchAllSheets() {
  if (!hasAPI()) return;
  const syncDot  = document.getElementById('sync-dot');
  const syncText = document.getElementById('sync-text');
  const detail   = document.getElementById('sync-time-detail');

  if (syncDot)  syncDot.className = 'nav-dot syncing';
  if (syncText) syncText.textContent = 'Syncing…';
  if (detail)   detail.textContent  = 'Connecting to Sheets…';
  try {
    await Promise.all([
      fetchTEE(),
      fetchStickies(),
      fetchFolders(),
      fetchContacts(),
      fetchLocations(),
      fetchPeople(),
    ]);
    STATE.sheetConnected = true;
    _lastSyncTime = Date.now();

    console.warn('Full sync failed:', e.message);

  _scheduleIdleSync();
}

function _scheduleIdleSync() {
  if (_idleSyncTimer) clearTimeout(_idleSyncTimer);
  _idleSyncTimer = setTimeout(() => { fetchAllSheets(); }, IDLE_SYNC_MS);
}

  if (triggerSync._t) clearTimeout(triggerSync._t);

/* ─── ARCHIVE HELPERS ─── */

// Returns true if a date string is older than CONFIG.ARCHIVE_DAYS days
function isArchivePeriod(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d.getTime())) return false;
  const boundary = new Date(TODAY);
  boundary.setDate(boundary.getDate() - CONFIG.ARCHIVE_DAYS);
  return d < boundary;
}

// Returns the relevant date string for an item (for archive age checks)
function _itemDate(item) {
  return item.type === 'task' ? (item.dueDate || item.startDate) : item.date;
}

// Auto-archive — runs once per day, silently moves old items
async function autoArchive() {
  if (!STATE.sheetConnected) return;

  // Daily gate
  const today = fmtDate(new Date());
  if (localStorage.getItem('lastArchiveDate') === today) return;

  const toArchive = STATE.items.filter(item => {
    const d = _itemDate(item);
    if (!isArchivePeriod(d)) return false;
    // Tasks: only archive if Completed
    if (item.type === 'task') return parseStatus(item.status).state === 'Completed';
    // Events and entries: archive if date is old enough regardless of status
    return true;
  });

  // ── System closure: mark past Events/Entries as Done if still Open ─────
  // Same daily gate as archive — runs once per day on first load
  const todayD2 = fmtDate(new Date());
  const toClose = STATE.items.filter(item => {
    if (item.type === 'task') return false; // tasks handle their own status
    const itemDate = item.date || item.dueDate;
    if (!itemDate || itemDate >= todayD2) return false; // not past
    const { state } = parseStatus(item.status);
    return !state || state === 'Open'; // only close Open/blank ones
  });

  if (toClose.length > 0) {
    try {
      await Promise.all(toClose.map(item => {
        item.status = 'Done';
        return saveTEE(item);
      }));
      console.log(`[autoArchive] System-closed ${toClose.length} past Events/Entries`);
    } catch(e) {
      console.warn('System closure failed (non-critical):', e.message);
    }
  }

  if (toArchive.length === 0) {
    localStorage.setItem('lastArchiveDate', today);
    return;
  }

  // Write all to archive sheet then delete from active sheet
  try {
    await Promise.all(toArchive.map(item => saveArchiveItem(item, 'auto')));
    await Promise.all(toArchive.map(item => deleteTEE(item.id)));

    // Remove from STATE.items and add to archiveCache
    const ids = new Set(toArchive.map(i => i.id));
    STATE.items = STATE.items.filter(i => !ids.has(i.id));
    toArchive.forEach(item => {
      item.archivedDate = today;
      item.archivedBy   = 'auto';
      const key = (_itemDate(item) || today).substring(0, 7);
      if (!STATE.archiveCache[key]) STATE.archiveCache[key] = [];
      STATE.archiveCache[key].push(item);
    });

    localStorage.setItem('lastArchiveDate', today);
    toast(`Archived ${toArchive.length} old item${toArchive.length > 1 ? 's' : ''}`, 'info');
    renderAll();
  } catch(e) {
    console.warn('Auto-archive failed:', e.message);
  }
}

// Manually archive a single item immediately (from detail view)
async function archiveItem(id) {
  const item = STATE.items.find(i => i.id === id);
  if (!item) return;
  // Store id for the confirm button to use — avoids closure serialization issue
  window._pendingArchiveId = id;
  openModal(`
    <div style="padding:4px 0 12px">
      <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:10px">Archive Item</div>
      <div style="font-size:14px;color:var(--text2);line-height:1.6">"<strong>${item.title}</strong>" will be moved to the archive. You can restore it at any time.</div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="clearNav()">Cancel</button>
      <button style="background:rgba(251,191,36,0.12);color:var(--yellow);border:1px solid rgba(251,191,36,0.35);height:36px;padding:0 16px;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;"
        onclick="clearNav();_doArchive(window._pendingArchiveId)">Archive</button>
    </div>`);
}

async function _doArchive(id) {
  const item = STATE.items.find(i => i.id === id);
  if (!item) { toast('Item not found', 'error'); return; }
  try {
    await saveArchiveItem(item, 'manual');
    await deleteTEE(id);
    STATE.items = STATE.items.filter(i => i.id !== id);
    item.archivedDate = fmtDate(new Date());
    item.archivedBy   = 'manual';
    const key = (_itemDate(item) || fmtDate(new Date())).substring(0, 7);
    if (!STATE.archiveCache[key]) STATE.archiveCache[key] = [];
    STATE.archiveCache[key].push(item);
    renderAll();
    toast('Item archived', 'info');
  } catch(e) {
    toast(`Archive failed: ${e.message||'unknown error'}`, 'error');
    console.error('Archive error:', e);
  }
}

// Restore an item from archive back to active sheet
async function restoreFromArchive(id) {
  // Find in archiveCache
  let found = null, foundKey = null;
  for (const [key, items] of Object.entries(STATE.archiveCache)) {
    if (key === '_fetched') continue;
    const match = items.find(i => i.id === id);
    if (match) { found = match; foundKey = key; break; }
  }
  if (!found) { toast('Item not found in archive', 'error'); return; }

  try {
    await saveTEE(found);
    await deleteArchiveItem(id);
    STATE.items.push(found);
    STATE.archiveCache[foundKey] = STATE.archiveCache[foundKey].filter(i => i.id !== id);
    closeModal();
    renderAll();
    toast('✅ Restored to active', 'success');
  } catch(e) {
    toast('Restore failed — try again', 'error');
  }
}

function setSyncStatus(live) {
  const dot    = document.getElementById('sync-dot');
  const dotC   = document.getElementById('sync-dot-collapsed');
  const label  = document.getElementById('sync-text');
  const detail = document.getElementById('sync-time-detail');
  const cls    = live ? 'nav-dot live' : 'nav-dot';
  if (dot)   dot.className   = cls;
  if (dotC)  dotC.className  = cls;
  if (label) label.textContent = live ? 'System Live' : 'Offline';
  if (detail) {
    if (live) {
      const now  = new Date();
      const time = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
      detail.textContent = `Synced ${time}`;
    } else {
      detail.textContent = 'Click to retry';
    }
  }
}

function _subtaskSummary(subtasks) {
  if (!subtasks?.length) return '';
  const done = subtasks.filter(s => s.done).length;
  const total = subtasks.length;
  if (done === total) return `${total} Subtasks · All Done ✓`;
  if (done === 0) return `${total} Subtask${total>1?'s':''}`;
  return `${total} Subtasks · ${done} Done`;
}

function _subtaskChip(item) {

  const done = item.subtasks.filter(s=>s.done).length;

  return `<span class="subtask-chip${allDone?' all-done':''}" onclick="event.stopPropagation();openSubtaskPanel('${item.id}',this)">☐ ${done}/${total}</span>`;
}

function _chipStyle(key, withBorder = false) {
  const c = getChipColor(key);
  return withBorder
    ? `background:${c.bg};color:${c.text};border:1px solid ${c.border};`
    : `background:${c.bg};color:${c.text};`;

// Group 1 — Context chips: label the DATE RELATIONSHIP (today/overdue/starts)
// _buildContextChips(t) returns HTML for all applicable Group 1 chips
function _buildContextChips(t, refDate) {
  // refDate: YYYY-MM-DD string — defaults to real today if not passed
  const refStr   = refDate || fmtDate(TODAY);
  const st       = parseStatus(t.status).state;
  const done     = st === 'Completed' || st === 'Done';
  let chips      = '';

  // Overdue — past due date relative to refDate, not completed
  if (!done && t.dueDate && t.dueDate < refStr) {
    chips += `<span class="ctx-chip" style="${_chipStyle('overdue', true)}">Overdue</span>`;
  }
  // Due Today — due date matches the reference date
  if (!done && t.dueDate === refStr) {
    chips += `<span class="ctx-chip" style="${_chipStyle('dueToday', true)}">Due Today</span>`;
  }
  // Starts Today — start date matches reference date (tasks only)
  if (!done && t.startDate && t.startDate === refStr && t.dueDate !== refStr) {
    chips += `<span class="ctx-chip" style="${_chipStyle('startsToday', true)}">Starts Today</span>`;
  }
  return chips;
}

// Group 2 — Counter chips: show NUMERIC DISTANCE from today
// _buildCounterChip(dueDate) returns one chip showing days remaining/over
function _buildCounterChip(dueDate, refDate) {
  if (!dueDate) return '';
  // refDate: YYYY-MM-DD string — defaults to real today if not passed
  const days = daysBetween(refDate || null, dueDate);
  if (days === null) return '';
  if (days < 0)  return `<span class="due-chip" style="${_chipStyle('counterOver')}">${Math.abs(days)}d Over</span>`;
  if (days === 0) return `<span class="due-chip" style="${_chipStyle('counterToday')}">Today</span>`;
  if (days <= 2)  return `<span class="due-chip" style="${_chipStyle('counterWarn')}">${days}d</span>`;
  return `<span class="due-chip" style="${_chipStyle('counterOk')}">${days}d</span>`;
}

// Extract trailing hashtags from note text — safety net for manually typed tags
// Reads backwards from end collecting consecutive #word tokens
// Stops at first non-hashtag word — mid-text #3 or #invoice are never captured
function extractStickyTags(text) {
  if (!text) return { cleaned: '', tags: [] };
  const words = text.trim().split(/\s+/);
  const tags  = [];
  while (words.length && /^#[a-zA-Z]\w*$/.test(words[words.length - 1])) {
    tags.unshift(words.pop().slice(1).toLowerCase());
  }
  return { cleaned: words.join(' '), tags };
}

// Get all unique tags from STATE.items and STATE.stickies for autocomplete
function getAllKnownTags() {
  const tagSet = new Set();
  // From tasks/events/entries
  STATE.items.forEach(item => {
    const tags = Array.isArray(item.tags)
      ? item.tags
      : (item.tags||'').split(/[,|]/).map(t=>t.trim().replace(/^#/,'')).filter(Boolean);
    tags.forEach(t => tagSet.add(t.toLowerCase()));
  });
  // From stickies
  STATE.stickies.forEach(s => { (s.tags||[]).forEach(t => tagSet.add(t.toLowerCase())); });
  // From resources (folders, contacts, locations)
  [...(STATE.folders||[]), ...(STATE.contacts||[]), ...(STATE.locations||[])].forEach(r => {
    (r.tags||[]).forEach(t => tagSet.add(t.toLowerCase()));
  });
  return [...tagSet].sort();
}

function toggleSubtask(itemId, idx) {
  const item = STATE.items.find(i => i.id === itemId);
  if (!item || !item.subtasks) return;
  const nowDone = !item.subtasks[idx].done;
  item.subtasks[idx].done = nowDone;
  // Set or clear doneAt timestamp
  if (nowDone) {
    const now = new Date();
    const ts  = fmtDate(now) + ' ' + String(now.getHours()).padStart(2,'0')
              + ':' + String(now.getMinutes()).padStart(2,'0');
    item.subtasks[idx].doneAt = ts;
  } else {
    delete item.subtasks[idx].doneAt;
  }
  saveTEE(item).catch(() => toast('Save failed','error'));
  // Update detail modal in-place if open
  const chk = document.getElementById(`st-chk-${itemId}-${idx}`);
  const txt = document.getElementById(`st-txt-${itemId}-${idx}`);
  const tst = document.getElementById(`st-ts-${itemId}-${idx}`);
  const hdr = document.getElementById(`st-hdr-${itemId}`);
  if (chk) chk.className = `subtask-check${nowDone?' checked':''}`;
  if (txt) txt.className = `subtask-text${nowDone?' done':''}`;
  if (tst) tst.textContent = nowDone ? _fmtSubtaskTs(item.subtasks[idx].doneAt) : '';
  if (hdr) hdr.textContent = _subtaskSummary(item.subtasks);
  renderAll();
}

// Format subtask timestamp for inline display — "Jun 2 · 2:45 PM"
function _fmtSubtaskTs(ts) {
  if (!ts) return '';
  try {
    const [datePart, timePart] = ts.split(' ');
    const [y, m, d] = datePart.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const dateStr = months[parseInt(m,10)-1] + ' ' + parseInt(d,10);
    if (!timePart) return dateStr;
    const [hh, mm] = timePart.split(':').map(Number);
    const ampm = hh >= 12 ? 'PM' : 'AM';
    const h    = hh % 12 || 12;
    return dateStr + ' · ' + h + ':' + String(mm).padStart(2,'0') + ' ' + ampm;
  } catch { return ts; }
}

function addSubtaskInline(itemId, inputEl) {
  const text = inputEl.value.trim();
  if (!text) return;
  const item = STATE.items.find(i => i.id === itemId);
  if (!item) return;
  if (!item.subtasks) item.subtasks = [];
  item.subtasks.push({ text, done: false });
  saveTEE(item).catch(() => toast('Save failed','error'));
  inputEl.value = '';
  // Re-render subtask list in detail modal
  const listEl = document.getElementById(`st-list-${itemId}`);
  const hdrEl  = document.getElementById(`st-hdr-${itemId}`);
  if (listEl) listEl.innerHTML = _buildSubtaskRows(item, false);
  if (hdrEl)  hdrEl.textContent = _subtaskSummary(item.subtasks);
  renderAll();
}

function deleteSubtask(itemId, idx) {
  const item = STATE.items.find(i => i.id === itemId);
  if (!item || !item.subtasks) return;
  item.subtasks.splice(idx, 1);
  saveTEE(item).catch(() => toast('Save failed','error'));
  const listEl = document.getElementById(`st-list-${itemId}`);
  const hdrEl  = document.getElementById(`st-hdr-${itemId}`);
  if (listEl) listEl.innerHTML = _buildSubtaskRows(item, true);
  if (hdrEl)  hdrEl.textContent = _subtaskSummary(item.subtasks);
  renderAll();
}

function _buildSubtaskRows(item, withDelete) {
  return (item.subtasks||[]).map((s, idx) => {
    const tsHTML = s.doneAt
      ? '<span id="st-ts-' + item.id + '-' + idx + '" class="subtask-ts">' + _fmtSubtaskTs(s.doneAt) + '</span>'
      : '<span id="st-ts-' + item.id + '-' + idx + '" class="subtask-ts"></span>';
    const delBtn = withDelete
      ? '<button class="subtask-del" onclick="deleteSubtask(\'' + item.id + '\',' + idx + ')" title="Remove">✕</button>'

    return '<div class="subtask-row" id="st-row-' + item.id + '-' + idx + '">'
      + '<div id="st-chk-' + item.id + '-' + idx + '" class="subtask-check' + (s.done ? ' checked' : '') + '"'
      + ' onclick="toggleSubtask(\'' + item.id + '\',' + idx + ')"></div>'
      + '<span id="st-txt-' + item.id + '-' + idx + '" class="subtask-text' + (s.done ? ' done' : '') + '">' + (s.text||'') + '</span>'

// Kanban floating panel
function openSubtaskPanel(itemId, anchorEl) {
  event.stopPropagation();
  const existing = document.getElementById('subtask-panel');
  if (existing) { existing.remove(); return; }
  const item = STATE.items.find(i => i.id === itemId);
  if (!item) return;
  if (!item.subtasks) item.subtasks = [];

  const panel = document.createElement('div');
  panel.id = 'subtask-panel';
  panel.className = 'subtask-panel';
  panel.innerHTML = `
    <div class="subtask-panel-hdr">
      <span>Subtasks</span>
      <span id="st-hdr-${itemId}" style="color:var(--muted);font-size:10px">${_subtaskSummary(item.subtasks)}</span>
    </div>
    <div id="st-list-${itemId}" class="subtask-list" style="max-height:180px;overflow-y:auto">
      ${_buildSubtaskRows(item, false)}
    </div>
    <div class="subtask-add-row" style="margin-top:6px;display:flex;align-items:center;gap:6px">
      <input class="subtask-add-input" id="st-panel-new-${itemId}" placeholder="New subtask…"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addSubtaskInline('${itemId}',this);}">
      <button type="button" style="flex-shrink:0;padding:4px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--glass2);color:var(--text2);font-size:11px;font-family:var(--font);cursor:pointer;"
        onclick="addSubtaskInline('${itemId}',document.getElementById('st-panel-new-${itemId}'))">Add</button>
    </div>`;

  document.body.appendChild(panel);
  const rect = anchorEl.getBoundingClientRect();
  const pRect = panel.getBoundingClientRect();
  let top = rect.bottom + 6;
  let left = rect.left;
  if (left + pRect.width > window.innerWidth - 8) left = window.innerWidth - pRect.width - 8;
  if (top + pRect.height > window.innerHeight - 8) top = rect.top - pRect.height - 6;
  panel.style.top  = `${top}px`;
  panel.style.left = `${left}px`;

  setTimeout(() => {
    document.addEventListener('click', function _close(e) {
      if (!document.getElementById('subtask-panel')?.contains(e.target)) {
        document.getElementById('subtask-panel')?.remove();
        document.removeEventListener('click', _close);
      }
    });
  }, 0);
}

// ── QUICK STATUS CHANGE ─────────────────────────────────────
function saveTagColor(tagName, hexColor) {
  TAG_CUSTOM[tagName.trim().toLowerCase()] = hexColor;
  try { localStorage.setItem('jhov_tag_colors', JSON.stringify(TAG_CUSTOM)); } catch(e) {}
}
function tagColor(tagName) {
  if (!tagName) return { bg:'rgba(40,92,112,0.2)', text:'#4F9AB5', border:'rgba(79,154,181,0.35)' };
  const key = tagName.trim().toLowerCase();
  // User-defined color takes priority
  if (TAG_CUSTOM[key]) {
    const c = TAG_CUSTOM[key];
    const isDark = isDarkTheme();
    const alpha = isDark ? '22' : '18';
    return { bg: c + alpha, text: c, border: c + '55' };
  }
  const isDark = isDarkTheme();
  const palette = isDark ? TAG_PALETTE_DARK : TAG_PALETTE_LIGHT;
  let h = 0;
  for (let i = 0; i < tagName.length; i++) h = (h * 31 + tagName.charCodeAt(i)) & 0x7fffffff;
  const c = palette[h % palette.length];
  const alpha = isDark ? '22' : '18';
  return { bg: c + alpha, text: c, border: c + '55' };
}

// ── STATUS SYSTEM HELPERS ─────────────────────────────────────────────────────
// parseStatus: pure string parser — splits on | to get state and optional timestamp
// Used on ALL read and write paths for all item types
function parseStatus(raw) {
  if (!raw || !raw.trim()) return { state: null, doneAt: null };
  const parts = raw.split('|');
  return {
    state:  parts[0].trim() || null,
    doneAt: parts[1] ? parts[1].trim() : null
  };
}

// getDisplayStatus: returns display state with type-appropriate fallback for null
// Task null → 'Backlog'  |  Event/Entry null → 'Open'
function getDisplayStatus(item) {
  const { state } = parseStatus(item.status);
  // Tasks — use state directly with Backlog fallback
  if (item.type === 'task') return state || 'Backlog';
  // Events/Entries — check date for display-layer resolution
  // If explicitly set (Open or Done) — use that
  if (state === 'Done') return 'Done';
  if (state === 'Open') return 'Open';
  // Blank/null + date in the past → display as Done (no timestamp)
  // This is display-only — never written to sheet
  const itemDate = item.date || item.dueDate;
  if (!state && itemDate) {
    const todayD = fmtDate(new Date());
    if (itemDate < todayD) return 'Done';
  }
  return 'Open'; // default for Events/Entries
}

// isEffectivelyDone: true if item belongs in the Done section
// Task: Completed  |  Event/Entry: Done
// Starting/InProgress tasks and unmarked Events/Entries always return false
function isEffectivelyDone(item) {
  if (item.type === 'task') return parseStatus(item.status).state === 'Completed';
  // Events/Entries: use getDisplayStatus for display-layer resolution
  return getDisplayStatus(item) === 'Done';
}

// isCompletedToday: used specifically for Today tab Done section
// For Tasks: must be Completed AND doneAt must be today's date
// For Events/Entries: Done state is sufficient (they're already date-scoped to today)
function isCompletedToday(item, todayDateStr) {
  const { state, doneAt } = parseStatus(item.status);
  if (item.type === 'task') {
    if (state !== 'Completed') return false;
    // Must have been completed today — not a previously-completed task
    if (!doneAt) return false;
    return doneAt.split(' ')[0] === todayDateStr;
  }
  // Events/Entries: Done is enough — they're scoped to today by date filter
  return state === 'Done';
}

function openStatusDropdown(taskId, anchorEl, event) {
  event.stopPropagation();
  const existing = document.getElementById('status-dropdown');
  if (existing) { existing.remove(); return; }
  const task = STATE.items.find(i => i.id === taskId);
  if (!task) return;
  const rect = anchorEl.getBoundingClientRect();
  const dropdown = document.createElement('div');
  dropdown.id = 'status-dropdown';
  dropdown.className = 'status-dropdown';
  const isTaskType = task.type === 'task';
  const optCols = isTaskType
    ? KANBAN_COLS
    : [
        { id:'Open', label:'Open', dark:'#7890A0', light:'#4B6878' },
        { id:'Done', label:'Done', dark:'#34D399', light:'#166534' },
      ];
  const currentState = getDisplayStatus(task);
  dropdown.innerHTML = optCols.map(col => {
    const dotColor = getStatusColor(col.id);
    const isCurrent = currentState === col.id;
    return `<button class="status-dropdown-item${isCurrent?' current':''}"
      onclick="changeItemStatus('${taskId}','${col.id}')">
      <span class="status-dot" style="background:${dotColor}"></span>
      ${col.label}
    </button>`;
  }).join('');
  document.body.appendChild(dropdown);
  const dRect = dropdown.getBoundingClientRect();
  let top  = rect.bottom + 6;
  let left = rect.left;
  if (left + dRect.width > window.innerWidth - 8)  left = window.innerWidth - dRect.width - 8;
  if (top  + dRect.height > window.innerHeight - 8) top  = rect.top - dRect.height - 6;
  dropdown.style.top  = `${top}px`;
  dropdown.style.left = `${left}px`;
  setTimeout(() => {
    document.addEventListener('click', function _close() {
      document.getElementById('status-dropdown')?.remove();
      document.removeEventListener('click', _close);
    });
  }, 0);
}

function changeItemStatus(taskId, newStatus) {
  document.getElementById('status-dropdown')?.remove();
  const task = STATE.items.find(i => i.id === taskId);
  if (!task) return;
  const currentState = getDisplayStatus(task);
  if (currentState === newStatus) return;

  // Build new status value with timestamp for completion states
  const now = new Date();
  const ts  = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0');

  if (task.type === 'task') {
    // Tasks: add timestamp only for Completed
    task.status = newStatus === 'Completed' ? `Completed|${ts}` : newStatus;
  } else {
    // Events/Entries: add timestamp for Done, plain text for Open
    task.status = newStatus === 'Done' ? `Done|${ts}` : newStatus;
  }

  saveTEE(task).catch(() => toast('Save failed', 'error'));

  // Update any open status button in place
  const _newDot = getStatusColor(newStatus);
  document.querySelectorAll(`#detail-status-btn-${taskId}, [onclick*="openStatusDropdown('${taskId}'"]`).forEach(btn => {
    btn.textContent    = newStatus;
    btn.style.background  = `${_newDot}22`;
    btn.style.color       = _newDot;
    btn.style.borderColor = `${_newDot}44`;
  });

  renderAll();
  toast(`Status → ${newStatus}`, 'success');
}
// Keep old name as alias for any remaining references

function togglePinExpand(noteId, btn) {

// ── ASSIGNEE HELPERS ─────────────────────────────────────────
// Parse "Lead|Contrib1|Contrib2" → { lead, contributors[] }
function parseAssignees(str) {
  const parts = (str || '').split('|').map(s => s.trim()).filter(Boolean);
  if (!parts.length) return { lead: '', contributors: [] };
  return { lead: parts[0], contributors: parts.slice(1) };
}
// Build back to "Lead|Contrib1|Contrib2"
function buildAssigneesStr(lead, contributors) {
  const all = [lead, ...(contributors || [])].map(s => (s||'').trim()).filter(Boolean);
  return all.join('|');
}
// Split "Lead|Contrib1|Contrib2" into a clean array of names
function splitAssigneeNames(str) {
  return (str||'').split('|').map(s=>s.trim()).filter(Boolean);
}
// Format assignees for detail-view display: "Lead (lead), Contrib1, Contrib2"
function formatAssigneesDisplay(item) {
  const parts = (item.assignees||'').split('|').map(s=>s.trim()).filter(Boolean);
  if (!parts.length) return '—';
  if (item.type==='task') return parts[0]+(parts.length>1?' (lead), '+parts.slice(1).join(', '):'');
  return parts.join(', ');
}

// Render avatar — photo if available, else colored initials circle
// For Google Drive: we expect thumbnail URL (auto-converted on input)
function renderAvatar(name, sizeClass, extraStyle) {
  const person = STATE.people.find(p => p.name === name);
  const color  = person?.color || avColor(name);
  const photo  = person?.photo || '';
  const sz     = sizeClass || 'av-md';
  const style  = extraStyle || '';
  if (photo) {
    // onerror hides img and shows initials fallback
    return `<img src="${photo}" class="av-img ${sz}" style="background:${color};${style}" onerror="this.style.display='none';this.nextElementSibling&&(this.nextElementSibling.style.display='flex')" alt="${initials(name)}"><div class="av-fallback ${sz}" style="background:${color};display:none;${style}">${initials(name)}</div>`;
  }
  return `<div class="av-fallback ${sz}" style="background:${color};${style}">${initials(name)}</div>`;
}

// Render lead + stacked contributors for cards
// Rules: solo lead → avatar + firstName
//        with contribs → lead (larger) + up to 3 stacked contrib circles + "+N" if more
//        compact (narrow card) → lead avatar + "+N" count only
function renderAssigneeStack(assigneesStr, compact, itemType) {
  const { lead, contributors } = parseAssignees(assigneesStr);
  if (!lead) return '';

  // For events and entries: all names are equal participants — no lead/contrib visual distinction
  // Use same avatar size for all, first name shown
  if (itemType === 'event' || itemType === 'entry') {
    const allNames = [lead, ...contributors];
    const firstName = lead.split(' ')[0];
    const MAX_SHOWN = 4;
    const shown = allNames.slice(0, MAX_SHOWN);
    const overflow = allNames.length - MAX_SHOWN;
    const avatarEls = shown.map((name, idx) => {
      const person = STATE.people.find(x => x.name === name);
      const color  = person?.color || avColor(name);
      const photo  = person?.photo || '';
      const cls    = idx === 0 ? 'av' : 'av av-contrib';
      return photo
        ? `<img src="${photo}" class="${cls}" style="background:${color}" onerror="this.outerHTML='<div class=\\'${cls}\\' style=\\'background:${color}\\'>${initials(name)}</div>'" alt="${initials(name)}" title="${name}">`
        : `<div class="${cls}" style="background:${color}" title="${name}">${initials(name)}</div>`;
    }).join('');
    const overflowEl = overflow > 0 ? `<div class="av av-contrib av-more">+${overflow}</div>` : '';
    return `<div class="av-stack">${avatarEls}${overflowEl}</div><span class="t-name">${firstName}${allNames.length > 1 ? ` +${allNames.length - 1}` : ''}</span>`;
  }

  // Tasks: lead is larger, contributors are stacked smaller
  const leadFirst  = lead.split(' ')[0];
  const leadPerson = STATE.people.find(p => p.name === lead);
  const leadColor  = leadPerson?.color || avColor(lead);
  const leadPhoto  = leadPerson?.photo || '';

  const leadAvEl = leadPhoto
    ? `<img src="${leadPhoto}" class="av av-lead" style="background:${leadColor}" onerror="this.outerHTML='<div class=\\'av av-lead\\' style=\\'background:${leadColor}\\'>${initials(lead)}</div>'" alt="${initials(lead)}">`
    : `<div class="av av-lead" style="background:${leadColor}">${initials(lead)}</div>`;

  if (!contributors.length) {
    return `<div class="av-stack">${leadAvEl}</div><span class="t-name">${leadFirst}</span>`;
  }

  if (compact) {
    return `<div class="av-stack">${leadAvEl}<span class="t-name" style="margin-left:6px">${leadFirst}</span><span class="av-count">+${contributors.length}</span></div>`;
  }

  const MAX_SHOWN = 3;
  const shown     = contributors.slice(0, MAX_SHOWN);
  const overflow  = contributors.length - MAX_SHOWN;
  const contribEls = shown.map(name => {
    const p     = STATE.people.find(x => x.name === name);
    const color = p?.color || avColor(name);
    const photo = p?.photo || '';
    return photo
      ? `<img src="${photo}" class="av av-contrib" style="background:${color}" onerror="this.outerHTML='<div class=\\'av av-contrib\\' style=\\'background:${color}\\'>${initials(name)}</div>'" alt="${initials(name)}" title="${name}">`
      : `<div class="av av-contrib" style="background:${color}" title="${name}">${initials(name)}</div>`;
  }).join('');
  const overflowEl = overflow > 0 ? `<div class="av av-contrib av-more" title="${overflow} more">+${overflow}</div>` : '';

  return `<div class="av-stack">${leadAvEl}${contribEls}${overflowEl}</div><span class="t-name">${leadFirst}${contributors.length > 0 ? ` +${contributors.length}` : ''}</span>`;
}
// ── Top-level helper: is person active today? ───────────────
function isPersonActiveToday(p) {
  const todayStr = fmtDate(TODAY);
  return personItems(p.name).some(i => {
    if (i.type === 'task') {
      const state = parseStatus(i.status).state;
      if (state === 'Completed') return false;
      return i.dueDate === todayStr || i.startDate === todayStr ||
        state === 'In Progress' || state === 'Review' || state === 'Open';
    }
    // Events and entries — active today if date matches
    return i.date === todayStr;
  });
}

function isPersonActiveThisWeek(p) {
  // Returns true if person has any items in the next 7 days (including today)
  const todayStr  = fmtDate(TODAY);
  const weekEnd   = new Date(TODAY); weekEnd.setDate(weekEnd.getDate() + 6);
  const weekEndStr = fmtDate(weekEnd);
  const allPi = personItems(p.name);
  return allPi.some(item => {
    // In Progress / Review / Open tasks count regardless of date
    if (item.type === 'task') {
      const state = parseStatus(item.status).state;
      if (state === 'In Progress' || state === 'Review') return true;
      if (state === 'Completed') return false;
    }
    // Check dueDate or startDate falls within today..today+6
    const dateStr = item.dueDate || item.startDate || item.date || '';
    return dateStr >= todayStr && dateStr <= weekEndStr;
  });
}

// ── Today item count helper (used for sorting) ───────────────────
function personTodayCount(p) {
  const todayStr = fmtDate(TODAY);
  return personItems(p.name).filter(i => {
    if (i.type === 'task') {
      const state = parseStatus(i.status).state;
      if (state === 'Completed') return false;
      return i.dueDate === todayStr || i.startDate === todayStr ||
        state === 'In Progress' || state === 'Review' || state === 'Open';
    }
    return i.date === todayStr;
  }).length;
}

// ── Top-level person card builder ───────────────────────────
function renderPeople() {
  const el = document.getElementById('page-people');
  if (!el) return;

  const f   = STATE.peopleFilter;
  const all = STATE.people || [];
  const q   = (f.search||'').toLowerCase();

  // ── Counts ───────────────────────────────────────────────────
  const cAll  = all.length;
  const cToday = all.filter(p => isPersonActiveToday(p)).length;
  const cWeek  = all.filter(p => isPersonActiveThisWeek(p)).length;
  const cIdle  = all.filter(p => !isPersonActiveThisWeek(p)).length;

  // ── Filter by context ────────────────────────────────────────
  let filtered = all;
  if (f.context === 'today') filtered = all.filter(p => isPersonActiveToday(p));
  if (f.context === 'week')  filtered = all.filter(p => isPersonActiveThisWeek(p));
  if (f.context === 'idle')  filtered = all.filter(p => !isPersonActiveThisWeek(p));
  if (q) filtered = filtered.filter(p =>
    p.name.toLowerCase().includes(q) || (p.role||'').toLowerCase().includes(q)
  );

  // ── Sort: Active Today (by count desc) → Active This Week (A-Z) → Idle (A-Z)
  const _byName = (a, b) => (a.name||'').localeCompare(b.name||'');
  filtered = [
    ...filtered.filter(p =>  isPersonActiveToday(p))
               .sort((a, b) => personTodayCount(b) - personTodayCount(a)),
    ...filtered.filter(p => !isPersonActiveToday(p) &&  isPersonActiveThisWeek(p))
               .sort(_byName),
    ...filtered.filter(p => !isPersonActiveThisWeek(p))
               .sort(_byName),
  ];

  // ── Subtitle ─────────────────────────────────────────────────

    : f.context === 'week' ? 'Active This Week'
    : f.context === 'idle' ? 'Idle This Week'

  }

  // ── Pill strip ────────────────────────────────────────────────
  const _wasSearchFocused = _captureSearchFocus('pp-search-input');
  const pillsHTML = ''

      ? '<button class="kb-pill week' + (f.context==='week'?' active':'') + '" onclick="_ppSetContext(' + "'week'" + ')">'
        + '<span class="kb-pill-num">' + cWeek + '</span> ACTIVE THIS WEEK</button>'

      ? '<button class="kb-pill' + (f.context==='idle'?' active':'') + '" onclick="_ppSetContext(' + "'idle'" + ')">'
        + '<span class="kb-pill-num">' + cIdle + '</span> IDLE</button>'
