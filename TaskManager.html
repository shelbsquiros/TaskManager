// ── ARCHIVE DRAWER ────────────────────────────────────────────
// Lazy-loads archived tasks from STATE.archiveCache, with
// search / priority / assignee filters and one-click restore
function openArchiveDrawer() {
  // Load archive cache if not already fetched
  if (!STATE.archiveCache._fetched && STATE.sheetConnected) {
    openModal(`
      <div class="modal-title">📦 Task Archive ${_modalCloseBtn()}</div>
      <div style="text-align:center;padding:40px;color:var(--muted)">Loading archive…</div>`);
    // Fetch and re-open once loaded
    const now = new Date();
    fetchArchiveMonth(now.getFullYear(), now.getMonth())
      .then(() => { clearNav(); openArchiveDrawer(); });
    return;
  }

  // Flatten all archive cache into one array (tasks only for this drawer)
  const allArchived = Object.entries(STATE.archiveCache)
    .filter(([k]) => k !== '_fetched')
    .flatMap(([, items]) => items)
    .filter(i => i.type === 'task');

  _renderArchiveDrawer('', 'All', 'All');
}

function _renderArchiveDrawer(search, priority, assignee) {
  // Always read fresh from cache
  const allArchived = Object.entries(STATE.archiveCache)
    .filter(([k]) => k !== '_fetched')
    .flatMap(([, items]) => items)
    .filter(i => i.type === 'task');

  const assignees = ['All', ...new Set(allArchived.map(t=>t.assignee).filter(Boolean))];
  let filtered = allArchived.filter(t => {
    if (search && !t.title.toLowerCase().includes(search.toLowerCase()) && !t.id.toLowerCase().includes(search.toLowerCase())) return false;
    if (priority !== 'All' && t.priority !== priority) return false;
    if (assignee !== 'All' && t.assignee !== assignee) return false;
    return true;
  });

  filtered = filtered.slice().sort((a,b) => (b.archivedDate||'').localeCompare(a.archivedDate||''));

  const rowsHTML = filtered.length === 0
    ? `<div style="text-align:center;padding:40px 20px;color:var(--muted)">
        <div style="font-size:32px;margin-bottom:10px">📦</div>
        <div>No archived tasks match your filters</div>
      </div>`
    : filtered.map(t => {
        const pri = getPri(t.priority);
        return `<div class="archive-row">
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-decoration:line-through;opacity:0.8">${t.title}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap">
              <span style="font-family:var(--mono)">${t.id}</span>
              <span>${t.assignee||'Unassigned'}</span>
              ${t.archivedDate ? `<span>Archived ${t.archivedDate}</span>` : ''}
              ${t.dueDate ? `<span>Due was ${t.dueDate}</span>` : ''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            <span style="font-size:10px;padding:2px 8px;border-radius:20px;background:${pri.bg};color:${pri.text}">${t.priority}</span>
            <button class="btn-ghost" style="height:30px;padding:0 12px;font-size:12px" onclick="restoreFromArchive('${t.id}')">Restore</button>
          </div>
        </div>`;
      }).join('');

  openModal(`
    ${buildModalListHeader('📦', 'Task Archive', `${allArchived.length} archived task${allArchived.length!==1?'s':''} · ${filtered.length} shown`)}

    <div class="archive-filter-bar">
      <input id="arch-search" placeholder="Search…" value="${search}"
        oninput="_renderArchiveDrawer(this.value,document.getElementById('arch-priority').value,document.getElementById('arch-assignee').value)"
        style="flex:1;min-width:120px">
      <select id="arch-priority" onchange="_renderArchiveDrawer(document.getElementById('arch-search').value,this.value,document.getElementById('arch-assignee').value)">
        <option value="All"${priority==='All'?' selected':''}>All Priorities</option>
        ${['Critical','High','Medium','Low'].map(p=>`<option value="${p}"${priority===p?' selected':''}>${p}</option>`).join('')}
      </select>
      <select id="arch-assignee" onchange="_renderArchiveDrawer(document.getElementById('arch-search').value,document.getElementById('arch-priority').value,this.value)">
        ${assignees.map(a=>`<option value="${a}"${assignee===a?' selected':''}>${a==='All'?'All Assignees':a}</option>`).join('')}
      </select>
    </div>

    <div style="display:flex;flex-direction:column;gap:6px;max-height:55vh;overflow-y:auto;padding-right:4px;margin-top:14px">
      ${rowsHTML}
    </div>

    <div class="modal-actions" style="margin-top:16px">
      ${_backBtn()}
    </div>`, true);
}
// ═══════════════════════════════════════════════════════════
// DIRECTORIES — Folders, Contacts, Locations tabbed view
// ═══════════════════════════════════════════════════════════
function renderDirectories() {
  const tab        = STATE.dirTab;
  const q          = STATE.dirSearch.toLowerCase();
  const activeTags = STATE.dirTags || [];

  // ── Group label ──────────────────────────────────────────────
  const groupLabel = tab === 'folders' ? 'Folders & Files' : tab === 'contacts' ? 'Contacts' : tab === 'locations' ? 'Locations' : 'Tags';

  // ── Sort helper — defined first so it can be used below ───────
  const _sortItems = arr => {
    if (STATE.dirSort === 'az')
      return [...arr].sort((a,b) => (a.name||'').localeCompare(b.name||''));
    return [...arr].sort((a,b) => (b.id||'').localeCompare(a.id||''));
  };

  // ── Tab strip ────────────────────────────────────────────────
  const _tabs = [
    { id:'folders',   icon:'ti-folder',  label:'Folders & Files' },
    { id:'contacts',  icon:'ti-user',    label:'Contacts'        },
    { id:'locations', icon:'ti-map-pin', label:'Locations'       },
    { id:'tags',      icon:'ti-tag',     label:'Tags'            },
  ];
  const tabHTML = _tabs.map(t =>
    '<button class="gt-primary-pill' + (tab===t.id?' active':'') + '"'
    + ' onclick="_dirSwitchTab(\'' + t.id + '\')">'
    + '<i class="ti ' + t.icon + '" style="font-size:13px"></i>' + t.label
    + '</button>'
  ).join('');

  // ── Helpers ───────────────────────────────────────────────────
  const emptyState = (icon, msg, sub, action, actionLabel) =>
    '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)">'
    + '<i class="ti ' + icon + '" style="font-size:40px;display:block;margin-bottom:12px;opacity:0.5"></i>'
    + '<div style="font-size:15px;font-weight:600;margin-bottom:4px;color:var(--text2)">' + msg + '</div>'
    + '<div style="font-size:13px;margin-bottom:16px">' + sub + '</div>'
    + '<button class="btn-primary" onclick="' + action + '"><i class="ti ti-plus" style="font-size:13px;margin-right:4px"></i>' + actionLabel + '</button>'
    + '</div>';

  const searchEmpty = type =>
    '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)">'
    + '<i class="ti ti-search-off" style="font-size:40px;display:block;margin-bottom:12px;opacity:0.5"></i>'
    + '<div style="font-size:15px;font-weight:600;margin-bottom:4px;color:var(--text2)">No results</div>'
    + '<div style="font-size:13px">No ' + type + ' match that search</div>'
    + '</div>';

  const editBtn = (type, id) =>
    '<button class="dir-action-btn" onclick="openDirModal(\'' + type + '\',\'' + id + '\')" title="Edit"><i class="ti ti-pencil" style="font-size:13px"></i></button>';
  const delBtn = (type, id) =>
    '<button class="dir-action-btn" onclick="removeDirItem(\'' + type + '\',\'' + id + '\')" title="Delete"><i class="ti ti-trash" style="font-size:13px"></i></button>';
  const addCard = (type, label) =>
    '<div class="dir-add-btn" onclick="openDirModal(\'' + type + '\',null)"><i class="ti ti-plus" style="font-size:20px"></i><span>Add ' + label + '</span></div>';

  // ── Tag chip row / action button group helpers ─────────────────
  const tagChipRow = (tags, marginBottom) => {
    const _raw = (tags||[]).map(t => _buildTagChip(t)).join('');
    return _raw ? '<div style="display:flex;flex-wrap:wrap;gap:4px' + (marginBottom ? ';margin-bottom:4px' : '') + '">' + _raw + '</div>' : '';
  };
  const actionButtons = (type, id, marginLeftAuto) =>
    '<div style="display:flex;gap:2px' + (marginLeftAuto ? ';margin-left:auto' : '') + '">' + editBtn(type,id) + delBtn(type,id) + '</div>';

  // ── Card builders ────────────────────────────────────────────
  const buildFolderCard = f => {
    const _fTags = tagChipRow(f.tags, true);
    const _fOpen = f.url ? '<a class="dir-card-action-link" href="' + f.url + '" target="_blank" rel="noopener"><i class="ti ti-external-link" style="font-size:12px"></i> Open</a>' : '';
    return '<div class="dir-card">'
      + '<div class="dir-card-header" style="align-items:center">'
      + '<div class="dir-icon" style="background:rgba(40,92,112,0.18);color:var(--accent2)"><i class="ti ti-folder" style="font-size:20px"></i></div>'
      + '<div class="dir-card-title" style="flex:1;min-width:0">' + f.name + '</div>'
      + '</div>'
      + (f.desc ? '<div class="dir-card-sub" style="font-size:12px;line-height:1.4">' + f.desc + '</div>' : '')
      + _fTags
      + '<div class="dir-card-footer" style="align-items:center">'
      + '<div>' + _fOpen + '</div>'
      + actionButtons('folder', f.id, true)
      + '</div></div>';
  };

  const buildContactCard = c => {
    const _av    = avColor(c.name);
    const _avBg  = _av + '22';
    const _init  = initials(c.name);
    // Phone + email — closer gap, no icon on company
    const _phone = c.phone ? '<a class="dir-card-action-link" href="tel:' + c.phone.split(' ').join('') + '" style="font-size:12px;margin-bottom:2px"><i class="ti ti-phone" style="font-size:12px"></i>' + c.phone + '</a>' : '';
    const _email = c.email ? '<a class="dir-card-action-link" href="mailto:' + c.email + '" style="font-size:12px"><i class="ti ti-mail" style="font-size:12px"></i>' + c.email + '</a>' : '';
    const _ctags = tagChipRow(c.tags, false);
    const _cnotes = c.notes ? '<div class="dir-card-body" style="font-size:11px;opacity:0.8;line-height:1.4">' + c.notes + '</div>' : '';
    const _contacts = (_phone || _email)
      ? '<div style="display:flex;flex-direction:column;gap:3px;margin-bottom:4px">' + _phone + _email + '</div>'
      : '';
    return '<div class="dir-card">'
      + '<div class="dir-card-header" style="align-items:flex-start;gap:12px;margin-bottom:6px">'
      + '<div class="dir-icon-lg" style="background:' + _avBg + ';color:' + _av + ';border:1px solid ' + _av + '44">' + _init + '</div>'
      + '<div style="flex:1;min-width:0;padding-top:2px">'
      + '<div class="dir-card-title" style="margin-bottom:1px">' + c.name + '</div>'
      + (c.position ? '<div class="dir-card-sub">' + c.position + '</div>' : '')
      + (c.company  ? '<div class="dir-card-sub" style="font-size:10px;opacity:0.75">' + c.company + '</div>' : '')
      + '</div></div>'
      + _contacts
      + _cnotes
      + _ctags
      + '<div class="dir-card-footer" style="justify-content:flex-end">'
      + actionButtons('contact', c.id, false)
      + '</div></div>';
  };

  const buildLocationCard = l => {
    const _lTags   = tagChipRow(l.tags, false);
    const _lMapUrl = l.mapUrl  ? '<a class="dir-card-action-link" href="' + l.mapUrl + '" target="_blank" rel="noopener" style="font-size:12px"><i class="ti ti-map" style="font-size:13px"></i> View on Map</a>' : '';
    const _lPhone  = l.phone   ? '<div class="dir-card-body" style="font-size:12px"><i class="ti ti-phone" style="font-size:11px;margin-right:4px;opacity:0.7"></i>' + l.phone + '</div>' : '';
    const _lNotes  = l.notes   ? '<div class="dir-card-body" style="font-size:11px;opacity:0.8;line-height:1.4">' + l.notes + '</div>' : '';
    return '<div class="dir-card">'
      + '<div class="dir-card-header" style="align-items:flex-start;gap:12px;margin-bottom:6px">'
      + '<div class="dir-icon" style="background:rgba(251,191,36,0.15);color:#FBBF24"><i class="ti ti-map-pin" style="font-size:20px"></i></div>'
      + '<div style="flex:1;min-width:0;padding-top:2px">'
      + '<div class="dir-card-title" style="margin-bottom:1px">' + l.name + '</div>'
      + (l.company ? '<div class="dir-card-sub" style="font-size:10px;opacity:0.75">' + l.company + '</div>' : '')
      + '</div></div>'
      + (l.address ? '<div class="dir-card-body" style="font-size:12px;margin-bottom:2px"><i class="ti ti-map-pin" style="font-size:11px;margin-right:4px;opacity:0.7"></i>' + l.address + '</div>' : '')
      + _lPhone
      + _lNotes
      + _lTags
      + '<div class="dir-card-footer" style="align-items:center">'
      + '<div>' + _lMapUrl + '</div>'
      + actionButtons('location', l.id, true)
      + '</div></div>';
  };

  // ── Build cards ───────────────────────────────────────────────
  let cardsHTML = '';

  if (tab === 'folders') {
    const _fBase     = STATE.folders.filter(f => !q || f.name.toLowerCase().includes(q) || (f.desc||'').toLowerCase().includes(q) || (f.tags||[]).some(t=>t.includes(q)));
    const _fFiltered = activeTags.length ? _fBase.filter(f => activeTags.every(t => (f.tags||[]).includes(t))) : _fBase;
    const filtered   = _sortItems(_fFiltered);
    if (STATE.folders.length === 0) {
      cardsHTML = emptyState('ti-folder-off', 'No folders yet', 'Save links to important folders and resources', "openDirModal('folder',null)", 'Add Folder');
    } else if (filtered.length === 0) {
      cardsHTML = searchEmpty('folders');
    } else {
      cardsHTML = filtered.map(buildFolderCard).join('') + addCard('folder','Folder/File');
    }

  } else if (tab === 'contacts') {
    const _cBase     = STATE.contacts.filter(c => !q || c.name.toLowerCase().includes(q) || (c.position||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q) || (c.phone||'').includes(q) || (c.company||'').toLowerCase().includes(q) || (c.tags||[]).some(t=>t.includes(q)));
    const _cFiltered = activeTags.length ? _cBase.filter(c => activeTags.every(t => (c.tags||[]).includes(t))) : _cBase;
    const filtered   = _sortItems(_cFiltered);
    if (STATE.contacts.length === 0) {
      cardsHTML = emptyState('ti-address-book-off', 'No contacts yet', 'Add people you frequently need to reach', "openDirModal('contact',null)", 'Add Contact');
    } else if (filtered.length === 0) {
      cardsHTML = searchEmpty('contacts');
    } else {
      cardsHTML = filtered.map(buildContactCard).join('') + addCard('contact','Contact');
    }

  } else {
    const _lBase     = STATE.locations.filter(l => !q || l.name.toLowerCase().includes(q) || (l.address||'').toLowerCase().includes(q) || (l.company||'').toLowerCase().includes(q) || (l.tags||[]).some(t=>t.includes(q)));
    const _lFiltered = activeTags.length ? _lBase.filter(l => activeTags.every(t => (l.tags||[]).includes(t))) : _lBase;
    const filtered   = _sortItems(_lFiltered);
    if (STATE.locations.length === 0) {
      cardsHTML = emptyState('ti-map-pin-off', 'No locations yet', 'Save addresses and map links for quick access', "openDirModal('location',null)", 'Add Location');
    } else if (filtered.length === 0) {
      cardsHTML = searchEmpty('locations');
    } else if (tab === 'tags') {
    cardsHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)">'
      + '<i class="ti ti-tag" style="font-size:40px;display:block;margin-bottom:16px;opacity:0.5"></i>'
      + '<div style="font-size:16px;font-weight:700;color:var(--text2);margin-bottom:8px">Tags</div>'
      + '<div style="font-size:13px;line-height:1.6;max-width:320px;margin:0 auto">'
      + 'A central place to view and manage all your tags across the dashboard &mdash; '
      + 'usage counts, colors, and more. Coming soon.'
      + '</div>'
      + '</div>';

  } else {
      cardsHTML = filtered.map(buildLocationCard).join('') + addCard('location','Location');
    }
  }

  // ── Build tag float HTML ──────────────────────────────────────
  const _tabItems  = tab === 'folders' ? STATE.folders : tab === 'contacts' ? STATE.contacts : STATE.locations;
  const _tagBase   = _tabItems.filter(item => !q || item.name.toLowerCase().includes(q) || (item.tags||[]).some(t=>t.includes(q)));
  const _allTagsMap = {};
  _tagBase.forEach(item => (item.tags||[]).forEach(t => {
    if (!activeTags.includes(t)) {
      const cnt = activeTags.length
        ? _tagBase.filter(i => activeTags.every(a => (i.tags||[]).includes(a)) && (i.tags||[]).includes(t)).length
        : _tagBase.filter(i => (i.tags||[]).includes(t)).length;
      if (cnt > 0) _allTagsMap[t] = cnt;
    }
  }));
  const _availTags = Object.entries(_allTagsMap).sort((a,b) => b[1]-a[1]);
  const _floatItems = _availTags.length
    ? _availTags.map(([t,c]) => '<div class="kb-float-item" onclick="_dirAddTag(\'' + t + '\')">#' + t + '<span class="kb-float-count">' + c + '</span></div>').join('')
    : '<div style="padding:10px 14px;font-size:12px;color:var(--muted)">No more tags available</div>';
  STATE._dirTagFloatHTML = '<div style="padding:4px 0">' + _floatItems + '</div>';

  const _activeChipsHTML = activeTags.map(t => {
    const tc = tagColor(t);
    return '<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;background:' + tc.bg + ';color:' + tc.text + ';border:1px solid ' + tc.border + '">#' + t + '<button onclick="_dirRemoveTag(\'' + t + '\')" style="background:none;border:none;cursor:pointer;padding:0;margin-left:2px;opacity:0.7;font-size:10px;color:inherit;line-height:1">x</button></span>';
  }).join('');
  const _tagBtnLabel   = activeTags.length === 0 ? 'All Tags &#9660;' : '+ Tags &#9660;';
  const _tagBtnActive  = activeTags.length ? ' active' : '';
  const _tagFilterHTML = _activeChipsHTML + '<button class="kb-dropdown-btn' + _tagBtnActive + '" onclick="_dirOpenTagFloat(this)">' + _tagBtnLabel + '</button>';

  // ── Sort controls ────────────────────────────────────────────
  const _azActive  = STATE.dirSort === 'az'     ? ' active' : '';
  const _newActive = STATE.dirSort === 'newest'  ? ' active' : '';
  const _sortHTML  = '<div style="display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0">'
    + '<span style="font-size:11px;color:var(--muted);font-weight:500">Sort:</span>'
    + '<button class="gt-primary-pill' + _azActive  + '" onclick="_dirSetSort(\'az\')" style="padding:4px 10px;font-size:11px">A-Z</button>'
    + '<button class="gt-primary-pill' + _newActive + '" onclick="_dirSetSort(\'newest\')" style="padding:4px 10px;font-size:11px">Newest</button>'
    + '</div>';

  // ── Search value (safe for innerHTML) ───────────────────────
  const _searchVal = (STATE.dirSearch||'').replace(/"/g, '&quot;');
  const _searchPh  = 'Search ' + groupLabel.toLowerCase() + '…';

  // ── Render ────────────────────────────────────────────────────
  // P1-BUG001: renderDirectories() replaces dirSection.innerHTML on every
  // keystroke, destroying and recreating #dir-search-input — causing focus
  // loss after each character. Capture focus state before replacement and
  // restore after so search typing is continuous.
  const _prevActive    = document.activeElement;
  const _searchFocused = _prevActive && _prevActive.id === 'dir-search-input';

  document.getElementById('dirSection').innerHTML = ''
    + '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:16px;flex-shrink:0;flex-wrap:wrap">'
    + '<span style="font-size:26px;font-weight:800;letter-spacing:-0.03em;line-height:1.1;color:var(--text);font-family:var(--font-disp)">Resources</span>'
    + '<span style="font-size:26px;font-weight:400;color:var(--muted);font-family:var(--font-disp)"> &middot; ' + groupLabel + '</span>'
    + '</div>'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">' + tabHTML + '</div>'
    + '<div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap">'
    + '<div class="kb-search-wrap">'
    + '<i class="ti ti-search" style="font-size:12px;color:var(--muted)"></i>'
    + '<input id="dir-search-input" placeholder="' + _searchPh + '" value="' + _searchVal + '" oninput="STATE.dirSearch=this.value;renderDirectories()" style="border:none;background:transparent;color:var(--text);font-family:var(--font);font-size:13px;outline:none;width:100%">'
    + '</div>'
    + _tagFilterHTML
    + _sortHTML
    + '</div>'
    + '<div class="dir-grid" style="padding-bottom:40px">' + cardsHTML + '</div>';

  // Restore focus and cursor if search input was active before render.
  // P1-BUG001 (follow-up): the previous fix captured selectionStart/End from
  // the old (destroyed) input before replacement. On the first character typed
  // into an empty field, selectionStart was 0, so setSelectionRange(0,0) placed
  // the cursor before the new character — causing the second character to prepend
  // rather than append, making it appear the first character didn't filter.
  // Fix: always place the cursor at the end of the new input value after restore.
  if (_searchFocused) {
    const _newInp = document.getElementById('dir-search-input');
    if (_newInp) {
      _newInp.focus();
      const _len = _newInp.value.length;
      _newInp.setSelectionRange(_len, _len);
    }
  }
}

function confirmAction(message, confirmLabel, onConfirm, danger=true) {
  const fn = onConfirm.toString();
  openModal(`
    <div style="padding:4px 0 12px">
      <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:10px">Confirm</div>
      <div style="font-size:14px;color:var(--text2);line-height:1.6">${message}</div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="clearNav()">Cancel</button>
      <button style="${danger?'background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.35);height:36px;padding:0 16px;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;':''}"
        onclick="clearNav();(${fn})()">
        ${confirmLabel}
      </button>
    </div>`);
}

// ── NAVIGATION STACK ────────────────────────────────────────
// Rules:
//   _backBtn() → call BEFORE pushNav to get correct back button
//   pushNav(fn) → call AFTER openModal so next modal can pop back here
//   popNav()   → called by ‹ Back only, pops and reopens previous
//   clearNav() → called by ✕, outside click, save, cancel, escape

window._navStack = [];

function pushNav(reopenFn) {
  window._navStack.push(reopenFn);
}

function popNav() {
  const fn = window._navStack.pop();
  if (fn) fn();
  else clearNav();
}

function clearNav() {
  window._navStack = [];
  document.getElementById('activeModal')?.remove();
  document.getElementById('fabWrap')?.classList.remove('hidden');
  document.removeEventListener('keydown', document._modalEscHandler);
}


// ── NAV HELPER ───────────────────────────────────────────────
// Call this when navigating FROM one modal TO another.
// reopenCurrent: function that reopens the current modal
// openNext: function that opens the next modal
function _navTo(reopenCurrent, openNext) {
  pushNav(reopenCurrent);
  openNext();
}
function _backBtn() {
  // Check stack length AT THE MOMENT OF RENDERING
  // Push happens AFTER openModal, so this correctly reflects
  // whether there is a previous modal to return to
  return window._navStack.length > 0
    ? `<button class="btn-ghost" onclick="popNav()">‹ Back</button>`
    : '';
}

// ═══════════════════════════════════════════════════════════
// GLOBAL UI HANDLERS — shared filter/dropdown/tab controls for
// Board, People, Directories, and Reminders tabs
// ═══════════════════════════════════════════════════════════
window._kbSetPriority = (val) => { STATE.kanbanFilter.priority = val; document.querySelectorAll('.kb-float').forEach(el=>el.remove()); renderBoard(); };
window._kbSetAssignee = (val) => { STATE.kanbanFilter.assignee = val; document.querySelectorAll('.kb-float').forEach(el=>el.remove()); renderBoard(); };
window._kbOpenFloat = function(btnEl, html) {
  // Toggle if already open from same button
  const existing = document.querySelector('.kb-float');
  if (existing) { existing.remove(); return; }
  const float = document.createElement('div');
  float.className = 'kb-float';
  float.innerHTML = html;
  document.body.appendChild(float);
  const rect = btnEl.getBoundingClientRect();
  float.style.top  = (rect.bottom + 6) + 'px';
  float.style.left = rect.left + 'px';
  setTimeout(() => {
    document.addEventListener('click', function _close(e) {
      if (!float.contains(e.target) && !btnEl.contains(e.target)) {
        float.remove();
        document.removeEventListener('click', _close);
      }
    });
  }, 0);
}
window._kbOpenPriFloat = (btnEl) => window._kbOpenFloat(btnEl, STATE._kbPriFloatHTML);
window._kbOpenAssigneeFloat = (btnEl) => window._kbOpenFloat(btnEl, STATE._kbAssigneeFloatHTML);
// ── RESOURCES TAG FILTER FUNCTIONS ─────────────────────────────
// ── PEOPLE FILTER FUNCTIONS ────────────────────────────────────
window._ppSetContext = (val) => {
  STATE.peopleFilter.context = val;
  renderPeople();
}; // val: 'all'|'today'|'week'|'idle'

window._dirSetSort = (val) => {
  STATE.dirSort = val;
  renderDirectories();
};
window._dirSwitchTab = (tabId) => {
  STATE.dirTab = tabId;
  STATE.dirSearch = '';
  STATE.dirTags = [];
  renderDirectories();
};
window._dirAddTag = (tag) => {
  if (!STATE.dirTags.includes(tag)) STATE.dirTags.push(tag);
  const f = document.querySelector('.kb-float');
  if (f) f.remove();
  renderDirectories();
};
window._dirRemoveTag = (tag) => {
  STATE.dirTags = STATE.dirTags.filter(t => t !== tag);
  renderDirectories();
};
window._dirOpenTagFloat = (btnEl) => window._kbOpenFloat(btnEl, STATE._dirTagFloatHTML);

// ── REMINDERS FILTER FUNCTIONS ─────────────────────────────────
window._rmSetContext = (val) => {
  STATE.reminderFilter.context = STATE.reminderFilter.context === val ? 'all' : val;
  renderReminders();
};
window._rmOpenDateFloat = (btnEl) => window._kbOpenFloat(btnEl, STATE._rmDateFloatHTML);
window._rmOpenTagFloat  = (btnEl) => window._kbOpenFloat(btnEl, STATE._rmTagFloatHTML);
window._rmSetDate = (val) => {
  STATE.reminderFilter.date = val;
  const f = document.querySelector('.kb-float');
  if (f) f.remove();
  renderReminders();
};
window._rmSetTag = (val) => {
  STATE.reminderFilter.tag = val;
  const f = document.querySelector('.kb-float');
  if (f) f.remove();
  renderReminders();
};
window._kbSetContext = (val) => { STATE.kanbanFilter.context = STATE.kanbanFilter.context === val ? 'all' : val; renderBoard(); };

function openModal(html, wide=false) {
  document.getElementById('activeModal')?.remove();
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'activeModal';
  backdrop.innerHTML = `<div class="modal${wide?' modal-wide':''}">${html}</div>`;
  backdrop.addEventListener('click', e => { if (e.target===backdrop) clearNav(); });
  document.body.appendChild(backdrop);
  document.getElementById('fabWrap')?.classList.add('hidden');
  document.removeEventListener('keydown', document._modalEscHandler);
  document._modalEscHandler = e => {
    if (e.key === 'Escape') { clearNav(); }
  };
  document.addEventListener('keydown', document._modalEscHandler);
}

function closeModal() {
  document.getElementById('activeModal')?.remove();
  document.getElementById('fabWrap')?.classList.remove('hidden');
  document.removeEventListener('keydown', document._modalEscHandler);
}

// ── FAB (Floating Action Button) ────────────────────────────
function toggleFab() {
  const main = document.getElementById('fabMain');
  const opts = document.getElementById('fabOptions');
  const isOpen = opts.classList.contains('open');
  if (isOpen) {
    closeFab();
  } else {
    main.classList.add('open');
    opts.classList.add('open');
    // Close on outside click
    setTimeout(() => {
      document.addEventListener('click', function _fabClose(e) {
        if (!document.getElementById('fabWrap')?.contains(e.target)) {
          closeFab();
          document.removeEventListener('click', _fabClose);
        }
      });
    }, 0);
  }
}
function closeFab() {
  document.getElementById('fabMain')?.classList.remove('open');
  document.getElementById('fabOptions')?.classList.remove('open');
}

// ── CLICKABLE TAGS ───────────────────────────────────────────
function openTagList(tag) {
  const matches = STATE.items.filter(item => {
    const tags = Array.isArray(item.tags)
      ? item.tags
      : (item.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
    return tags.some(t => t.toLowerCase() === tag.toLowerCase());
  });

  const typeIcon = { task:'📋', event:'📆', entry:'📝' };
  const listHTML = matches.length === 0
    ? `<div style="text-align:center;padding:28px;color:var(--muted)">No items tagged "${tag}"</div>`
    : matches.map(item => {
        const pri = getPri(item.priority);
        const metaStr = item.type === 'task'
          ? `${getDisplayStatus(item)}${item.dueDate?' · due '+item.dueDate:''}`
          : item.type === 'event'
            ? `${item.date}${item.time?' · '+fmtTime(item.time):''}`
            : item.date || '';
        const onclickFn = `_navTo(()=>openTagList('${tag}'),()=>openTEEDetail('${item.id}'))`;
        return `<div class="tag-list-item" onclick="${onclickFn}">
          <span class="tag-list-type">${typeIcon[item.type]||'📋'}</span>
          <div class="tag-list-body">
            <div class="tag-list-title">${item.title}</div>
            <div class="tag-list-meta">${metaStr}</div>
          </div>
          <span style="font-size:9px;padding:2px 7px;border-radius:20px;background:${pri.bg};color:${pri.text};font-weight:600">${item.priority||''}</span>
        </div>`;
      }).join('');

  openModal(`
    <div class="modal-title">
      <div>
        <div style="font-size:16px;font-weight:800">#${tag}</div>
        <div style="font-size:11px;color:var(--muted)">${matches.length} item${matches.length!==1?'s':''} tagged</div>
      </div>
      ${_modalCloseBtn()}
    </div>
    <div style="max-height:55vh;overflow-y:auto;padding-right:4px">${listHTML}</div>
    <div class="modal-actions" style="margin-top:12px">${_backBtn()}</div>`, true);
}
/* ── TEE DETAIL VIEW — with optional back button to day list ── */
// ── TEE DETAIL VIEW ───────────────────────────────────────────
// Read-only item detail. fromDate enables ‹ Back to day list.
// isArchived flag switches Edit→Restore and searches archiveCache.
function openTEEDetail(itemId, _u1, isArchived) {
  // Search active items first, then archive cache
  let item = STATE.items.find(i => i.id === itemId);
  if (!item && isArchived) {
    for (const [key, items] of Object.entries(STATE.archiveCache)) {
      if (key === '_fetched') continue;
      const match = items.find(i => i.id === itemId);
      if (match) { item = match; break; }
    }
  }
  if (!item) return;

  const typeIcon  = { task:'📋', event:'📆', entry:'📝' }[item.type] || '📄';
  const typeLabel = { task:'Task', event:'Event', entry:'Entry' }[item.type] || item.type;
  const pri = getPri(item.priority);

  // Build detail rows — only show fields that have values
  const row = (label, value, mono=false) => value
    ? `<div class="detail-row">
        <span class="detail-label">${label}</span>
        <span class="detail-value${mono?' detail-mono':''}">${value}</span>
       </div>`
    : '';

  const fmtDisplayDate = str => {
    if (!str) return '';
    const d = new Date(str + 'T00:00:00');
    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
  };

  const timeStr = fmtTimeRange(item.time, item.endTime);

  const dateField   = (item.type === 'task') ? item.dueDate   : item.date;
  const startField  = (item.type === 'task') ? item.startDate : '';
  const colorSwatch = (item.type === 'event' && item.color)
    ? `<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${item.color};margin-right:4px;vertical-align:middle"></span>`
    : '';

  // Push self to stack before rendering so ‹ Back from child returns here
  openModal(`
    ${buildModalDetailHeader(item, typeIcon, typeLabel, pri, colorSwatch)}

    <div class="detail-grid">
      ${_buildDetailStatusRow(item)}
      ${row(item.type === 'task' ? 'Due Date' : 'Date', fmtDisplayDate(dateField))}
      ${row('Start Date', fmtDisplayDate(startField))}
      ${row('Time', timeStr)}
      ${row('Category', item.category)}
      ${row('Project', item.project)}
      ${row('Assignees', formatAssigneesDisplay(item))}
      ${row('Department', item.dept)}
      ${_buildDetailTagRow(item.tags, `openTEEDetail('${item.id}')`)}
    </div>

    ${item.desc  ? `<div style="margin:14px 0 4px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px">Description</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.6;padding:10px;background:var(--glass);border:1px solid var(--border);border-radius:10px">${item.desc}</div>` : ''}
    ${item.notes ? `<div style="margin:14px 0 4px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px">Notes</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.6;padding:10px;background:var(--glass);border:1px solid var(--border);border-radius:10px">${item.notes}</div>` : ''}

    ${!isArchived ? _buildSubtaskSection(item, false) : (item.subtasks?.length ? '<div class="subtask-section"><div class="subtask-header"><span class="subtask-header-lbl">Subtasks</span><span class="subtask-summary" id="st-hdr-'+item.id+'">' + _subtaskSummary(item.subtasks) + '</span></div><div class="subtask-list">'
        + (item.subtasks||[]).map((s,idx) =>
            '<div class="subtask-row" onclick="toggleSubtask(\''+item.id+'\','+idx+')">'
            + '<div class="subtask-check' + (s.done?' checked':'') + '" id="st-chk-'+item.id+'-'+idx+'"></div>'
            + '<span class="subtask-text' + (s.done?' done':'') + '" id="st-txt-'+item.id+'-'+idx+'">' + (s.text||'') + '</span>'
            + '<span class="subtask-ts" id="st-ts-'+item.id+'-'+idx+'">' + (s.doneAt ? _fmtSubtaskTs(s.doneAt) : '') + '</span>'
            + '</div>'
          ).join('')
        + '</div></div>'
        : '')}

    ${item.archivedDate ? `<div style="margin-bottom:12px;padding:8px 12px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:10px;font-size:12px;color:var(--yellow)">Archived ${fmtDisplayDate(item.archivedDate)} · ${item.archivedBy || 'auto'}</div>` : ''}

    <div class="modal-actions" style="margin-top:20px">
      ${_backBtn()}
      ${isArchived
        ? `<button class="btn-primary" onclick="restoreFromArchive('${item.id}')">Restore to Active</button>`
        : `<div style="display:flex;gap:8px">
             <button class="btn-ghost" onclick="archiveItem('${item.id}')">Archive</button>
             <button class="btn-primary" onclick="_navTo(()=>openTEEDetail('${item.id}'),()=>openTEEModal('${item.id}'))">Edit</button>
           </div>`
      }
    </div>`);
}

// Unified form for Task, Event, and Entry creation/editing.
// Shows pinned notes side panel when pinned notes exist.
function openTEEModal(itemId, forceType, defaultDate, defaultStatus) {
  const existing = itemId ? STATE.items.find(i => i.id === itemId) : null;

  _renderTEEModal(existing, currentType, defaultDate || '', defaultStatus || '');
}

// switchTEEType: swaps only the type-specific fields in-place
// (no full re-render) with a 80ms opacity fade for smoothness.
// Called by the type-tab buttons — swaps only the type-specific fields in place, no full re-render
function switchTEEType(newType) {
  const itemId      = document.getElementById('tee-hidden-id')?.value || '';
  const defaultDate = document.getElementById('tee-hidden-date')?.value || '';
  const defStatus   = document.getElementById('tee-hidden-status')?.value || '';
  const existing    = itemId ? STATE.items.find(i => i.id === itemId) : null;

  // Capture whatever the user has already typed in shared fields
  const carried = {
    title:    document.getElementById('tee-title')?.value    || existing?.title    || '',
    desc:     document.getElementById('tee-desc')?.value     || existing?.desc     || '',
    category: document.getElementById('tee-category')?.value || existing?.category || '',
    tags:     document.getElementById('tee-tags')?.value     || (Array.isArray(existing?.tags) ? existing.tags.join(', ') : '') || '',
    notes:    document.getElementById('tee-notes')?.value    || existing?.notes    || '',
    subtasks: (() => {
      const list = document.getElementById('tee-subtask-list');
      if (!list) return existing?.subtasks || [];
      return Array.from(list.querySelectorAll('.subtask-row')).map((row, idx) => {
        const done   = row.querySelector('.subtask-check')?.classList.contains('checked') || false;
        const doneAt = row.querySelector(`#tee-st-donat-${idx}`)?.value || null;
        return {
          text:   (row.querySelector(`#tee-st-text-${idx}`)?.value || '').trim(),
          done,
          // Preserve existing doneAt; if newly checked and no timestamp, add one now
          doneAt: done ? (doneAt || (() => {
            const n = new Date();
            return fmtDate(n) + ' ' + String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
          })()) : null,
        };
      }).filter(s => s.text).map(s => s.doneAt ? s : { text: s.text, done: s.done });
    })(),
  };

  // Update type tab active styles without re-rendering the whole modal
  document.querySelectorAll('.tee-type-btn').forEach(btn => {
    const isActive = btn.getAttribute('onclick').includes(`'${newType}'`);
    btn.classList.toggle('active', isActive);
    btn.style.background   = isActive ? 'rgba(40,92,112,0.2)' : '';

// saveTEEModal: reads form fields, builds item object, saves to
// STATE.items and triggers a debounced sheet sync.
function saveTEEModal(existingId, type) {
  const title = document.getElementById('tee-title')?.value.trim();
  if (!title) { toast('Title is required','error'); return; }
  const g = id => document.getElementById(id)?.value || '';

  // Start with a clean slate — all fields empty, then populate only what's relevant
  const base = {
    id:          existingId || nextTEEId(),
    type,
    title,
    desc:        g('tee-desc'),
    category:    g('tee-category'),
    tags:        g('tee-tags').split(',').map(s=>s.trim()).filter(Boolean),
    notes:       g('tee-notes'),
    // Type-exclusive fields default to empty/zero
    date:        '', dueDate: '', startDate: '', time: '', endTime: '',
    status:      '', priority: 'Medium', project: '', dept: '',
    progress: 0, color: '', recurrence: 'none', assignees: '',
    subtasks: (() => {
      const list = document.getElementById('tee-subtask-list');
      if (!list) return existingId ? (STATE.items.find(i=>i.id===existingId)?.subtasks||[]) : [];
      return Array.from(list.querySelectorAll('.subtask-row')).map((row, idx) => {
        const done   = row.querySelector('.subtask-check')?.classList.contains('checked') || false;
        const doneAt = row.querySelector(`#tee-st-donat-${idx}`)?.value || null;
        return {
          text:   (row.querySelector(`#tee-st-text-${idx}`)?.value || '').trim(),
          done,
          // Preserve existing doneAt; if newly checked and no timestamp, add one now
          doneAt: done ? (doneAt || (() => {
            const n = new Date();
            return fmtDate(n) + ' ' + String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
          })()) : null,
        };
      }).filter(s => s.text).map(s => s.doneAt ? s : { text: s.text, done: s.done });
    })(),
  };

  if (type === 'task') {
    const _stRaw = g('tee-status') || 'Backlog';
    if (_stRaw === 'Completed' && (!existing || parseStatus(existing.status).state !== 'Completed')) {
      const _sn=new Date(); const _sts=_sn.getFullYear()+'-'+String(_sn.getMonth()+1).padStart(2,'0')+'-'+String(_sn.getDate()).padStart(2,'0')+' '+String(_sn.getHours()).padStart(2,'0')+':'+String(_sn.getMinutes()).padStart(2,'0');
      base.status = 'Completed|'+_sts;
    } else { base.status = _stRaw; }
    base.priority  = g('tee-priority')  || 'Medium';
    // Build assignees string from lead + contributors chip selections
    const lead = g('tee-lead') || '';
    const contributors = getChipSelections('tee-contributors').filter(v => v !== lead);
    base.assignees = buildAssigneesStr(lead, contributors);
    base.dept      = g('tee-dept')      || '';
    base.startDate = g('tee-startDate') || '';
    base.dueDate   = g('tee-dueDate')   || '';
    base.project   = g('tee-project')   || '';
  } else if (type === 'event') {
    base.date      = g('tee-date')      || '';
    base.time      = g('tee-time')      || '';
    base.endTime   = g('tee-endTime')   || '';
    base.color     = g('tee-color')     || '#22D3EE';
    base.priority  = g('tee-priority')  || 'Medium';
    base.assignees = getChipSelections('tee-contributors').join('|');
    const _evRaw = g('tee-status') || 'Open';
    if (_evRaw === 'Done' && (!existing || parseStatus(existing.status).state !== 'Done')) {
      const _evn=new Date(), _evts=_evn.getFullYear()+'-'+String(_evn.getMonth()+1).padStart(2,'0')+'-'+String(_evn.getDate()).padStart(2,'0')+' '+String(_evn.getHours()).padStart(2,'0')+':'+String(_evn.getMinutes()).padStart(2,'0');
      base.status = 'Done|'+_evts;
    } else { base.status = _evRaw; }
  } else { // entry
    base.date      = g('tee-date')      || '';
    base.time      = g('tee-time')      || '';
    base.priority  = g('tee-priority')  || 'Medium';
    base.project   = g('tee-project')   || '';
    base.assignees = getChipSelections('tee-contributors').join('|');
    const _enRaw = g('tee-status') || 'Open';
    if (_enRaw === 'Done' && (!existing || parseStatus(existing.status).state !== 'Done')) {
      const _enn=new Date(); const _ents=_enn.getFullYear()+'-'+String(_enn.getMonth()+1).padStart(2,'0')+'-'+String(_enn.getDate()).padStart(2,'0')+' '+String(_enn.getHours()).padStart(2,'0')+':'+String(_enn.getMinutes()).padStart(2,'0');
      base.status = 'Done|'+_ents;
    } else { base.status = _enRaw; }
  }

  if (existingId) {
    STATE.items = STATE.items.map(i => i.id === existingId ? base : i);
  } else {
    STATE.items.push(base);
  }
  closeModal();
  renderAll();
  saveTEE(base)
    .then(() => { toast(existingId ? 'Updated' : 'Created'); triggerSync(); })
    .catch(() => toast('Saved locally — sheet will sync next time', 'info'));
}

function deleteTEEItem(id) {
  const item  = STATE.items.find(i => i.id === id);
  const title = item?.title || 'this item';
  confirmAction(
    `"<strong>${title}</strong>" will be permanently deleted. This cannot be undone.`,
    'Delete',
    () => {
      STATE.items = STATE.items.filter(i => i.id !== id);
      clearNav(); renderAll();
      deleteTEE(id).then(() => { toast('Deleted'); triggerSync(); }).catch(() => toast('Removed locally','info'));
    }
  );
}

  const currentStatus   = document.getElementById('tee-hidden-status')?.value || '';
  const currentType     = document.querySelector('.tee-type-btn.active')?.textContent?.trim().toLowerCase().replace(/[^a-z]/g,'') || 'task';

    category: document.getElementById('tee-category')?.value || '',
    tags:     document.getElementById('tee-tags')?.value || '',

    dept:      document.getElementById('tee-dept')?.value || '',
    startDate: document.getElementById('tee-startDate')?.value || '',

    </div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <input class="form-input" id="qap-role" placeholder="e.g. Designer, Developer…">
    </div>
    <div class="form-group">
      <label class="form-label">Colour</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="qap-colors">

          style="width:26px;height:26px;border-radius:50%;background:${c};border:none;cursor:pointer;${i===STATE.people.length%7?'outline:3px solid #fff':''}" title="${c}"></button>`).join('')}

// Save new person and restore the TEE modal with them pre-selected as lead
function _saveQuickPerson(itemId, type, defaultDate, defaultStatus) {
  const name  = document.getElementById('qap-name')?.value.trim();
  if (!name) { toast('Name is required','error'); return; }
  const role  = document.getElementById('qap-role')?.value.trim() || '';
  const color = document.getElementById('qap-color-val')?.value || '#285C70';

  const newPerson = { id:uid('P'), name, role, color, photo:'' };
  STATE.people.push(newPerson);
  savePerson(newPerson).catch(()=>{});
  renderAll();
  toast(`${name} added to the team ✓`, 'success');

  const existingItem = itemId ? STATE.items.find(i => i.id === itemId) : null;
  const carried = window._qapCarried || {};
  const ct = window._qapCarriedTask || {};
  _renderTEEModal(existingItem || null, type, defaultDate, defaultStatus, { ...carried });

  setTimeout(() => {
    if (ct.status)    { const el = document.getElementById('tee-status');    if (el) el.value = getDisplayStatus(ct); }
    if (ct.priority)  { const el = document.getElementById('tee-priority');  if (el) el.value = ct.priority; }
    if (ct.dept)      { const el = document.getElementById('tee-dept');      if (el) el.value = ct.dept; }
    if (ct.startDate) { const el = document.getElementById('tee-startDate'); if (el) el.value = ct.startDate; }
    if (ct.dueDate)   { const el = document.getElementById('tee-dueDate');   if (el) el.value = ct.dueDate; }
    if (ct.project)   { const el = document.getElementById('tee-project');   if (el) el.value = ct.project; }
    // Pre-select new person as lead
    const leadSel = document.getElementById('tee-lead');
    if (leadSel) leadSel.value = name;
  }, 50);

  window._qapCarried = null;
  window._qapCarriedTask = null;
}

// Restore TEE modal after cancelling quick-add
function _restoreTEEModal(itemId, type, defaultDate, defaultStatus) {
  const existingItem = itemId ? STATE.items.find(i => i.id === itemId) : null;
  const carried = window._qapCarried || {};
  _renderTEEModal(existingItem, type || 'task', defaultDate, defaultStatus, carried);
  setTimeout(() => {
    const ct = window._qapCarriedTask || {};
    if (ct.status)    { const el = document.getElementById('tee-status');    if (el) el.value = getDisplayStatus(ct); }
    if (ct.priority)  { const el = document.getElementById('tee-priority');  if (el) el.value = ct.priority; }
    if (ct.dept)      { const el = document.getElementById('tee-dept');      if (el) el.value = ct.dept; }
    if (ct.startDate) { const el = document.getElementById('tee-startDate'); if (el) el.value = ct.startDate; }
    if (ct.dueDate)   { const el = document.getElementById('tee-dueDate');   if (el) el.value = ct.dueDate; }
    if (ct.project)   { const el = document.getElementById('tee-project');   if (el) el.value = ct.project; }
    if (ct.assignees) {
      const { lead, contributors } = parseAssignees(ct.assignees);
      const leadEl = document.getElementById('tee-lead');
      if (leadEl) leadEl.value = lead;
      // Restore chip selections
      document.querySelectorAll('#tee-contributors .chip-option').forEach(chip => {
        chip.classList.toggle('selected', contributors.includes(chip.dataset.val));
      });
    }
    window._qapCarried = null;
    window._qapCarriedTask = null;
  }, 50);
}

function savePersonModal(existingId) {
  const name  = document.getElementById('pm-name').value.trim();
  if (!name) { toast('Name required','error'); return; }
  const data  = {
    id:    existingId || uid('P'),
    name,
    role:  document.getElementById('pm-role').value.trim(),
    color: document.getElementById('pm-color').value,
    photo: document.getElementById('pm-photo').value.trim(),
  };

  if (existingId) {
    const oldPerson = STATE.people.find(x => x.id === existingId);
    const oldName   = oldPerson?.name || '';
    STATE.people = STATE.people.map(x => x.id === existingId ? data : x);

    // Propagate name change to all items — tasks, events, AND entries
    if (oldName && oldName !== name) {
      let updatedCount = 0;
      STATE.items.forEach(item => {
        const parts = (item.assignees || '').split('|').map(s => s.trim());
        if (parts.includes(oldName)) {
          item.assignees = parts.map(n => n === oldName ? name : n).join('|');
          saveTEE(item).catch(() => {});
          updatedCount++;
        }
      });
      if (updatedCount > 0) toast(`Updated name on ${updatedCount} item${updatedCount > 1 ? 's' : ''}`, 'info');
    }
  } else {
    STATE.people.push(data);
  }

  clearNav(); renderAll();
  savePerson(data).then(() => toast(existingId ? 'Updated' : 'Added')).catch(() => toast('Saved locally', 'info'));
}

function removePerson(id) {
  const person = STATE.people.find(x => x.id === id);
  const name   = person?.name || 'this team member';
  confirmAction(
    `"<strong>${name}</strong>" will be removed from the team. Their tasks will remain but become unassigned.`,
    'Remove',
    () => {
      STATE.people = STATE.people.filter(x => x.id !== id);
      clearNav(); renderOverview();
      deletePerson(id).then(() => toast('Removed')).catch(() => toast('Removed locally','info'));
    }
  );
}

window._stickyTagInput = function(textarea) {
  const val     = textarea.value;
  const cursor  = textarea.selectionStart;
  const before  = val.slice(0, cursor);
  const hashIdx = before.lastIndexOf('#');
  const dropdown = document.getElementById('st-tag-dropdown');
  if (!dropdown) return;

  // Hide if no # found or space between # and cursor (not a tag)
  if (hashIdx === -1 || before.slice(hashIdx).includes(' ')) {
    dropdown.style.display = 'none'; return;
  }

  const query   = before.slice(hashIdx + 1).toLowerCase();
  const allTags = getAllKnownTags();
  const current = window._stickyModalTags || [];
  const matches = allTags.filter(t => t.includes(query) && !current.includes(t)).slice(0, 8);

  if (matches.length === 0 && query.length === 0) {
    dropdown.style.display = 'none'; return;
  }

  const createOpt = query.length > 0 && !allTags.includes(query)
    ? `<div class="sticky-tag-option" style="font-style:italic;opacity:0.7" onclick="window._stickyPickTag('${query}')">+ Create #${query}</div>` : '';
  dropdown.innerHTML = matches.map(t =>
    `<div class="sticky-tag-option" onclick="window._stickyPickTag('${t}')">#${t}</div>`
  ).join('') + createOpt;

  // ── Caret position detection using mirror div ─────────────────
  // Create a hidden mirror div matching the textarea's style
  let mirror = document.getElementById('_st_mirror');
  if (!mirror) {
    mirror = document.createElement('div');
    mirror.id = '_st_mirror';
    document.body.appendChild(mirror);
  }
  const cs     = window.getComputedStyle(textarea);
  const taRect = textarea.getBoundingClientRect();
  const lineH  = parseInt(cs.lineHeight) || 18;

  // Position mirror exactly over the textarea so caret span coords match
  mirror.style.cssText = [
    'position:fixed','visibility:hidden','overflow:hidden','white-space:pre-wrap',
    'word-wrap:break-word',
    'top:'  + taRect.top  + 'px',
    'left:' + taRect.left + 'px',
    'width:'  + taRect.width  + 'px',
    'height:' + taRect.height + 'px',
    'font-family:'  + cs.fontFamily,
    'font-size:'    + cs.fontSize,
    'font-weight:'  + cs.fontWeight,
    'line-height:'  + cs.lineHeight,
    'padding:'      + cs.padding,
    'border:'       + cs.border,
    'box-sizing:'   + cs.boxSizing,
  ].join(';');

  // Text up to # + marker span; account for textarea scroll offset
  const textUpToHash = val.slice(0, hashIdx);
  mirror.innerHTML   = _escapeHtml(textUpToHash) + '<span id="_st_caret"></span>';
  // Shift mirror content up by scroll amount so caret position is correct
  mirror.scrollTop = textarea.scrollTop;

  const caretSpan = document.getElementById('_st_caret');
  const spRect    = caretSpan.getBoundingClientRect();

  // Dropdown appears just below the # character
  let top  = spRect.bottom + 2;
  let left = spRect.left;

  // Clamp to viewport — flip above if near bottom
  const dropH = Math.min(200, matches.length * 36 + 36);
  if (top + dropH > window.innerHeight - 20) top = top - dropH - parseInt(cs.lineHeight||'18');
  if (left + 300 > window.innerWidth - 10)   left = window.innerWidth - 310;
  left = Math.max(10, left);
  top  = Math.max(10, top);

  dropdown.style.top  = top  + 'px';
  dropdown.style.left = left + 'px';
  dropdown.style.display = 'block';
};

function _captureSearchFocus(inputId) {
  return document.activeElement?.id === inputId;
}

function _restoreSearchFocus(inputId, wasFocused) {
  if (!wasFocused) return;
  const el = document.getElementById(inputId);
  if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
}

function _escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/ /g,'&nbsp;').replace(/\n/g,'<br>');
}

window._stickyPickTag = function(tag) {
  tag = tag.toLowerCase().replace(/[^a-z0-9_]/g, '');
  if (!tag) return;
  if ((window._stickyModalTags||[]).includes(tag)) {
    const d = document.getElementById('st-tag-dropdown');
    if (d) d.style.display = 'none'; return;
  }
  const ta = document.getElementById('st-text');
  if (ta) {
    const before  = ta.value.slice(0, ta.selectionStart);
    const after   = ta.value.slice(ta.selectionStart);
    const hashIdx = before.lastIndexOf('#');
    ta.value = before.slice(0, hashIdx) + after;
    ta.focus();
  }
  window._stickyModalTags.push(tag);
  _stickyRenderChips();
  const d = document.getElementById('st-tag-dropdown');
  if (d) d.style.display = 'none';
};

window._stickyRemoveTag = function(tag) {
  window._stickyModalTags = (window._stickyModalTags||[]).filter(t => t !== tag);
  _stickyRenderChips();
};

function _stickyRenderChips() {
  const container = document.getElementById('st-tags-chips');
  if (!container) return;
  const tags = window._stickyModalTags || [];
  container.innerHTML = tags.map(t => {
    const tc = tagColor(t);
    return `<span class="sticky-tag-chip" data-tag="${t}" style="background:${tc.bg};color:${tc.text};border:1px solid ${tc.border}">#${t}<button onclick="event.stopPropagation();_stickyRemoveTag('${t}')" style="background:none;border:none;cursor:pointer;margin-left:3px;opacity:0.7;font-size:10px;color:inherit">x</button></span>`;
  }).join('');
}

function saveStickyModal(existingId) {
  const rawText  = document.getElementById('st-text')?.value || '';
  const isPinned = document.getElementById('st-pinned')?.checked || false;
  const isFloat  = document.getElementById('st-float')?.checked  || false;
  const sDate    = document.getElementById('st-due-date')?.value || '';
  const sTime    = document.getElementById('st-due-time')?.value || '';

  if (!rawText.trim()) { toast('Note text required','error'); return; }

  // Extract trailing hashtags as safety net, merge with modal chips — deduplicate
  const { cleaned, tags: trailingTags } = extractStickyTags(rawText);
  const modalTags  = window._stickyModalTags || [];
  const mergedTags = [...new Set([...modalTags, ...trailingTags])];
  const finalText  = cleaned || rawText.trim();

  if (existingId) {
    const s = STATE.stickies.find(x=>x.id===existingId);
    if (s) {
      s.text     = finalText;
      s.colorIdx = Number(document.getElementById('st-color').value);
      s.pinned   = isPinned;
      s.float    = isFloat;
      s.tags     = mergedTags;
      s.date  = sDate;
      s.time  = sTime;
      saveSticky(s).catch(()=>{});
    }
  } else {
    const cx = Math.min(60 + STATE.stickies.length * 220, window.innerWidth - 220);
    const cy = 100 + Math.random() * 80;
    const s  = {
      id:       uid('ST'),
      text:     finalText,
      colorIdx: Number(document.getElementById('st-color').value),
      x: cx, y: cy,
      float:    isFloat,
      pinned:   isPinned,
      tags:     mergedTags,
      date:   sDate,
      time:   sTime,
      done:     false,
      doneAt:   '',
    };
    STATE.stickies.push(s);
    saveSticky(s).then(()=>toast('Note added')).catch(()=>toast('Saved locally','info'));
  }
  window._stickyModalTags = [];
  clearNav(); renderStickyLayer(); renderReminders(); renderOverview();
}

function _renderStickyArchiveList() {
  const list = document.getElementById('sticky-archive-list');
  if (!list) return;
  const rows = STATE._stickyArchiveRows || [];
  const q    = (document.getElementById('sticky-archive-search')?.value||'').toLowerCase();
  const filtered = q ? rows.filter(r =>
    r.text.toLowerCase().includes(q) ||
    r.tags.some(t => t.toLowerCase().includes(q))
  ) : rows;

  if (filtered.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">${q?'No results':'Archive is empty'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(r => {
    const tagsHTML = r.tags.length
      ? `<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:3px">${r.tags.map(t=>`<span style="font-size:10px;padding:1px 6px;border-radius:20px;background:var(--glass2);color:var(--text2);border:1px solid var(--border)">#${t}</span>`).join('')}</div>`
      : '';
    const _rawArchived  = r.archivedAt ? (r.archivedAt.includes('T') ? r.archivedAt.replace('T',' ').split('.')[0] : r.archivedAt) : '';
    const _archParts   = _rawArchived ? _rawArchived.split(' ') : [];
    const archivedText = _rawArchived ? `Archived ${_archParts[0]}${_archParts[1] ? ' ' + fmtTime(_archParts[1]) : ''}` : '';
    const dateText     = r.date ? `Date: ${r.date}` : '';
    return `<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:var(--text);line-height:1.4;${r.done?'text-decoration:line-through;opacity:0.7':''}">${r.text}</div>
        ${tagsHTML}
        <div style="font-size:10px;color:var(--muted);margin-top:3px">${[archivedText, dateText].filter(Boolean).join(' · ')}</div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0;margin-top:2px">
        <button class="btn-ghost" style="font-size:11px;height:28px;padding:0 8px"
          onclick="_restoreStickyFromArchive('${r.id}',this)" title="Restore note">
          <i class="ti ti-arrow-back-up" style="font-size:12px;margin-right:2px"></i>Restore
        </button>
        <button class="btn-ghost" style="font-size:11px;height:28px;padding:0 8px;color:var(--red)"
          onclick="_deleteStickyFromArchive('${r.id}',this)" title="Delete permanently">
          <i class="ti ti-trash" style="font-size:12px"></i>
        </button>
      </div>
    </div>`;
  }).join('');
}

async function _restoreStickyFromArchive(id, btnEl) {
  if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'Restoring…'; }
  const row = (STATE._stickyArchiveRows||[]).find(r => r.id === id);
  if (!row) return;
  try {
    // Restore to stickies sheet
    await sheetUpsert(CONFIG.SHEETS.stickies, {
      'ID': row.id, 'Text': row.text, 'ColorIdx': row.colorIdx,
      'X': 20, 'Y': 120, 'Float': 'FALSE', 'Pinned': 'FALSE',
      'Tags': row.tags.join('|'), 'Date': row.date||'', 'Time': '',
      'Done': 'FALSE', 'DoneAt': '',
    });
    // Delete from archive sheet
    await sheetDelete(CONFIG.SHEETS.stickyArchive, id);
    // Update local state
    STATE._stickyArchiveRows = (STATE._stickyArchiveRows||[]).filter(r => r.id !== id);
    STATE.stickies.push({
      id: row.id, text: row.text, colorIdx: row.colorIdx,
      x: 20, y: 120, float: false, pinned: false,
      tags: row.tags, date: row.date||'', time: '',
      done: false, doneAt: '',
    });
    _renderStickyArchiveList();
    renderReminders(); renderStickyLayer(); renderOverview();
    toast('Note restored', 'info');
  } catch(e) {
    toast(`Restore failed: ${e.message||'error'}`, 'error');
    if (btnEl) { btnEl.disabled = false; btnEl.innerHTML = '<i class="ti ti-arrow-back-up" style="font-size:12px;margin-right:2px"></i>Restore'; }
  }
}

async function _deleteStickyFromArchive(id, btnEl) {
  if (btnEl) { btnEl.disabled = true; }
  try {
    await sheetDelete(CONFIG.SHEETS.stickyArchive, id);
    STATE._stickyArchiveRows = (STATE._stickyArchiveRows||[]).filter(r => r.id !== id);
    _renderStickyArchiveList();
    toast('Note permanently deleted', 'info');
  } catch(e) {
    toast(`Delete failed: ${e.message||'error'}`, 'error');
    if (btnEl) { btnEl.disabled = false; }
  }
}

      <div class="modal-actions">
        <button class="btn-primary" onclick="clearNav()">OK</button>
      </div>`);
    return;
  }
  window._pendingArchiveAllCount = doneNotes.length;
  openModal(`
    <div style="padding:4px 0 12px">
      <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:10px">Archive All Done Notes</div>
      <div style="font-size:14px;color:var(--text2);line-height:1.6">${doneNotes.length} done note${doneNotes.length>1?'s':''} will be moved to the archive.</div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="clearNav()">Cancel</button>
      <button id="_stickyArchiveAllBtn" style="background:rgba(251,191,36,0.12);color:var(--yellow);border:1px solid rgba(251,191,36,0.35);height:36px;padding:0 16px;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;"
        onclick="clearNav();_doArchiveAllDone()">Archive All</button>
    </div>`);
}

async function _doArchiveAllDone() {
  const doneNotes = STATE.stickies.filter(s => s.done);
  if (doneNotes.length === 0) return;
  STATE._stickyArchiving = true;
  toast('Archiving…', 'info');
  let succeeded = 0;
  try {
    for (const s of doneNotes) {
      try {
        await saveStickyArchiveItem(s);
        await deleteSticky(s.id);
        succeeded++;
      } catch(e) {
        console.error('Archive failed for', s.id, e);
      }
    }
    const archivedIds = new Set(doneNotes.slice(0, succeeded).map(s => s.id));
    STATE.stickies = STATE.stickies.filter(s => !archivedIds.has(s.id));
    renderStickyLayer(); renderReminders(); renderOverview();
    toast(`${succeeded} note${succeeded>1?'s':''} archived`, 'info');
  } finally {
    STATE._stickyArchiving = false;
  }
}

async function _doArchiveSticky(id) {
  const s = STATE.stickies.find(x=>x.id===id);
  if (!s) { toast('Note not found', 'error'); return; }
  STATE._stickyArchiving = true;
  toast('Archiving…', 'info');
  try {
    await saveStickyArchiveItem(s);
    await deleteSticky(id);
    STATE.stickies = STATE.stickies.filter(x=>x.id!==id);
    renderStickyLayer(); renderReminders(); renderOverview();
    toast('Note archived', 'info');
  } catch(e) {
    toast(`Archive failed: ${e.message||'unknown error'}`, 'error');
    console.error('Sticky archive error:', e);
  } finally {
    STATE._stickyArchiving = false;
  }
}

function toggleStickyDone(id, isDone) {
  const s = STATE.stickies.find(x=>x.id===id);
  if (!s) return;
  s.done = isDone;
  if (isDone) {
    const n = new Date();
    s.doneAt = n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')
             +' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  } else {
    s.doneAt = '';
  }
  saveSticky(s).catch(()=>{});
  renderReminders(); renderOverview();
}

function saveDirModal(type, existingId) {
  const name = document.getElementById('df-name').value.trim();
  if (!name) { toast('Name is required','error'); return; }
  const _parseTags = v => (v||'').split(/[\s,]+/).map(t=>t.trim().replace(/^#/,'')).filter(Boolean);
  let data;
  if (type==='folder') {
    data = { id:existingId||uid('F'), name, url:document.getElementById('df-url').value.trim(), desc:document.getElementById('df-desc').value.trim(), tags:_parseTags(document.getElementById('df-tags').value) };
    if (existingId) STATE.folders = STATE.folders.map(x=>x.id===existingId?data:x); else STATE.folders.push(data);
    saveFolder(data).catch(()=>{});
  } else if (type==='contact') {
    data = { id:existingId||uid('C'), name, position:document.getElementById('df-pos').value.trim(), phone:document.getElementById('df-phone').value.trim(), email:document.getElementById('df-email').value.trim(), company:document.getElementById('df-company').value.trim(), notes:document.getElementById('df-notes').value.trim(), tags:_parseTags(document.getElementById('df-tags').value) };
    if (existingId) STATE.contacts = STATE.contacts.map(x=>x.id===existingId?data:x); else STATE.contacts.push(data);
    saveContact(data).catch(()=>{});
  } else {
    data = { id:existingId||uid('L'), name, address:document.getElementById('df-addr').value.trim(), mapUrl:document.getElementById('df-map').value.trim(), notes:document.getElementById('df-notes').value.trim(), company:document.getElementById('df-company').value.trim(), phone:document.getElementById('df-phone').value.trim(), tags:_parseTags(document.getElementById('df-tags').value) };
    if (existingId) STATE.locations = STATE.locations.map(x=>x.id===existingId?data:x); else STATE.locations.push(data);
    saveLocation(data).catch(()=>{});
  }
  clearNav(); renderDirectories(); toast(existingId?'Updated':'Added');
}

function removeDirItem(type, id) {
  // confirmAction not used here — removeDirItem already handles its own modal flow
  if (type==='folder')   { STATE.folders   = STATE.folders.filter(x=>x.id!==id);   deleteFolder(id).catch(()=>{}); }
  else if (type==='contact')  { STATE.contacts  = STATE.contacts.filter(x=>x.id!==id);  deleteContact(id).catch(()=>{}); }
  else                        { STATE.locations = STATE.locations.filter(x=>x.id!==id); deleteLocation(id).catch(()=>{}); }
  renderDirectories(); toast('Removed');
}

// ── KANBAN DRAG AND DROP ─────────────────────────────────────
function dragStart(taskId) { STATE.dragTaskId = taskId; }
function dragEnd()          { STATE.dragTaskId = null; }
function dragOver(e, colId) { e.preventDefault(); }
function drop(e, colId) {
  e.preventDefault();
  if (!STATE.dragTaskId) return;
  const task = STATE.items.find(i=>i.id===STATE.dragTaskId && i.type==='task');
  if (!task) return;
  // Add timestamp when dragging to Completed (same as saveTEEModal)
  if (colId === 'Completed' && parseStatus(task.status).state !== 'Completed') {
    const _n = new Date();
    const _ts = _n.getFullYear()+'-'+String(_n.getMonth()+1).padStart(2,'0')+'-'+String(_n.getDate()).padStart(2,'0')
              +' '+String(_n.getHours()).padStart(2,'0')+':'+String(_n.getMinutes()).padStart(2,'0');
    task.status = 'Completed|'+_ts;
  } else {
    task.status = colId;
  }
  renderBoard(); renderOverview();
  saveTEE(task).then(()=>toast(`Moved to ${colId}`)).catch(()=>toast(`Moved to ${colId} (offline)`,'info'));
}

// ── NAVIGATION + THEME ───────────────────────────────────────
function calNav(dir) {
  STATE.calMonth += dir;
  if (STATE.calMonth > 11) { STATE.calMonth = 0; STATE.calYear++; }
  if (STATE.calMonth < 0)  { STATE.calMonth = 11; STATE.calYear--; }
  renderPlanner();
}

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme==='dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = next==='dark' ? '🌙' : '☀️';
  // Force the browser to fully compute and apply the new CSS theme
  // before any JS color helper (getPri, getStatusColor, getStickyColor) reads data-theme.
  // Reading offsetHeight flushes the style engine synchronously.
  void document.documentElement.offsetHeight;
  // Double rAF: first frame applies CSS, second frame JS rebuilds DOM with correct values
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      renderAll();
    });
  });
}

function updateDate() {
  const el = document.getElementById('nav-date-display');
  if (el) el.textContent =
    new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}

  Paste into: Extensions → Apps Script → Deploy as Web App

    • Add "Photo" column (E) to People sheet if not present
================================================================

function doGet(e)  { return handleRequest(e, 'GET');  }
function doPost(e) { return handleRequest(e, 'POST'); }

// Columns that contain date values — returned as YYYY-MM-DD strings
const DATE_COLUMNS = ['Date', 'Due Date', 'Start Date', 'Archived Date'];
// Columns that contain time values — returned as HH:MM strings
const TIME_COLUMNS = ['Time', 'End Time'];

// Apps Script / Google Sheets date values are not always reliable with instanceof Date.
// This checks for Date-like objects by duck-typing instead.
function isDateLike(value) {
  return value &&
    typeof value === 'object' &&
    typeof value.getFullYear === 'function' &&
    typeof value.getMonth   === 'function' &&
    typeof value.getDate    === 'function';
}

function formatCell(header, value, displayValue) {
  // TIME columns: always use the display value (e.g. "11:45").
  // This bypasses all timezone issues completely.
  if (TIME_COLUMNS.includes(header)) {
    if (displayValue && /^\d{1,2}:\d{2}/.test(displayValue)) {
      return displayValue.substring(0, 5);
    }
    // Fallback: numeric fraction of a day.
    if (typeof value === 'number') {
      var totalMins = Math.round(value * 24 * 60);
      var h   = Math.floor(totalMins / 60) % 24;
      var min = totalMins % 60;
      return String(h).padStart(2,'0') + ':' + String(min).padStart(2,'0');
    }
    return '';
  }
  // DATE columns: normalize to YYYY-MM-DD using sheet-local date components.
  if (DATE_COLUMNS.includes(header) && isDateLike(value)) {
    var y = value.getFullYear();
    var m = String(value.getMonth() + 1).padStart(2, '0');
    var d = String(value.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + d;
  }
  // P0-BUG002: Non-date columns whose cells were auto-coerced to Date-like
  // objects by Google Sheets must return the visible display text, not an
  // ISO string. Using instanceof Date alone was not reliable; isDateLike()
  // duck-types instead.
  if (isDateLike(value)) {
    return displayValue || '';
  }
  return value;
}

function handleRequest(e, method) {
  try {
    if (method === 'GET') {
      const action    = e.parameter.action;
      const sheetName = e.parameter.sheet;
      if (!sheetName) throw new Error('Missing sheet');
      const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(sheetName);
      if (!sheet) throw new Error('Sheet not found: ' + sheetName);

      if (action === 'getAll') {
        const range = sheet.getDataRange();
        const values = range.getValues();
        const displayValues = range.getDisplayValues();

        if (values.length < 2) return output({ ok: true, data: [] });

        const headers = values[0];
        const data = values.slice(1)
          .map((row, rowIdx) => ({ row, display: displayValues[rowIdx + 1] }))
          .filter(({ row }) => row.some(cell => cell !== ''))
          .map(({ row, display }) => {
            const obj = {};
            headers.forEach((h, i) => {
              obj[h] = formatCell(h, row[i], display[i]);
            });
            return obj;
          });

        return output({ ok: true, data });
      }

      throw new Error('Invalid GET action');
    }

    if (method === 'POST') {
      const body  = JSON.parse(e.postData.contents);
      const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(body.sheet);
      if (!sheet) throw new Error('Sheet not found: ' + body.sheet);

      if (body.action === 'upsert') {
        const headers   = sheet.getRange(1, 1, 1, sheet.getLastColumn()).getValues()[0];
        const idField   = headers[0];
        const item      = body.data;
        const id        = item[idField];
        const lastRow   = Math.max(sheet.getLastRow() - 1, 1);
        const rows      = sheet.getRange(2, 1, lastRow, 1).getValues().flat();
        const rowIndex  = rows.indexOf(id);
        const rowData   = headers.map(h => item[h] !== undefined ? item[h] : '');

        if (rowIndex >= 0) {
          sheet.getRange(rowIndex + 2, 1, 1, rowData.length).setValues([rowData]);
        } else {
          sheet.appendRow(rowData);
        }

        return output({ ok: true });
      }

      if (body.action === 'delete') {
        const id       = body.id;
        const lastRow  = Math.max(sheet.getLastRow() - 1, 1);
        const rows     = sheet.getRange(2, 1, lastRow, 1).getValues().flat();
        const rowIndex = rows.indexOf(id);

        if (rowIndex >= 0) sheet.deleteRow(rowIndex + 2);

        return output({ ok: true });
      }

      throw new Error('Invalid POST action');
    }
  } catch (err) {
    return output({ ok: false, error: err.message });
  }
}

function output(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}
